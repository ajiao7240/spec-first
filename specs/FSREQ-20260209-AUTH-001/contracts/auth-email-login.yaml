openapi: 3.0.3
info:
  title: Auth Email APIs
  version: 1.0.0
  description: 邮箱验证码登录相关接口（RFC-002 扩展）
paths:
  /api/auth/email/send-otp:
    post:
      summary: Send Email OTP
      operationId: sendEmailOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                scene:
                  type: string
                  default: login
      responses:
        '200':
          description: Sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      cooldownSeconds:
                        type: integer
        '429':
          description: Rate limited (AUTH_OTP_RATE_LIMIT)
        '400':
          description: Invalid email (AUTH_INVALID_EMAIL)
        '503':
          description: Channel unavailable (AUTH_OTP_CHANNEL_UNAVAILABLE)
  /api/auth/email/login:
    post:
      summary: Login with Email OTP
      operationId: emailOtpLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      refreshToken:
                        type: string
        '401':
          description: OTP invalid/expired/replay blocked
        '429':
          description: Retry exceeded (AUTH_OTP_RETRY_EXCEEDED)
