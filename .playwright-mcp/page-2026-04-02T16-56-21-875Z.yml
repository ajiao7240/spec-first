      - generic [ref=e162]: 胶水编程不是一句口号，它需要一套具体的物料体系来支撑。这套体系要回答的核心问题是：Agent 写一段代码，到底需要哪几类物料？
      - generic [ref=e164]:
        - text: Agent 写代码时，背后有四个彼此独立的决策：
        - generic [ref=e165]: 做什么
        - text: （意图）、
        - generic [ref=e166]: 什么不能做
        - text: （约束）、
        - generic [ref=e167]: 代码长什么样
        - text: （结构）、
        - generic [ref=e168]: 有什么要注意的
        - text: （经验）。它们的独立性体现在——答对任何一个，不保证其他三个也对：Agent 可以理解需求但违反了团队禁用某依赖的规矩（缺开发规范），可以守规矩但文件组织混乱（缺代码模式），可以结构规整但踩了内部组件的坑（缺领域知识）。四种失败模式互不重叠，每一层物料恰好堵一个，少一层多一种漏洞。对应到我们的实践中，这四层物料分别是：
        - generic [ref=e169]: 任务规格
        - text: （这次做什么）、
        - generic [ref=e170]: 开发规范
        - text: （规矩是什么）、
        - generic [ref=e171]: 代码模式
        - text: （抄什么）、
        - generic [ref=e172]: 领域知识
        - text: （有什么约束）。
