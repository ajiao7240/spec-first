      - generic [ref=e1255]:
        - text: 回到开头的数据：采纳率从 50% 到 90%+，核心变量不是模型升级，而是物料体系的完善——同一个基座模型，物料到位前后的产出质量判若两人。
        - generic [ref=e1256]: AI 编码的质量上限取决于你喂给它什么，而非它本身有多强。
      - generic [ref=e1258]:
        - text: 这不只是方法论的改良，而是 AI 编码
        - generic [ref=e1259]: 底层假设的转变
        - text: 。传统假设是把 AI 当作作者：给它足够好的需求描述，它就能写出好代码。胶水编程的假设是把 AI 当作装配工：它不应该"写"代码，而应该"抄+改"代码。当知识的消费者从人变成 Agent，"口头传递"这条路径断了——Agent 只能消费被显式外化的知识。
        - generic [ref=e1260]: 当 AI 成为团队中最大的"新人"，所有隐性知识都必须变成显性资产。
      - generic [ref=e1262]:
        - text: 任何为模型行为搭的工程脚手架，都有隐形的保质期——几个月后新一代模型可能原生就能做到，还比你实现得更干净。这跟传统软件工程追求复用、追求框架撑三年的直觉完全相反。但这恰恰印证了胶水编程的押注方向：
        - generic [ref=e1263]: 我们投资的不是脚手架，而是知识资产。
        - text: 加载物料的工程机制会变——今天是 AGENTS.md 静态注入，明天可能是模型原生支持长期记忆——但团队的代码模式、领域知识、开发规范不会因为模型升级而过时。代码可以随时推翻重来，但你用来判断代码好不好的标准得有人维护。
        - generic [ref=e1264]: 模型会换代，脚手架会扔掉，但团队知识只会越积越厚。
      - generic [ref=e1265]:
        - generic [ref=e1266]: 90%抄，10%写。
        - text: 这才是 AI 编码真正的护城河。
