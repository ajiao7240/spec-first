        - generic [ref=e118]: Vibe Coding 解决了"能不能用 AI 写代码"。
        - generic [ref=e119]: 用自然语言描述需求，AI 直接生成代码。探索原型够用了，但产出完全不可控——风格随机、质量看运气，不可能直接合入生产仓库。
      - generic [ref=e120]:
        - generic [ref=e121]: SPEC Coding 解决了"AI 写的代码对不对"。
        - generic [ref=e122]: 用结构化的技术方案约束 AI 的行为：做什么、不做什么、验收标准是什么。可控性显著提升，但 SPEC 管的是意图和边界，管不到具体实现——Agent 知道要写一个列表页，但不知道你们团队的列表页长什么样。
      - generic [ref=e123]:
        - generic [ref=e124]: Glue Coding 解决了"AI 写的代码像不像我们的"。
        - generic [ref=e125]: 在 SPEC 的基础上，再给 Agent 三样东西：开发规范（规矩）、代码模式（骨架）、领域知识（经验）。Agent 不再从零创作，而是照着团队已有的代码去抄，只在差异点写胶水。产出的代码风格统一、组件正确、CR 一次通过。
      - generic [ref=e126]:
        - generic [ref=e127]: 三者是递进关系：
        - generic [ref=e128]: Vibe 让 AI 能写代码，SPEC 让 AI 写对代码，Glue 让 AI 写出"你的"代码。
        - generic [ref=e129]: 企业中后台要的恰恰是最后这一步——不只是能跑，还必须像团队自己写的一样，能合入、能 CR 通过。
      - generic [ref=e131]: 《Spec Coding 不是银弹》（内部文章）一文指出了 SPEC 编码的三个结构性局限：AI 缺乏真正的理解能力、规范无法完整描述系统、规范比代码更难维护。胶水编程的物料体系正是在这个认知基础上的工程补全——领域知识补上业务语义理解，代码模式补上"规范无法描述"的具体实现，Track + 规格同步缓解规范与代码的同步维护负担。
