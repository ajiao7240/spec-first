      - generic [ref=e1238]: 半年实践下来，团队反复踩过三个坑，值得分享：
      - generic [ref=e1239]:
        - generic [ref=e1240]: 误区一："物料越多越好"。
        - text: 早期我们往知识库里灌了大量内容，结果 Agent 召回了一堆不相关的知识，反而干扰了编码质量。后来通过"调用率 × 采纳率"的四象限分析，逐一清理低效知识条目——被频繁召回但采纳率只有 20%~30% 的条目要么优化表述、要么直接删除。知识库关联采纳率从 18% 提升到 35%，近翻倍（详见系列文章《数据度量》，内部文章）。
        - generic [ref=e1241]: 物料的价值不在数量，在精准度。
      - generic [ref=e1242]:
        - generic [ref=e1243]: 误区二："样板间写一次就够了"。
        - text: 代码模式不是写完就不管了。随着团队架构升级（比如从旧版请求库迁移到新版），样板间如果不同步更新，Agent 会继续按旧模式生成代码。代码模式是唯一需要主动投入维护的物料层——但好消息是，团队每天都在写新页面，好的实现顺手提炼为样板间，维护成本并不高。
      - generic [ref=e1244]:
        - generic [ref=e1245]: 误区三："有了物料就可以轻视 SPEC"。
        - text: 恰恰相反。物料解决的是"怎么做"，SPEC 解决的是"做什么"。我们见过有同学在物料体系完善后草草写个 SPEC 就直接编码——Agent 确实写出了风格统一的代码，但做的不是产品要求的功能。
        - generic [ref=e1246]: SPEC 和物料是正交的两个维度，缺任何一个都不行。
