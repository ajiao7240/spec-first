# Meta/Local 分离迁移清单
# 从 v1.0.0 迁移到 v1.1.0
#
# 此清单定义了 meta/local 目录结构迁移的步骤
# - meta/: 包级基线（由 spec-first update 管理）
# - local/: 项目定制（用户编辑，升级时保留）

schemaVersion: "1.0"
versionRange:
  from: "1.0.0"
  to: "1.1.0"
  fromInclusive: true
  toInclusive: false

description: "分离 .spec-first/ 为 meta/ 和 local/ 目录"

# 默认冲突策略：遇到目标已存在时跳过
defaultConflictStrategy: skip

# 前置条件：项目已初始化
prerequisites:
  - ".spec-first"
  - "specs"

# 迁移步骤
steps:
  # 1. 创建 meta 目录
  - type: mkdir
    path: .spec-first/meta

  # 2. 创建 local 目录
  - type: mkdir
    path: .spec-first/local

  # 3. 创建 local/templates 目录
  - type: mkdir
    path: .spec-first/local/templates

  # 4. 移动包级配置文件到 meta/
  # 如果用户已修改 config.yaml，将保留原文件在原位置
  - type: copy
    from: .spec-first/config.yaml
    to: .spec-first/meta/config.yaml
    overwrite: false

  # 5. 创建模板哈希注册表（初始版本，空）
  - type: patch
    file: .spec-first/meta/template-hashes.json
    patch:
      version: "1.0.0"
      generated: "1970-01-01T00:00:00Z"
      templates: {}
    mergeStrategy: replace

  # 6. 复制现有的 layer2 平台 YAML 到 meta（如果存在）
  # 注意：这些是用户添加的平台配置，应保留在 meta
  - type: copy
    from: .spec-first/layer2
    to: .spec-first/meta/layer2
    recursive: true
