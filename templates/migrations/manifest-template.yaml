# 迁移清单模板
# 复制此文件创建新的迁移清单

schemaVersion: "1.0"
versionRange:
  from: "X.Y.Z"           # 起始版本（不包含）
  to: "A.B.C"             # 目标版本（包含）
  fromInclusive: false   # 是否包含起始版本（可选，默认 false）
  toInclusive: true      # 是否包含目标版本（可选，默认 true）

description: "迁移描述（简要说明此迁移的目的）"

# 默认冲突策略（可选）
# 可选值：skip, overwrite, abort, prompt
# defaultConflictStrategy: skip

# 前置条件检查（可选）
# 列出必须存在的文件或目录路径
# prerequisites:
#   - ".spec-first"
#   - "specs/config.md"

# 迁移步骤列表
steps:
  # ===== 创建目录 =====
  # - type: mkdir
  #   path: path/to/directory
  #   mode: 0755  # 可选，权限模式

  # ===== 重命名/移动文件 =====
  # - type: rename
  #   from: path/from
  #   to: path/to
  #   overwrite: false  # 可选，是否覆盖已存在的目标

  # ===== 删除文件或目录 =====
  # - type: delete
  #   path: path/to/file
  #   recursive: true  # 可选，目录时是否递归删除

  # ===== 复制文件或目录 =====
  # - type: copy
  #   from: path/from
  #   to: path/to
  #   overwrite: false  # 可选，是否覆盖已存在的目标
  #   recursive: true   # 可选，目录时是否递归复制

  # ===== 补丁文件（合并到 JSON/YAML） =====
  # - type: patch
  #   file: path/to/file.yaml
  #   patch:
  #     key: value
  #     nested:
  #       key: value
  #   mergeStrategy: merge  # 可选，merge（合并）或 replace（替换），默认 merge

  # ===== 执行 Shell 命令 =====
  # - type: execute
  #   command: echo
  #   args: ["Hello", "World"]
  #   cwd: path/to  # 可选，工作目录
  #   ignoreErrors: false  # 可选，失败时是否继续执行

# ===== 常见步骤示例 =====
#
# 1. 创建新目录
#   - type: mkdir
#     path: .spec-first/meta
#
# 2. 移动配置文件（保留原文件）
#   - type: copy
#     from: config.yaml
#     to: .spec-first/meta/config.yaml
#
# 3. 删除旧文件
#   - type: delete
#     path: old-file.txt
#
# 4. 更新 YAML 配置（合并方式）
#   - type: patch
#     file: config.yaml
#     patch:
#       newKey: newValue
#     mergeStrategy: merge
#
# 5. 执行命令
#   - type: execute
#     command: npm
#     args: ["install"]
