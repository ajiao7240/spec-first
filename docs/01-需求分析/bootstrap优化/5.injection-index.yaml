version: 1

meta:
  purpose: "Route context assets for later brainstorm/plan/work/review workflows"
  strategy: "Inject the minimum useful context first, then expand only if needed"
  owner: "spec-bootstrap"
  notes:
    - "Prefer task-specific context packs over loading the full context tree"
    - "Treat code-facts as higher-priority than broad narrative docs for implementation and review"
    - "If a referenced file does not exist, skip it gracefully"

always:
  required:
    - "00-summary.md"
    - "pitfalls/index.md"
  optional:
    - "README.md"

stages:
  brainstorm:
    required:
      - "00-summary.md"
      - "architecture/system-overview.md"
    optional:
      - "architecture/module-map.md"
      - "layers/backend/index.md"
      - "layers/frontend/index.md"
      - "layers/shared/index.md"
    fallback:
      - "README.md"

  planning:
    required:
      - "00-summary.md"
      - "architecture/module-map.md"
      - "code-facts/public-entrypoints.md"
    optional:
      - "architecture/system-overview.md"
      - "architecture/integration-boundaries.md"
      - "code-facts/core-dependencies.md"
      - "layers/backend/index.md"
      - "layers/frontend/index.md"
      - "layers/data/index.md"
    fallback:
      - "README.md"

  implementing:
    required:
      - "00-summary.md"
      - "code-facts/public-entrypoints.md"
      - "code-facts/test-map.md"
    optional:
      - "code-facts/core-dependencies.md"
      - "pitfalls/index.md"
      - "architecture/module-map.md"
    fallback:
      - "README.md"

  reviewing:
    required:
      - "00-summary.md"
      - "pitfalls/index.md"
      - "code-facts/high-risk-modules.md"
    optional:
      - "code-facts/test-map.md"
      - "architecture/module-map.md"
      - "context-packs/review-change.md"
    fallback:
      - "README.md"

task_types:
  add-endpoint:
    stages:
      planning:
        required:
          - "context-packs/add-endpoint.md"
          - "code-facts/public-entrypoints.md"
          - "architecture/module-map.md"
        optional:
          - "architecture/integration-boundaries.md"
          - "code-facts/test-map.md"
          - "layers/backend/index.md"
          - "layers/frontend/index.md"
          - "database/database-er.md"
          - "database/database-index.md"
      implementing:
        required:
          - "context-packs/add-endpoint.md"
          - "code-facts/public-entrypoints.md"
          - "code-facts/test-map.md"
        optional:
          - "pitfalls/index.md"
          - "architecture/integration-boundaries.md"
          - "layers/backend/index.md"
          - "database/database-er.md"
          - "database/database-index.md"
      reviewing:
        required:
          - "context-packs/review-change.md"
          - "code-facts/test-map.md"
        optional:
          - "pitfalls/index.md"
          - "code-facts/high-risk-modules.md"

  bugfix:
    stages:
      planning:
        required:
          - "context-packs/bugfix.md"
          - "code-facts/public-entrypoints.md"
        optional:
          - "architecture/module-map.md"
          - "pitfalls/index.md"
          - "code-facts/high-risk-modules.md"
      implementing:
        required:
          - "context-packs/bugfix.md"
          - "code-facts/test-map.md"
          - "pitfalls/index.md"
        optional:
          - "code-facts/public-entrypoints.md"
          - "code-facts/high-risk-modules.md"
          - "layers/backend/index.md"
          - "layers/frontend/index.md"
      reviewing:
        required:
          - "context-packs/review-change.md"
          - "context-packs/bugfix.md"
        optional:
          - "code-facts/high-risk-modules.md"
          - "code-facts/test-map.md"

  refactor-shared:
    stages:
      planning:
        required:
          - "context-packs/refactor-shared.md"
          - "code-facts/core-dependencies.md"
          - "code-facts/high-risk-modules.md"
        optional:
          - "architecture/module-map.md"
          - "pitfalls/index.md"
          - "layers/shared/index.md"
      implementing:
        required:
          - "context-packs/refactor-shared.md"
          - "code-facts/core-dependencies.md"
          - "code-facts/test-map.md"
          - "code-facts/high-risk-modules.md"
        optional:
          - "pitfalls/index.md"
          - "layers/shared/index.md"
      reviewing:
        required:
          - "context-packs/review-change.md"
          - "context-packs/refactor-shared.md"
          - "code-facts/high-risk-modules.md"
        optional:
          - "code-facts/test-map.md"
          - "pitfalls/index.md"

  review-change:
    stages:
      reviewing:
        required:
          - "context-packs/review-change.md"
          - "code-facts/high-risk-modules.md"
          - "pitfalls/index.md"
        optional:
          - "code-facts/test-map.md"
          - "architecture/module-map.md"
          - "code-facts/core-dependencies.md"

  data-change:
    stages:
      planning:
        required:
          - "architecture/module-map.md"
        optional:
          - "layers/data/index.md"
          - "database/database-er.md"
          - "database/database-index.md"
          - "pitfalls/index.md"
      implementing:
        required:
          - "code-facts/test-map.md"
        optional:
          - "layers/data/index.md"
          - "database/database-er.md"
          - "database/database-index.md"
          - "pitfalls/index.md"
      reviewing:
        required:
          - "code-facts/high-risk-modules.md"
        optional:
          - "database/database-er.md"
          - "database/database-index.md"
          - "pitfalls/index.md"

selection_rules:
  - name: "Prefer task pack first"
    rule: "If a matching context-pack exists for the task type and stage, inject it before broader architecture docs"

  - name: "Prefer code facts for implementation"
    rule: "During implementing, prioritize code-facts over long narrative docs"

  - name: "Prefer risk docs for review"
    rule: "During reviewing, prioritize pitfalls and high-risk-modules before broader summaries"

  - name: "Prefer minimal context"
    rule: "Inject required docs first; only add optional docs if the task remains ambiguous"

  - name: "Skip missing files"
    rule: "If a referenced file does not exist, continue without failing the workflow"

  - name: "Avoid full tree injection"
    rule: "Do not inject the full docs/contexts/<slug>/ tree unless explicitly requested"

expansion_hints:
  when_to_expand:
    - "The current task crosses multiple layers"
    - "The entrypoint is unclear"
    - "The change touches shared/core/common modules"
    - "The task affects data contracts or schema"
    - "The reviewer needs likely related tests"
    - "A bug appears away from the visible failure point"

  expansion_order:
    - "context-packs/<task>.md"
    - "code-facts/*"
    - "architecture/module-map.md"
    - "architecture/system-overview.md"
    - "layers/*/index.md"
    - "database/*"

freshness:
  expected_source: "docs/contexts/<slug>/ generated by spec-bootstrap"
  note: "If the repository has changed significantly since bootstrap, treat context as partially stale and prefer code-facts plus direct code inspection"

quality_checks:
  - "Every required file should be concise enough for targeted injection"
  - "Task-specific packs should remain shorter than broad architecture docs"
  - "Review flows should always include at least one risk-oriented document"
  - "Implementation flows should always include at least one test-oriented document"