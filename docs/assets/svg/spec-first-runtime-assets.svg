<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" role="img" aria-labelledby="title desc">
  <title id="title">Spec-First Runtime Assets</title>
  <desc id="desc">A modern diagram showing how packaged source assets are adapted into project runtime assets during init --claude.</desc>
  <defs>
    <linearGradient id="bgRuntime" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0a09"/>
      <stop offset="50%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <linearGradient id="cardRuntime" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#292524"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </linearGradient>
    <linearGradient id="sourceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1e40af" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="adapterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3730a3" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="runtimeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#065f46" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#047857" stop-opacity="0.3"/>
    </linearGradient>

    <filter id="glowRuntime" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadowRuntime">
      <feDropShadow dx="0" dy="6" stdDeviation="15" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <pattern id="gridRuntime" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#292524" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <pattern id="dotsRuntime" width="15" height="15" patternUnits="userSpaceOnUse">
      <circle cx="7.5" cy="7.5" r="0.8" fill="#44403c" opacity="0.4"/>
    </pattern>

    <marker id="arrowRuntime" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="url(#bgRuntime)"/>
  <rect width="1400" height="800" fill="url(#gridRuntime)"/>
  <rect width="1400" height="800" fill="url(#dotsRuntime)"/>

  <!-- Header -->
  <text x="100" y="60" fill="#78716c" font-family="SFMono-Regular, monospace" font-size="11" font-weight="600" letter-spacing="2">SPEC-FIRST RUNTIME ASSETS</text>
  <text x="100" y="100" fill="#e7e5e4" font-family="Avenir Next, PingFang SC, sans-serif" font-size="28" font-weight="700">源资产通过本地适配器转换为运行时资产</text>
  <text x="100" y="130" fill="#a8a29e" font-family="Avenir Next, PingFang SC, sans-serif" font-size="14">
    <tspan font-family="SFMono-Regular, monospace" fill="#60a5fa">spec-first init --claude</tspan>
    <tspan> 从打包的 commands、skills、agents 和 manifest 数据中实例化项目级 .claude 树</tspan>
  </text>

  <!-- ==================== SOURCE ASSETS ==================== -->
  <g filter="url(#cardShadowRuntime)">
    <rect x="60" y="180" width="340" height="400" rx="24" fill="url(#sourceGrad)" stroke="#3b82f6" stroke-width="1.5"/>
  </g>

  <text x="100" y="220" fill="#60a5fa" font-family="Avenir Next, PingFang SC, sans-serif" font-size="18" font-weight="700">📦 Source Assets</text>
  <text x="100" y="245" fill="#a8a29e" font-family="Avenir Next, PingFang SC, sans-serif" font-size="12">npm 包中打包的规范文件</text>

  <!-- Source Asset Items -->
  <g transform="translate(100, 270)">
    <rect x="0" y="0" width="260" height="50" rx="10" fill="#1c1917" stroke="#3b82f6" stroke-width="1"/>
    <text x="20" y="22" fill="#60a5fa" font-family="SFMono-Regular, monospace" font-size="10" opacity="0.7">📁</text>
    <text x="40" y="22" fill="#a8a29e" font-family="SFMono-Regular, monospace" font-size="11">templates/claude/commands/</text>
    <text x="20" y="40" fill="#57534e" font-family="Avenir Next, sans-serif" font-size="9">spec 命令模板</text>

    <rect x="0" y="60" width="260" height="50" rx="10" fill="#1c1917" stroke="#3b82f6" stroke-width="1"/>
    <text x="20" y="82" fill="#60a5fa" font-family="SFMono-Regular, monospace" font-size="10" opacity="0.7">📁</text>
    <text x="40" y="82" fill="#a8a29e" font-family="SFMono-Regular, monospace" font-size="11">skills/</text>
    <text x="20" y="100" fill="#57534e" font-family="Avenir Next, sans-serif" font-size="9">工作流技能定义</text>

    <rect x="0" y="120" width="260" height="50" rx="10" fill="#1c1917" stroke="#3b82f6" stroke-width="1"/>
    <text x="20" y="142" fill="#60a5fa" font-family="SFMono-Regular, monospace" font-size="10" opacity="0.7">📁</text>
    <text x="40" y="142" fill="#a8a29e" font-family="SFMono-Regular, monospace" font-size="11">agents/</text>
    <text x="20" y="160" fill="#57534e" font-family="Avenir Next, sans-serif" font-size="9">代理配置和提示词</text>

    <rect x="0" y="180" width="260" height="50" rx="10" fill="#1c1917" stroke="#3b82f6" stroke-width="1"/>
    <text x="20" y="202" fill="#60a5fa" font-family="SFMono-Regular, monospace" font-size="10" opacity="0.7">⚙️</text>
    <text x="40" y="202" fill="#a8a29e" font-family="SFMono-Regular, monospace" font-size="11">.claude-plugin/plugin.json</text>
    <text x="20" y="220" fill="#57534e" font-family="Avenir Next, sans-serif" font-size="9">插件清单和元数据</text>
  </g>

  <!-- Source Tag -->
  <rect x="100" y="530" width="120" height="28" rx="14" fill="#3b82f6" opacity="0.15"/>
  <text x="160" y="548" text-anchor="middle" fill="#60a5fa" font-family="SFMono-Regular, monospace" font-size="10" font-weight="600">READ-ONLY</text>

  <!-- ==================== ADAPTER LAYER ==================== -->
  <g filter="url(#cardShadowRuntime)">
    <rect x="480" y="160" width="440" height="440" rx="28" fill="url(#adapterGrad)" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>

  <text x="520" y="200" fill="#a78bfa" font-family="Avenir Next, PingFang SC, sans-serif" font-size="18" font-weight="700">🔄 Adapter Layer</text>
  <text x="520" y="225" fill="#a8a29e" font-family="Avenir Next, PingFang SC, sans-serif" font-size="12">init --claude 将规范资产转换为项目级运行时视图</text>

  <!-- Adapter Steps -->
  <g transform="translate(520, 260)">
    <!-- Step 1 -->
    <rect x="0" y="0" width="360" height="70" rx="14" fill="#1c1917" stroke="#8b5cf6" stroke-width="1"/>
    <circle cx="30" cy="35" r="16" fill="#8b5cf6" opacity="0.15"/>
    <text x="30" y="40" text-anchor="middle" fill="#a78bfa" font-family="SFMono-Regular, monospace" font-size="12" font-weight="700">1</text>
    <text x="60" y="28" fill="#e7e5e4" font-family="Avenir Next, PingFang SC, sans-serif" font-size="13" font-weight="600">Sync Commands</text>
    <text x="60" y="48" fill="#78716c" font-family="Avenir Next, PingFang SC, sans-serif" font-size="10">同步命令模板到项目 .claude 目录</text>

    <!-- Step 2 -->
    <rect x="0" y="85" width="360" height="70" rx="14" fill="#1c1917" stroke="#8b5cf6" stroke-width="1"/>
    <circle cx="30" cy="35" r="16" fill="#8b5cf6" opacity="0.15" transform="translate(0, 85)"/>
    <text x="30" y="125" text-anchor="middle" fill="#a78bfa" font-family="SFMono-Regular, monospace" font-size="12" font-weight="700">2</text>
    <text x="60" y="113" fill="#e7e5e4" font-family="Avenir Next, PingFang SC, sans-serif" font-size="13" font-weight="600">Adapt References</text>
    <text x="60" y="133" fill="#78716c" font-family="Avenir Next, PingFang SC, sans-serif" font-size="10">适配 skill 内容中的 agent 引用路径</text>

    <!-- Step 3 -->
    <rect x="0" y="170" width="360" height="70" rx="14" fill="#1c1917" stroke="#8b5cf6" stroke-width="1"/>
    <circle cx="30" cy="35" r="16" fill="#8b5cf6" opacity="0.15" transform="translate(0, 170)"/>
    <text x="30" y="210" text-anchor="middle" fill="#a78bfa" font-family="SFMono-Regular, monospace" font-size="12" font-weight="700">3</text>
    <text x="60" y="198" fill="#e7e5e4" font-family="Avenir Next, PingFang SC, sans-serif" font-size="13" font-weight="600">Write State &amp; Prune</text>
    <text x="60" y="218" fill="#78716c" font-family="Avenir Next, PingFang SC, sans-serif" font-size="10">写入 state.json 并清理过时资产</text>
  </g>

  <!-- Adapter Note -->
  <text x="700" y="560" text-anchor="middle" fill="#57534e" font-family="Avenir Next, PingFang SC, sans-serif" font-size="11" font-style="italic">适配器不重写源包，只为目标项目渲染运行时副本</text>

  <!-- Adapter Tag -->
  <rect x="740" y="530" width="140" height="28" rx="14" fill="#8b5cf6" opacity="0.15"/>
  <text x="810" y="548" text-anchor="middle" fill="#a78bfa" font-family="SFMono-Regular, monospace" font-size="10" font-weight="600">TRANSFORM</text>

  <!-- ==================== PROJECT RUNTIME ==================== -->
  <g filter="url(#cardShadowRuntime)">
    <rect x="1000" y="180" width="340" height="400" rx="24" fill="url(#runtimeGrad)" stroke="#10b981" stroke-width="1.5"/>
  </g>

  <text x="1040" y="220" fill="#34d399" font-family="Avenir Next, PingFang SC, sans-serif" font-size="18" font-weight="700">🚀 Project Runtime</text>
  <text x="1040" y="245" fill="#a8a29e" font-family="Avenir Next, PingFang SC, sans-serif" font-size="12">本地 .claude 树是 Claude 实际执行的内容</text>

  <!-- Runtime Asset Items -->
  <g transform="translate(1040, 270)">
    <rect x="0" y="0" width="260" height="50" rx="10" fill="#1c1917" stroke="#10b981" stroke-width="1"/>
    <text x="20" y="22" fill="#34d399" font-family="SFMono-Regular, monospace" font-size="10" opacity="0.7">📁</text>
    <text x="40" y="22" fill="#a8a29e" font-family="SFMono-Regular, monospace" font-size="11">.claude/commands/spec</text>
    <text x="20" y="40" fill="#57534e" font-family="Avenir Next, sans-serif" font-size="9">spec 命令运行时</text>

    <rect x="0" y="60" width="260" height="50" rx="10" fill="#1c1917" stroke="#10b981" stroke-width="1"/>
    <text x="20" y="82" fill="#34d399" font-family="SFMono-Regular, monospace" font-size="10" opacity="0.7">📁</text>
    <text x="40" y="82" fill="#a8a29e" font-family="SFMono-Regular, monospace" font-size="11">.claude/skills</text>
    <text x="20" y="100" fill="#57534e" font-family="Avenir Next, sans-serif" font-size="9">项目级技能</text>

    <rect x="0" y="120" width="260" height="50" rx="10" fill="#1c1917" stroke="#10b981" stroke-width="1"/>
    <text x="20" y="142" fill="#34d399" font-family="SFMono-Regular, monospace" font-size="10" opacity="0.7">📁</text>
    <text x="40" y="142" fill="#a8a29e" font-family="SFMono-Regular, monospace" font-size="11">.claude/agents</text>
    <text x="20" y="160" fill="#57534e" font-family="Avenir Next, sans-serif" font-size="9">项目级代理</text>

    <rect x="0" y="180" width="260" height="50" rx="10" fill="#1c1917" stroke="#10b981" stroke-width="1"/>
    <text x="20" y="202" fill="#34d399" font-family="SFMono-Regular, monospace" font-size="10" opacity="0.7">📊</text>
    <text x="40" y="202" fill="#a8a29e" font-family="SFMono-Regular, monospace" font-size="11">.claude/spec-first/state.json</text>
    <text x="20" y="220" fill="#57534e" font-family="Avenir Next, sans-serif" font-size="9">版本和状态追踪</text>
  </g>

  <!-- Runtime Tag -->
  <rect x="1080" y="530" width="140" height="28" rx="14" fill="#10b981" opacity="0.15"/>
  <text x="1150" y="548" text-anchor="middle" fill="#34d399" font-family="SFMono-Regular, monospace" font-size="10" font-weight="600">EXECUTABLE</text>

  <!-- ==================== FLOW ARROWS ==================== -->
  <!-- Source to Adapter -->
  <path d="M 400 380 L 475 380" fill="none" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrowRuntime)"/>
  <text x="438" y="370" text-anchor="middle" fill="#57534e" font-family="SFMono-Regular, monospace" font-size="9">read</text>

  <!-- Adapter to Runtime -->
  <path d="M 925 380 L 995 380" fill="none" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrowRuntime)"/>
  <text x="960" y="370" text-anchor="middle" fill="#57534e" font-family="SFMono-Regular, monospace" font-size="9">write</text>

  <!-- ==================== FOOTER ==================== -->
  <g filter="url(#cardShadowRuntime)">
    <rect x="60" y="640" width="1280" height="100" rx="20" fill="url(#cardRuntime)" stroke="#292524"/>
  </g>

  <!-- Footer Content -->
  <g transform="translate(100, 670)">
    <text x="0" y="0" fill="#e7e5e4" font-family="Avenir Next, PingFang SC, sans-serif" font-size="14" font-weight="600">托管资产特性</text>

    <g transform="translate(0, 25)">
      <rect x="0" y="0" width="100" height="30" rx="8" fill="#3b82f6" opacity="0.15"/>
      <text x="50" y="20" text-anchor="middle" fill="#60a5fa" font-family="SFMono-Regular, monospace" font-size="10">updateable</text>

      <rect x="115" y="0" width="100" height="30" rx="8" fill="#8b5cf6" opacity="0.15"/>
      <text x="165" y="20" text-anchor="middle" fill="#a78bfa" font-family="SFMono-Regular, monospace" font-size="10">recoverable</text>

      <rect x="230" y="0" width="100" height="30" rx="8" fill="#10b981" opacity="0.15"/>
      <text x="280" y="20" text-anchor="middle" fill="#34d399" font-family="SFMono-Regular, monospace" font-size="10">cleanable</text>
    </g>
  </g>

  <g transform="translate(500, 670)">
    <text x="0" y="0" fill="#78716c" font-family="Avenir Next, PingFang SC, sans-serif" font-size="12">资产类型</text>
    <text x="0" y="25" fill="#57534e" font-family="SFMono-Regular, monospace" font-size="11">commands · skills · agents · state</text>
  </g>

  <g transform="translate(900, 670)">
    <text x="0" y="0" fill="#78716c" font-family="Avenir Next, PingFang SC, sans-serif" font-size="12">核心理念</text>
    <text x="0" y="25" fill="#57534e" font-family="Avenir Next, PingFang SC, sans-serif" font-size="11">规范源保留在包中，适配器在目标项目内实例化运行时视图</text>
  </g>

  <!-- Animated flow indicators -->
  <circle cx="438" cy="380" r="4" fill="#60a5fa">
    <animate attributeName="cx" values="400;475;400" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="960" cy="380" r="4" fill="#60a5fa">
    <animate attributeName="cx" values="925;995;925" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
</svg>
