<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Spec-First Runtime Assets</title>
  <desc id="desc">A clean diagram showing how canonical assets become project runtime assets through platform adapters.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#EEF4F8"/>
    </linearGradient>
    <linearGradient id="hero" x1="36" y1="32" x2="1244" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F2942"/>
      <stop offset="1" stop-color="#1E5B74"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF4FF"/>
      <stop offset="1" stop-color="#DCEAF8"/>
    </linearGradient>
    <linearGradient id="cardViolet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4EEFF"/>
      <stop offset="1" stop-color="#E7DCFF"/>
    </linearGradient>
    <linearGradient id="cardMint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF9F3"/>
      <stop offset="1" stop-color="#DCF1E7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#10243B" flood-opacity="0.12"/>
    </filter>
    <style>
      .h1 { font: 700 34px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #fff; }
      .h2 { font: 700 24px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #17324d; }
      .eyebrowLight { font: 700 12px "Avenir Next", "PingFang SC", Arial, sans-serif; letter-spacing: 0.12em; fill: rgba(255,255,255,0.72); text-transform: uppercase; }
      .eyebrowDark { font: 700 12px "Avenir Next", "PingFang SC", Arial, sans-serif; letter-spacing: 0.12em; fill: #5D748E; text-transform: uppercase; }
      .sub { font: 500 16px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: rgba(255,255,255,0.86); }
      .body { font: 500 15px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #4E6881; }
      .mono { font: 700 13px "SFMono-Regular", Menlo, monospace; fill: #17324d; }
      .pill { font: 700 12px "Avenir Next", "PingFang SC", Arial, sans-serif; fill: #17324d; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="36" y="32" width="1208" height="156" rx="28" fill="url(#hero)"/>
  </g>
  <text x="68" y="66" class="eyebrowLight">Canonical Assets → Platform Runtime</text>
  <text x="68" y="110" class="h1">Spec-First Runtime Model</text>
  <text x="68" y="142" class="sub">
    <tspan x="68" dy="0">同一份规范资产不会直接执行，而是通过平台适配器</tspan>
    <tspan x="68" dy="22">渲染成 Claude Code 或 Codex 的项目级运行时。</tspan>
  </text>

  <g transform="translate(930 54)">
    <rect x="0" y="0" width="260" height="108" rx="20" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.16)"/>
    <text x="130" y="28" class="eyebrowLight" text-anchor="middle">How It Works</text>
    <text x="130" y="56" class="sub" text-anchor="middle" style="font-size:14px;">read canonical assets</text>
    <text x="130" y="82" class="sub" text-anchor="middle" style="font-size:14px;">render platform runtime</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="36" y="214" width="360" height="420" rx="24" fill="url(#cardBlue)"/>
  </g>
  <text x="64" y="246" class="eyebrowDark">Source</text>
  <text x="64" y="282" class="h2">Canonical Assets</text>
  <text x="64" y="314" class="body">
    <tspan x="64" dy="0">这部分随 npm 包发布，是规范源，</tspan>
    <tspan x="64" dy="22">不直接变成项目里的可执行资产。</tspan>
  </text>
  <g transform="translate(64 348)">
    <rect x="0" y="0" width="304" height="48" rx="14" fill="#fff"/><text x="20" y="30" class="mono">templates/claude/commands/spec</text>
    <rect x="0" y="62" width="304" height="48" rx="14" fill="#fff"/><text x="20" y="92" class="mono">skills/</text>
    <rect x="0" y="124" width="304" height="48" rx="14" fill="#fff"/><text x="20" y="154" class="mono">agents/</text>
    <rect x="0" y="186" width="304" height="48" rx="14" fill="#fff"/><text x="20" y="216" class="mono">.claude-plugin/plugin.json</text>
  </g>
  <text x="64" y="590" class="body">
    <tspan x="64" dy="0">这里保留的是平台无关的工作流定义、</tspan>
    <tspan x="64" dy="22">代理资产和插件元数据。</tspan>
  </text>

  <g filter="url(#shadow)">
    <rect x="460" y="214" width="360" height="420" rx="24" fill="url(#cardViolet)"/>
  </g>
  <text x="488" y="246" class="eyebrowDark">Adapter</text>
  <text x="488" y="282" class="h2">Platform Adapter</text>
  <text x="488" y="314" class="body">
    <tspan x="488" dy="0">`spec-first init` 会按引导调用平台适配器，</tspan>
    <tspan x="488" dy="22">把规范源转换为目标项目的本地运行时。</tspan>
  </text>
  <g transform="translate(488 350)">
    <rect x="0" y="0" width="304" height="64" rx="18" fill="#fff"/>
    <text x="24" y="28" class="pill">1. 同步命令、skills、agents</text>
    <text x="24" y="48" class="body" style="font-size:13px;">按平台目录结构写入目标项目</text>

    <rect x="0" y="84" width="304" height="64" rx="18" fill="#fff"/>
    <text x="24" y="112" class="pill">2. 适配运行时引用</text>
    <text x="24" y="132" class="body" style="font-size:13px;">把源码层引用转换为平台可解析形式</text>

    <rect x="0" y="168" width="304" height="64" rx="18" fill="#fff"/>
    <text x="24" y="196" class="pill">3. 写入状态与开发者元数据</text>
    <text x="24" y="216" class="body" style="font-size:13px;">记录受管资产，支持更新、清理和诊断</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="884" y="214" width="360" height="420" rx="24" fill="url(#cardMint)"/>
  </g>
  <text x="912" y="246" class="eyebrowDark">Runtime</text>
  <text x="912" y="282" class="h2">Project Runtime</text>
  <text x="912" y="314" class="body">
    <tspan x="912" dy="0">这是 Claude Code 或 Codex 真正会读取的项目级资产，</tspan>
    <tspan x="912" dy="22">也是 `doctor`、`clean` 管理的对象。</tspan>
  </text>
  <g transform="translate(912 348)">
    <rect x="0" y="0" width="304" height="48" rx="14" fill="#fff"/><text x="20" y="30" class="mono">.claude/* or .codex/*</text>
    <rect x="0" y="62" width="304" height="48" rx="14" fill="#fff"/><text x="20" y="92" class="mono">commands/spec</text>
    <rect x="0" y="124" width="304" height="48" rx="14" fill="#fff"/><text x="20" y="154" class="mono">skills/</text>
    <rect x="0" y="186" width="304" height="48" rx="14" fill="#fff"/><text x="20" y="216" class="mono">agents/</text>
    <rect x="0" y="248" width="304" height="48" rx="14" fill="#fff"/><text x="20" y="278" class="mono">spec-first/state.json + .developer</text>
  </g>

  <g>
    <path d="M396 424H452" fill="none" stroke="#9AB5C8" stroke-width="4" stroke-linecap="round"/>
    <path d="M820 424H876" fill="none" stroke="#9AB5C8" stroke-width="4" stroke-linecap="round"/>
    <circle cx="424" cy="424" r="6" fill="#3B82F6">
      <animate attributeName="cx" values="396;452;396" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="848" cy="424" r="6" fill="#8B5CF6">
      <animate attributeName="cx" values="820;876;820" dur="2.2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g filter="url(#shadow)">
    <rect x="36" y="654" width="1208" height="30" rx="15" fill="#fff" stroke="#E2E8F0"/>
  </g>
  <text x="640" y="670" text-anchor="middle" class="body" style="font-size:14px; fill:#334155;">
    <tspan x="640" dy="0">规范源保持稳定，平台适配器负责渲染，</tspan>
    <tspan x="640" dy="20">项目运行时才是真正可执行、可清理、可恢复的资产。</tspan>
  </text>
</svg>
