<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Spec-First Workflow Cycle</title>
  <desc id="desc">A modern diagram showing the five-stage workflow cycle: brainstorm, plan, work, review, compound.</desc>
  <defs>
    <linearGradient id="bgWorkflow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0a09"/>
      <stop offset="50%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <linearGradient id="cardWorkflow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#292524"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </linearGradient>

    <!-- Stage Gradients -->
    <linearGradient id="brainstormGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="planGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="deepenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a16207" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ca8a04" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="workGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c2410c" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ea580c" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="reviewGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#be185d" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#db2777" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="compoundGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.3"/>
    </linearGradient>

    <filter id="glowWorkflow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadowWorkflow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <pattern id="gridWorkflow" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#292524" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <pattern id="dotsWorkflow" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="0.7" fill="#44403c" opacity="0.4"/>
    </pattern>

    <marker id="arrowWorkflow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ca8a04"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="url(#bgWorkflow)"/>
  <rect width="900" height="550" fill="url(#gridWorkflow)"/>
  <rect width="900" height="550" fill="url(#dotsWorkflow)"/>

  <!-- Header -->
  <text x="450" y="38" text-anchor="middle" fill="#78716c" font-family="SFMono-Regular, monospace" font-size="11" font-weight="600" letter-spacing="2">SPEC-FIRST WORKFLOW CYCLE</text>
  <text x="450" y="65" text-anchor="middle" fill="#e7e5e4" font-family="Avenir Next, PingFang SC, sans-serif" font-size="20" font-weight="700">五阶段闭环工作流</text>
  <text x="450" y="88" text-anchor="middle" fill="#78716c" font-family="Avenir Next, PingFang SC, sans-serif" font-size="11">Brainstorm → Plan → Work → Review → Compound → 循环</text>

  <!-- ==================== CONNECTION ARROWS (behind nodes) ==================== -->
  <!-- Main cycle arrows -->
  <!-- brainstorm → plan -->
  <path d="M 230 160 Q 280 110 340 130" fill="none" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowWorkflow)" opacity="0.7"/>

  <!-- plan → work -->
  <path d="M 530 180 Q 590 220 640 260" fill="none" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowWorkflow)" opacity="0.7"/>

  <!-- work → review -->
  <path d="M 640 360 Q 590 400 530 410" fill="none" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowWorkflow)" opacity="0.7"/>

  <!-- review → compound -->
  <path d="M 340 410 Q 280 400 230 360" fill="none" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowWorkflow)" opacity="0.7"/>

  <!-- compound → brainstorm (feedback loop) -->
  <path d="M 130 270 Q 100 220 130 180" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-dasharray="8 4" marker-end="url(#arrowPurple)" opacity="0.8"/>

  <!-- plan ↔ deepen-plan (bidirectional) -->
  <path d="M 530 130 L 590 130" fill="none" stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrowGold)" opacity="0.6"/>
  <path d="M 590 150 L 530 150" fill="none" stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrowGold)" opacity="0.6"/>

  <!-- ==================== STAGE NODES ==================== -->

  <!-- BRAINSTORM -->
  <g filter="url(#cardShadowWorkflow)">
    <rect x="60" y="120" width="170" height="80" rx="20" fill="url(#brainstormGrad)" stroke="#38bdf8" stroke-width="2"/>
  </g>
  <text x="145" y="152" text-anchor="middle" fill="#38bdf8" font-family="Avenir Next, PingFang SC, sans-serif" font-size="16" font-weight="700">🧠 brainstorm</text>
  <text x="145" y="175" text-anchor="middle" fill="#a8a29e" font-family="Avenir Next, PingFang SC, sans-serif" font-size="11">澄清需求 · 探索方案</text>
  <text x="145" y="192" text-anchor="middle" fill="#57534e" font-family="SFMono-Regular, monospace" font-size="9">/spec:brainstorm</text>

  <!-- PLAN -->
  <g filter="url(#cardShadowWorkflow)">
    <rect x="340" y="100" width="180" height="80" rx="20" fill="url(#planGrad)" stroke="#4ade80" stroke-width="2"/>
  </g>
  <text x="430" y="132" text-anchor="middle" fill="#4ade80" font-family="Avenir Next, PingFang SC, sans-serif" font-size="16" font-weight="700">📋 plan</text>
  <text x="430" y="155" text-anchor="middle" fill="#a8a29e" font-family="Avenir Next, PingFang SC, sans-serif" font-size="11">生成实现计划</text>
  <text x="430" y="172" text-anchor="middle" fill="#57534e" font-family="SFMono-Regular, monospace" font-size="9">/spec:plan</text>

  <!-- DEEPEN-PLAN (optional) -->
  <g filter="url(#cardShadowWorkflow)">
    <rect x="590" y="100" width="170" height="80" rx="20" fill="url(#deepenGrad)" stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="6 3"/>
  </g>
  <text x="675" y="125" text-anchor="middle" fill="#78716c" font-family="SFMono-Regular, monospace" font-size="8" letter-spacing="1">OPTIONAL</text>
  <text x="675" y="145" text-anchor="middle" fill="#ca8a04" font-family="Avenir Next, PingFang SC, sans-serif" font-size="14" font-weight="700">🔍 deepen-plan</text>
  <text x="675" y="165" text-anchor="middle" fill="#a8a29e" font-family="Avenir Next, PingFang SC, sans-serif" font-size="10">补充研究 · 深化</text>

  <!-- WORK -->
  <g filter="url(#cardShadowWorkflow)">
    <rect x="590" y="260" width="180" height="80" rx="20" fill="url(#workGrad)" stroke="#fb923c" stroke-width="2"/>
  </g>
  <text x="680" y="292" text-anchor="middle" fill="#fb923c" font-family="Avenir Next, PingFang SC, sans-serif" font-size="16" font-weight="700">⚡ work</text>
  <text x="680" y="315" text-anchor="middle" fill="#a8a29e" font-family="Avenir Next, PingFang SC, sans-serif" font-size="11">执行实现 · 开发</text>
  <text x="680" y="332" text-anchor="middle" fill="#57534e" font-family="SFMono-Regular, monospace" font-size="9">/spec:work</text>

  <!-- REVIEW -->
  <g filter="url(#cardShadowWorkflow)">
    <rect x="340" y="380" width="180" height="80" rx="20" fill="url(#reviewGrad)" stroke="#f472b6" stroke-width="2"/>
  </g>
  <text x="430" y="412" text-anchor="middle" fill="#f472b6" font-family="Avenir Next, PingFang SC, sans-serif" font-size="16" font-weight="700">🔎 review</text>
  <text x="430" y="435" text-anchor="middle" fill="#a8a29e" font-family="Avenir Next, PingFang SC, sans-serif" font-size="11">结构化评审</text>
  <text x="430" y="452" text-anchor="middle" fill="#57534e" font-family="SFMono-Regular, monospace" font-size="9">/spec:review</text>

  <!-- COMPOUND -->
  <g filter="url(#cardShadowWorkflow)">
    <rect x="60" y="280" width="170" height="80" rx="20" fill="url(#compoundGrad)" stroke="#a78bfa" stroke-width="2"/>
  </g>
  <text x="145" y="312" text-anchor="middle" fill="#a78bfa" font-family="Avenir Next, PingFang SC, sans-serif" font-size="16" font-weight="700">📚 compound</text>
  <text x="145" y="335" text-anchor="middle" fill="#a8a29e" font-family="Avenir Next, PingFang SC, sans-serif" font-size="11">知识沉淀 · 复用</text>
  <text x="145" y="352" text-anchor="middle" fill="#57534e" font-family="SFMono-Regular, monospace" font-size="9">/spec:compound</text>

  <!-- ==================== LABELS & ANNOTATIONS ==================== -->
  <!-- Feedback loop label -->
  <g transform="translate(50, 230)">
    <rect x="0" y="0" width="80" height="35" rx="6" fill="#1c1917" stroke="#a78bfa" stroke-width="1" opacity="0.8"/>
    <text x="40" y="15" text-anchor="middle" fill="#a78bfa" font-family="Avenir Next, sans-serif" font-size="9" font-weight="600">feeds future</text>
    <text x="40" y="28" text-anchor="middle" fill="#a78bfa" font-family="Avenir Next, sans-serif" font-size="9" font-weight="600">sessions</text>
  </g>

  <!-- Optional label for deepen-plan -->
  <text x="675" y="190" text-anchor="middle" fill="#57534e" font-family="Avenir Next, sans-serif" font-size="9" font-style="italic">按需调用</text>

  <!-- ==================== FOOTER INSIGHTS ==================== -->
  <g filter="url(#cardShadowWorkflow)">
    <rect x="60" y="480" width="780" height="50" rx="12" fill="url(#cardWorkflow)" stroke="#292524"/>
  </g>

  <!-- Footer content -->
  <g transform="translate(100, 505)">
    <!-- Stage indicators -->
    <circle cx="0" cy="8" r="8" fill="#38bdf8" opacity="0.8"/>
    <text x="0" y="12" text-anchor="middle" fill="#0c0a09" font-family="SFMono-Regular, monospace" font-size="8" font-weight="700">1</text>
    <text x="20" y="12" fill="#a8a29e" font-family="Avenir Next, sans-serif" font-size="9">澄清</text>

    <circle cx="80" cy="8" r="8" fill="#4ade80" opacity="0.8"/>
    <text x="80" y="12" text-anchor="middle" fill="#0c0a09" font-family="SFMono-Regular, monospace" font-size="8" font-weight="700">2</text>
    <text x="100" y="12" fill="#a8a29e" font-family="Avenir Next, sans-serif" font-size="9">计划</text>

    <circle cx="160" cy="8" r="8" fill="#fb923c" opacity="0.8"/>
    <text x="160" y="12" text-anchor="middle" fill="#0c0a09" font-family="SFMono-Regular, monospace" font-size="8" font-weight="700">3</text>
    <text x="180" y="12" fill="#a8a29e" font-family="Avenir Next, sans-serif" font-size="9">实现</text>

    <circle cx="240" cy="8" r="8" fill="#f472b6" opacity="0.8"/>
    <text x="240" y="12" text-anchor="middle" fill="#0c0a09" font-family="SFMono-Regular, monospace" font-size="8" font-weight="700">4</text>
    <text x="260" y="12" fill="#a8a29e" font-family="Avenir Next, sans-serif" font-size="9">评审</text>

    <circle cx="320" cy="8" r="8" fill="#a78bfa" opacity="0.8"/>
    <text x="320" y="12" text-anchor="middle" fill="#0c0a09" font-family="SFMono-Regular, monospace" font-size="8" font-weight="700">5</text>
    <text x="340" y="12" fill="#a8a29e" font-family="Avenir Next, sans-serif" font-size="9">沉淀</text>

    <!-- Divider -->
    <line x1="400" y1="0" x2="400" y2="20" stroke="#44403c" stroke-width="1"/>

    <!-- Core insight -->
    <text x="420" y="12" fill="#57534e" font-family="Avenir Next, PingFang SC, sans-serif" font-size="10">
      <tspan font-weight="600" fill="#78716c">核心理念：</tspan>
      <tspan>compound 阶段将知识反馈到未来会话，形成持续改进的闭环</tspan>
    </text>
  </g>

  <!-- Animated pulse on main cycle -->
  <circle cx="285" cy="135" r="5" fill="#60a5fa" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="580" cy="230" r="5" fill="#60a5fa" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle cx="580" cy="390" r="5" fill="#60a5fa" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  <circle cx="285" cy="390" r="5" fill="#60a5fa" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite" begin="0.9s"/>
  </circle>
  <circle cx="115" cy="225" r="5" fill="#a78bfa" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite" begin="1.2s"/>
  </circle>

  <!-- Center cycle indicator -->
  <circle cx="400" cy="280" r="35" fill="none" stroke="#44403c" stroke-width="1" stroke-dasharray="4 2" opacity="0.5"/>
  <text x="400" y="276" text-anchor="middle" fill="#57534e" font-family="SFMono-Regular, monospace" font-size="10" font-weight="600">CYCLE</text>
  <text x="400" y="290" text-anchor="middle" fill="#44403c" font-family="SFMono-Regular, monospace" font-size="8">闭环</text>
</svg>
