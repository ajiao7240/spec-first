<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Spec-First Workflow</title>
  <desc id="desc">A clean infographic showing the five-stage Spec-First closed-loop workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#EEF4F8"/>
    </linearGradient>
    <linearGradient id="hero" x1="36" y1="32" x2="1244" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F2942"/>
      <stop offset="1" stop-color="#1E5B74"/>
    </linearGradient>
    <linearGradient id="loopStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1D4ED8"/>
      <stop offset="0.55" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF4FF"/>
      <stop offset="1" stop-color="#DCEAF8"/>
    </linearGradient>
    <linearGradient id="cardMint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF9F3"/>
      <stop offset="1" stop-color="#DCF1E7"/>
    </linearGradient>
    <linearGradient id="cardAmber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF6E8"/>
      <stop offset="1" stop-color="#FFE8C9"/>
    </linearGradient>
    <linearGradient id="cardViolet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4EEFF"/>
      <stop offset="1" stop-color="#E7DCFF"/>
    </linearGradient>
    <radialGradient id="coreFill" cx="50%" cy="42%" r="72%">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.52" stop-color="#F1F7FF"/>
      <stop offset="1" stop-color="#DCEBFA"/>
    </radialGradient>
    <radialGradient id="coreHalo" cx="50%" cy="50%" r="75%">
      <stop offset="0" stop-color="#C7DFFF" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#C7DFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#10243B" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#3B82F6" flood-opacity="0.24"/>
    </filter>
    <style>
      .h1 { font: 700 34px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #fff; }
      .h2 { font: 700 24px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #17324d; }
      .eyebrowLight { font: 700 12px "Avenir Next", "PingFang SC", Arial, sans-serif; letter-spacing: 0.12em; fill: rgba(255,255,255,0.72); text-transform: uppercase; }
      .eyebrowDark { font: 700 12px "Avenir Next", "PingFang SC", Arial, sans-serif; letter-spacing: 0.12em; fill: #5D748E; text-transform: uppercase; }
      .sub { font: 500 16px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: rgba(255,255,255,0.86); }
      .body { font: 500 15px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #4E6881; }
      .small { font: 600 13px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #4E6881; }
      .mono { font: 700 13px "SFMono-Regular", Menlo, monospace; fill: #17324d; }
      .pill { font: 700 12px "Avenir Next", "PingFang SC", Arial, sans-serif; fill: #17324d; }
      .center { text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="36" y="32" width="1208" height="156" rx="28" fill="url(#hero)"/>
  </g>
  <text x="68" y="66" class="eyebrowLight">Closed-Loop Workflow</text>
  <text x="68" y="110" class="h1">Spec-First Workflow</text>
  <text x="68" y="142" class="sub">
    <tspan x="68" dy="0">不是一次性交付，而是通过五阶段循环，</tspan>
    <tspan x="68" dy="22">让需求、实现、评审与知识沉淀持续互相增强。</tspan>
  </text>

  <g transform="translate(934 54)">
    <rect x="0" y="0" width="256" height="108" rx="20" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.16)"/>
    <text x="128" y="28" class="eyebrowLight center">Loop Value</text>
    <text x="128" y="56" class="sub center" style="font-size:14px;">每一轮都留下更好的需求、</text>
    <text x="128" y="82" class="sub center" style="font-size:14px;">计划、评审标准与知识资产</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="36" y="214" width="260" height="470" rx="24" fill="url(#cardBlue)"/>
  </g>
  <text x="64" y="246" class="eyebrowDark">How to Read</text>
  <text x="64" y="282" class="h2">五个阶段的职责</text>
  <g transform="translate(64 314)">
    <rect x="0" y="0" width="204" height="34" rx="17" fill="#fff"/><text x="102" y="22" class="pill center">Brainstorm = 澄清需求</text>
    <rect x="0" y="50" width="204" height="34" rx="17" fill="#fff"/><text x="102" y="72" class="pill center">Plan = 拆解与设计</text>
    <rect x="0" y="100" width="204" height="34" rx="17" fill="#fff"/><text x="102" y="122" class="pill center">Work = 实施与验证</text>
    <rect x="0" y="150" width="204" height="34" rx="17" fill="#fff"/><text x="102" y="172" class="pill center">Review = 结构化审查</text>
    <rect x="0" y="200" width="204" height="34" rx="17" fill="#fff"/><text x="102" y="222" class="pill center">Compound = 知识沉淀</text>
  </g>
  <text x="64" y="582" class="body">
    <tspan x="64" dy="0">它的关键不是顺序本身，而是让上一轮的产物</tspan>
    <tspan x="64" dy="22">成为下一轮的更强输入。</tspan>
  </text>
  <text x="64" y="628" class="body">因此流程不是“做完结束”，而是“做完变强”。</text>

  <g filter="url(#shadow)">
    <rect x="316" y="214" width="568" height="470" rx="24" fill="#fff"/>
  </g>
  <text x="348" y="246" class="eyebrowDark">Core Loop</text>
  <text x="348" y="282" class="h2">五阶段工作流</text>

  <g transform="translate(600 454)">
    <circle cx="0" cy="0" r="168" fill="none" stroke="#D7E3EC" stroke-width="2.5" opacity="0.55"/>
    <circle cx="0" cy="0" r="160" fill="none" stroke="#B8CDE0" stroke-width="10" opacity="0.16"/>
    <circle cx="0" cy="0" r="160" fill="none" stroke="url(#loopStroke)" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="14 18" filter="url(#glow)">
      <animate attributeName="stroke-dashoffset" from="0" to="-64" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <g filter="url(#glow)">
      <g>
        <circle cx="0" cy="-160" r="6" fill="#60A5FA"/>
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="8s" repeatCount="indefinite"/>
      </g>
    </g>
    <circle cx="0" cy="0" r="92" fill="url(#coreHalo)" opacity="0.56">
      <animate attributeName="r" values="88;94;88" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="78" fill="url(#coreFill)" stroke="#B8D7F5" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="63" fill="none" stroke="#B8D7F5" stroke-width="1.2" stroke-opacity="0.22"/>
    <text x="0" y="-10" class="center" style="font:700 18px 'Avenir Next','PingFang SC','Helvetica Neue',Arial,sans-serif; fill:#21486C;">Spec-First</text>
    <text x="0" y="18" class="center" style="font:700 14px 'Avenir Next','PingFang SC','Helvetica Neue',Arial,sans-serif; fill:#4C6E8E;">复利型</text>
    <text x="0" y="40" class="center" style="font:700 14px 'Avenir Next','PingFang SC','Helvetica Neue',Arial,sans-serif; fill:#4C6E8E;">工程闭环</text>

    <g transform="translate(0 -160)">
      <rect x="-78" y="-28" width="156" height="56" rx="16" fill="#EAF4FF" stroke="#C8DCEE"/>
      <text x="0" y="-4" class="small center" style="font-weight:700;fill:#17324d;">Brainstorm</text>
      <text x="0" y="16" class="small center">澄清需求 / 验收标准</text>
    </g>
    <g transform="translate(160 0)">
      <rect x="-78" y="-28" width="156" height="56" rx="16" fill="#EAF9F3" stroke="#C9E2D7"/>
      <text x="0" y="-4" class="small center" style="font-weight:700;fill:#17324d;">Plan</text>
      <text x="0" y="16" class="small center">上下文 / 拆解 / 风险</text>
    </g>
    <g transform="translate(0 160)">
      <rect x="-78" y="-28" width="156" height="56" rx="16" fill="#FFF6E8" stroke="#E5D1B1"/>
      <text x="0" y="-4" class="small center" style="font-weight:700;fill:#17324d;">Work</text>
      <text x="0" y="16" class="small center">实现 / 测试 / 文档</text>
    </g>
    <g transform="translate(-160 72)">
      <rect x="-78" y="-28" width="156" height="56" rx="16" fill="#F4EEFF" stroke="#D9CCF1"/>
      <text x="0" y="-4" class="small center" style="font-weight:700;fill:#17324d;">Review</text>
      <text x="0" y="16" class="small center">结论 / 阻断 / 建议</text>
    </g>
    <g transform="translate(-160 -72)">
      <rect x="-78" y="-28" width="156" height="56" rx="16" fill="#FFF1EB" stroke="#E5CBBF"/>
      <text x="0" y="-4" class="small center" style="font-weight:700;fill:#17324d;">Compound</text>
      <text x="0" y="16" class="small center">沉淀模式 / 反哺下一轮</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="904" y="214" width="340" height="470" rx="24" fill="url(#cardMint)"/>
  </g>
  <text x="932" y="246" class="eyebrowDark">Outputs</text>
  <text x="932" y="282" class="h2">每轮都会留下什么</text>
  <g transform="translate(932 316)">
    <rect x="0" y="0" width="284" height="44" rx="14" fill="#fff"/><text x="20" y="28" class="mono">docs/brainstorms/*.md</text>
    <rect x="0" y="60" width="284" height="44" rx="14" fill="#fff"/><text x="20" y="88" class="mono">docs/plans/*.md</text>
    <rect x="0" y="120" width="284" height="44" rx="14" fill="#fff"/><text x="20" y="148" class="mono">code + tests + notes</text>
    <rect x="0" y="180" width="284" height="44" rx="14" fill="#fff"/><text x="20" y="208" class="mono">review findings + verdict</text>
    <rect x="0" y="240" width="284" height="44" rx="14" fill="#fff"/><text x="20" y="268" class="mono">docs/solutions/**/*.md</text>
  </g>
  <text x="932" y="620" class="body">
    <tspan x="932" dy="0">流程本身不是目的。</tspan>
    <tspan x="932" dy="22">可复用的文档、评审结论和知识资产，</tspan>
    <tspan x="932" dy="22">才是它持续变强的原因。</tspan>
  </text>
</svg>
