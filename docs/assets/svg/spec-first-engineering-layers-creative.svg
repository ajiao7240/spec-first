<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Spec-First Engineering Layers Creative</title>
  <desc id="desc">A creative but clean infographic showing the relationship between Prompt, Context, and Harness Engineering.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#EEF4F8"/>
    </linearGradient>
    <linearGradient id="hero" x1="36" y1="32" x2="1244" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F2942"/>
      <stop offset="1" stop-color="#1E5B74"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#10243B" flood-opacity="0.12"/>
    </filter>
    <style>
      .h1 { font: 700 34px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #fff; }
      .h2 { font: 700 24px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #17324d; }
      .eyebrowLight { font: 700 12px "Avenir Next", "PingFang SC", Arial, sans-serif; letter-spacing: 0.12em; fill: rgba(255,255,255,0.72); text-transform: uppercase; }
      .eyebrowDark { font: 700 12px "Avenir Next", "PingFang SC", Arial, sans-serif; letter-spacing: 0.12em; fill: #5D748E; text-transform: uppercase; }
      .sub { font: 500 16px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: rgba(255,255,255,0.86); }
      .body { font: 500 15px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #4E6881; }
      .small { font: 600 13px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #4E6881; }
      .mono { font: 700 12px "SFMono-Regular", Menlo, monospace; fill: #17324d; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="36" y="32" width="1208" height="156" rx="28" fill="url(#hero)"/>
  </g>
  <text x="68" y="66" class="eyebrowLight">Creative Framing</text>
  <text x="68" y="110" class="h1">
    <tspan x="68" dy="0">Think of Prompt, Context,</tspan>
    <tspan x="68" dy="36">and Harness as Three Scopes</tspan>
  </text>
  <text x="68" y="164" class="sub">
    <tspan x="68" dy="0">Prompt 决定你怎么问，Context 决定模型看到什么，</tspan>
    <tspan x="68" dy="22">Harness 决定整个系统如何运行、约束和持续改进。</tspan>
  </text>

  <g filter="url(#shadow)">
    <rect x="36" y="214" width="1208" height="470" rx="28" fill="#fff" stroke="#E2E8F0"/>
  </g>
  <text x="68" y="246" class="eyebrowDark">Visual Analogy</text>
  <text x="68" y="282" class="h2">从局部回答到系统执行</text>

  <g transform="translate(378 458)">
    <circle cx="0" cy="0" r="170" fill="none" stroke="#D6E6F2" stroke-width="34"/>
    <circle cx="0" cy="0" r="112" fill="none" stroke="#C7D9FB" stroke-width="30"/>
    <circle cx="0" cy="0" r="58" fill="none" stroke="#DDD6FE" stroke-width="26"/>
    <circle cx="0" cy="0" r="24" fill="#0F2942"/>
    <text x="0" y="-190" text-anchor="middle" class="mono">HARNESS</text>
    <text x="0" y="-128" text-anchor="middle" class="mono">CONTEXT</text>
    <text x="0" y="-70" text-anchor="middle" class="mono">PROMPT</text>
    <text x="0" y="-6" text-anchor="middle" style="font:700 14px 'Avenir Next','PingFang SC','Helvetica Neue',Arial,sans-serif; fill:#fff;">AI</text>
  </g>

  <g transform="translate(690 324)">
    <rect x="0" y="0" width="490" height="88" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="24" y="30" class="mono">Prompt = local response quality</text>
    <text x="24" y="58" class="body">
      <tspan x="24" dy="0">角色、语气、格式、局部约束，</tspan>
      <tspan x="24" dy="22">决定模型单次回答的质量和稳定性。</tspan>
    </text>

    <rect x="0" y="112" width="490" height="88" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="24" y="142" class="mono">Context = reasoning scope</text>
    <text x="24" y="170" class="body">
      <tspan x="24" dy="0">文档、历史、检索、状态和工具结果，</tspan>
      <tspan x="24" dy="22">决定模型能基于多大范围做推理。</tspan>
    </text>

    <rect x="0" y="224" width="490" height="120" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="24" y="254" class="mono">Harness = system reliability</text>
    <text x="24" y="282" class="body">
      <tspan x="24" dy="0">命令入口、工作流、评审、状态、恢复和知识沉淀，</tspan>
      <tspan x="24" dy="22">把“模型能力”升级为“工程能力”。</tspan>
    </text>
    <text x="24" y="330" class="body">
      <tspan x="24" dy="0">这也是 Spec-First 真正想做的事情：</tspan>
      <tspan x="24" dy="22">让 AI 协作从 prompt 走向可沉淀、可复用、可进化的工程实践。</tspan>
    </text>
  </g>

  <g transform="translate(690 634)">
    <rect x="0" y="0" width="490" height="32" rx="16" fill="#fff" stroke="#E2E8F0"/>
    <text x="245" y="16" text-anchor="middle" class="body" style="font-size:14px; fill:#334155;">
      <tspan x="245" dy="0">Prompt 优化局部，Context 扩大范围，</tspan>
      <tspan x="245" dy="18">Harness 决定系统能不能真正落地。</tspan>
    </text>
  </g>
</svg>
