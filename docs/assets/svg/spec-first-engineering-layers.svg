<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Prompt Context Harness Engineering Layers</title>
  <desc id="desc">A conceptual infographic showing Prompt Engineering nested inside Context Engineering, which is nested inside Harness Engineering.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="harnessFill" x1="80" y1="150" x2="760" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="contextFill" x1="150" y1="220" x2="690" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="promptFill" x1="240" y1="300" x2="600" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f5f3ff"/>
      <stop offset="1" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="panelFill" x1="820" y1="150" x2="1180" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .eyebrow { font: 700 12px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; letter-spacing: 0.14em; text-transform: uppercase; fill: #64748b; }
      .title { font: 800 34px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #0f172a; }
      .sub { font: 500 16px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #64748b; }
      .layer { font: 800 28px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #0f172a; }
      .layerSmall { font: 800 22px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #0f172a; }
      .body { font: 500 15px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #475569; }
      .tag { font: 700 12px "Avenir Next", "PingFang SC", Arial, sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #334155; }
      .mono { font: 700 12px "SFMono-Regular", "Menlo", monospace; fill: #0f172a; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <text x="640" y="72" text-anchor="middle" class="eyebrow">Spec-First Mental Model</text>
  <text x="640" y="112" text-anchor="middle" class="title">
    <tspan x="640" dy="0">Prompt lives inside Context.</tspan>
    <tspan x="640" dy="38">Context lives inside Harness.</tspan>
  </text>
  <text x="640" y="172" text-anchor="middle" class="sub">
    <tspan x="640" dy="0">Three nested engineering layers.</tspan>
    <tspan x="640" dy="22">As the layer expands, system scope and control increase.</tspan>
  </text>

  <!-- Main nested system -->
  <g filter="url(#shadow)">
    <rect x="80" y="205" width="700" height="405" rx="36" fill="url(#harnessFill)" stroke="#e2e8f0"/>
  </g>
  <text x="128" y="252" class="tag">Outer Layer</text>
  <text x="128" y="292" class="layer">Harness Engineering</text>
  <text x="128" y="324" class="body">
    <tspan x="128" dy="0">System engineering around the model:</tspan>
    <tspan x="128" dy="22">constraints, feedback loops, workflow control,</tspan>
    <tspan x="128" dy="22">observability, and continuous improvement.</tspan>
  </text>

  <g filter="url(#shadow)">
    <rect x="154" y="324" width="552" height="180" rx="30" fill="url(#contextFill)" stroke="#bfdbfe"/>
  </g>
  <text x="194" y="364" class="tag">Middle Layer</text>
  <text x="194" y="400" class="layerSmall">Context Engineering</text>
  <text x="194" y="428" class="body">
    <tspan x="194" dy="0">Information architecture, progressive disclosure,</tspan>
    <tspan x="194" dy="22">and memory management.</tspan>
  </text>

  <g filter="url(#shadow)">
    <rect x="244" y="408" width="372" height="70" rx="24" fill="url(#promptFill)" stroke="#ddd6fe"/>
  </g>
  <text x="430" y="434" text-anchor="middle" class="tag">Inner Layer</text>
  <text x="430" y="466" text-anchor="middle" class="layerSmall">Prompt Engineering</text>

  <!-- Harness capability strip -->
  <g>
    <rect x="126" y="548" width="108" height="34" rx="17" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="180" y="569" text-anchor="middle" class="mono">CI/CD</text>
    <rect x="246" y="548" width="122" height="34" rx="17" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="307" y="569" text-anchor="middle" class="mono">Linter</text>
    <rect x="380" y="548" width="122" height="34" rx="17" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="441" y="569" text-anchor="middle" class="mono">Entropy</text>
    <rect x="514" y="548" width="140" height="34" rx="17" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="584" y="569" text-anchor="middle" class="mono">Observability</text>
    <rect x="666" y="548" width="94" height="34" rx="17" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="713" y="569" text-anchor="middle" class="mono">Policy</text>
  </g>

  <!-- Right explanation panel -->
  <g filter="url(#shadow)">
    <rect x="830" y="205" width="370" height="405" rx="30" fill="url(#panelFill)" stroke="#e2e8f0"/>
  </g>
  <text x="870" y="252" class="layerSmall">How to read the stack</text>

  <g>
    <rect x="870" y="284" width="290" height="84" rx="20" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="898" y="312" class="mono">Prompt</text>
    <text x="898" y="336" class="body">
      <tspan x="898" dy="0">The smallest unit.</tspan>
      <tspan x="898" dy="20">It shapes how the model is asked.</tspan>
    </text>

    <rect x="870" y="386" width="290" height="84" rx="20" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="898" y="414" class="mono">Context</text>
    <text x="898" y="438" class="body">
      <tspan x="898" dy="0">The information boundary.</tspan>
      <tspan x="898" dy="20">It controls what the model can see.</tspan>
    </text>

    <rect x="870" y="488" width="290" height="98" rx="20" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="898" y="516" class="mono">Harness</text>
    <text x="898" y="540" class="body">
      <tspan x="898" dy="0">The operating system around the model.</tspan>
      <tspan x="898" dy="20">It governs execution, quality gates,</tspan>
      <tspan x="898" dy="20">recovery, and improvement loops.</tspan>
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="80" y="642" width="1120" height="36" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  </g>
  <text x="640" y="665" text-anchor="middle" class="body" style="font-size:14px; fill:#334155;">
    Better prompts improve local responses. Better context expands reasoning scope. Better harness changes system reliability.
  </text>
</svg>
