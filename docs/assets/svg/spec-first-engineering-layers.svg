<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Spec-First Engineering Layers</title>
  <desc id="desc">A clear diagram showing Prompt inside Context, and Context inside Harness.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#EEF4F8"/>
    </linearGradient>
    <linearGradient id="hero" x1="36" y1="32" x2="1244" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F2942"/>
      <stop offset="1" stop-color="#1E5B74"/>
    </linearGradient>
    <linearGradient id="outer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="middle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5F3FF"/>
      <stop offset="1" stop-color="#EDE9FE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#10243B" flood-opacity="0.12"/>
    </filter>
    <style>
      .h1 { font: 700 34px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #fff; }
      .h2 { font: 700 24px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #17324d; }
      .eyebrowLight { font: 700 12px "Avenir Next", "PingFang SC", Arial, sans-serif; letter-spacing: 0.12em; fill: rgba(255,255,255,0.72); text-transform: uppercase; }
      .eyebrowDark { font: 700 12px "Avenir Next", "PingFang SC", Arial, sans-serif; letter-spacing: 0.12em; fill: #5D748E; text-transform: uppercase; }
      .sub { font: 500 16px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: rgba(255,255,255,0.86); }
      .body { font: 500 15px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #4E6881; }
      .mono { font: 700 12px "SFMono-Regular", Menlo, monospace; fill: #17324d; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="36" y="32" width="1208" height="156" rx="28" fill="url(#hero)"/>
  </g>
  <text x="68" y="66" class="eyebrowLight">Spec-First Mental Model</text>
  <text x="68" y="110" class="h1">
    <tspan x="68" dy="0">Prompt lives inside Context.</tspan>
    <tspan x="68" dy="36">Context lives inside Harness.</tspan>
  </text>
  <text x="68" y="164" class="sub">
    <tspan x="68" dy="0">随着层级向外扩展，控制边界从一句提示词，</tspan>
    <tspan x="68" dy="22">扩展到信息边界，再扩展到整个执行系统。</tspan>
  </text>

  <g filter="url(#shadow)">
    <rect x="36" y="214" width="760" height="470" rx="28" fill="url(#outer)" stroke="#E2E8F0"/>
  </g>
  <text x="68" y="246" class="eyebrowDark">Nested Stack</text>
  <text x="68" y="282" class="h2">三层嵌套工程结构</text>

  <g filter="url(#shadow)">
    <rect x="88" y="314" width="656" height="316" rx="36" fill="url(#outer)" stroke="#D6E6F2"/>
  </g>
  <text x="130" y="358" class="mono">OUTER LAYER</text>
  <text x="130" y="392" class="h2" style="font-size:28px;">Harness Engineering</text>
  <text x="130" y="420" class="body">
    <tspan x="130" dy="0">系统工程：约束机制、反馈回路、工作流控制、</tspan>
    <tspan x="130" dy="22">可观测性、恢复与持续改进。</tspan>
  </text>

  <g filter="url(#shadow)">
    <rect x="162" y="412" width="508" height="148" rx="30" fill="url(#middle)" stroke="#BFDBFE"/>
  </g>
  <text x="198" y="448" class="mono">MIDDLE LAYER</text>
  <text x="198" y="480" class="h2" style="font-size:24px;">Context Engineering</text>
  <text x="198" y="506" class="body">
    <tspan x="198" dy="0">上下文设计：信息架构、渐进披露、记忆管理，</tspan>
    <tspan x="198" dy="22">以及模型“能看见什么”。</tspan>
  </text>

  <g filter="url(#shadow)">
    <rect x="254" y="474" width="324" height="64" rx="24" fill="url(#inner)" stroke="#DDD6FE"/>
  </g>
  <text x="416" y="512" text-anchor="middle" class="h2" style="font-size:22px;">Prompt Engineering</text>

  <g>
    <rect x="124" y="576" width="110" height="34" rx="17" fill="#fff" stroke="#E2E8F0"/><text x="179" y="598" text-anchor="middle" class="mono">CI/CD</text>
    <rect x="246" y="576" width="110" height="34" rx="17" fill="#fff" stroke="#E2E8F0"/><text x="301" y="598" text-anchor="middle" class="mono">Linter</text>
    <rect x="368" y="576" width="110" height="34" rx="17" fill="#fff" stroke="#E2E8F0"/><text x="423" y="598" text-anchor="middle" class="mono">Entropy</text>
    <rect x="490" y="576" width="140" height="34" rx="17" fill="#fff" stroke="#E2E8F0"/><text x="560" y="598" text-anchor="middle" class="mono">Observability</text>
    <rect x="642" y="576" width="94" height="34" rx="17" fill="#fff" stroke="#E2E8F0"/><text x="689" y="598" text-anchor="middle" class="mono">Policy</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="824" y="214" width="420" height="470" rx="28" fill="#fff" stroke="#E2E8F0"/>
  </g>
  <text x="856" y="246" class="eyebrowDark">How to Read</text>
  <text x="856" y="282" class="h2">每层负责什么</text>

  <g transform="translate(856 322)">
    <rect x="0" y="0" width="324" height="92" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="24" y="30" class="mono">Prompt</text>
    <text x="24" y="56" class="body">
      <tspan x="24" dy="0">最小单元。它决定模型被如何提问，</tspan>
      <tspan x="24" dy="22">以及回答格式、角色、约束。</tspan>
    </text>

    <rect x="0" y="114" width="324" height="92" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="24" y="144" class="mono">Context</text>
    <text x="24" y="170" class="body">
      <tspan x="24" dy="0">信息边界。它决定模型能看见哪些文档、</tspan>
      <tspan x="24" dy="22">历史、状态和工具结果。</tspan>
    </text>

    <rect x="0" y="228" width="324" height="114" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="24" y="258" class="mono">Harness</text>
    <text x="24" y="284" class="body">
      <tspan x="24" dy="0">执行系统。它决定命令入口、工作流、质量门、</tspan>
      <tspan x="24" dy="22">恢复机制和持续改进。</tspan>
    </text>
  </g>
</svg>
