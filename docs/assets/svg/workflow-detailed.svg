  <rect x="505" y="160" width="160" height="28" rx="8" fill="#FFFFFF" stroke="#E5D1B1" stroke-width="1" opacity="0.85"/>
  <text x="585" y="179" text-anchor="middle"
        font="500 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif"
