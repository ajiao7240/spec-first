  <rect x="710" y="65" width="190" height="170" rx="14" fill="#F4EEFF" stroke="#D9CCF1" stroke-width="2" filter="url(#shadow)"/>
  <text x="805" y="92" text-anchor="middle"
        font="700 14px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif"
