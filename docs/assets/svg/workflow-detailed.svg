  <line x1="524" y1="670" x2="700" y2="670" stroke="#E5D1B1" stroke-width="1"/>

  <!-- Review & Compound Details (stacked) -->
  <rect x="736" y="530" width="220" height="95" rx="14" fill="#FFFFFF" stroke="#D9CCF1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="846" y="555" text-anchor="middle"
        font="700 14px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif"
