  <!-- ========== Main Flow Arrows ========== -->
  <path d="M 240 136 L 270 136" stroke="#3B82F6" stroke-width="2.5" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 460 150 L 490 150" stroke="#3B82F6" stroke-width="2.5" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 680 150 L 710 150" stroke="#3B82F6" stroke-width="2.5" fill="none" marker-end="url(#arrowhead)"/>
  <!-- Review -> Compound: down then left -->
  <path d="M 805 235 L 805 255 L 475 255 L 475 280" stroke="#3B82F6" stroke-width="2.5" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Cycle Arrow: Compound back to Brainstorm -->
  <path d="M 380 390 L 310 390 L 310 460 L 145 460 L 145 210 L 145 207"
        stroke="#F59E0B" stroke-width="2" fill="none" stroke-dasharray="6,4" marker-end="url(#arrowhead-orange)"/>
  <text x="225" y="456" text-anchor="middle"
        font="600 11px 'SFMono-Regular', Menlo, 'Courier New', monospace"
        fill="#4E6881">持续迭代</text>

