<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 780">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7FAFC"/>
      <stop offset="100%" stop-color="#EEF4F8"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#10243B" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3B82F6"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F59E0B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="780" fill="url(#bg-grad)"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle"
        font="700 14px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif"
        fill="#17324D">Spec-First 工作流详细步骤</text>

  <!--
    Layout: 4 stage cards in a row at y=65
    Card width=190, gap=30
    x positions: 50, 270, 490, 710
    Each card: title area 50px, substep area = N * 28px + padding
  -->

  <!-- ========== Stage 1: Brainstorm (2 substeps) ========== -->
  <rect x="50" y="65" width="190" height="142" rx="14" fill="#EAF4FF" stroke="#B8D7F5" stroke-width="2" filter="url(#shadow)"/>
  <text x="145" y="92" text-anchor="middle"
        font="700 14px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif"
        fill="#17324D">1. Brainstorm</text>
  <text x="145" y="112" text-anchor="middle"
        font="600 12px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif"
        fill="#1E5B74">需求澄清</text>

  <rect x="65" y="125" width="160" height="28" rx="8" fill="#FFFFFF" stroke="#B8D7F5" stroke-width="1" opacity="0.85"/>
  <text x="145" y="144" text-anchor="middle"
        font="500 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif"
        fill="#5D748E">分析需求背景</text>

  <rect x="65" y="160" width="160" height="28" rx="8" fill="#FFFFFF" stroke="#B8D7F5" stroke-width="1" opacity="0.85"/>
  <text x="145" y="179" text-anchor="middle"
        font="500 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif"
        fill="#5D748E">识别关键问题</text>

  <!-- ========== Stage 2: Plan (3 substeps) ========== -->
  <rect x="270" y="65" width="190" height="170" rx="14" fill="#EAF9F3" stroke="#B5DBC9" stroke-width="2" filter="url(#shadow)"/>
  <text x="365" y="92" text-anchor="middle"
        font="700 14px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif"
        fill="#17324D">2. Plan</text>
  <text x="365" y="112" text-anchor="middle"
        font="600 12px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif"
        fill="#1E5B74">方案设计</text>

  <rect x="285" y="125" width="160" height="28" rx="8" fill="#FFFFFF" stroke="#B5DBC9" stroke-width="1" opacity="0.85"/>
  <text x="365" y="144" text-anchor="middle"
        font="500 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif"
