        font="700 14px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif"
        fill="#17324D">Plan 关键活动</text>
  <text x="292" y="580"
        font="500 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif"
        fill="#5D748E">- 设计技术方案</text>
  <text x="292" y="600"
        font="500 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif"
        fill="#5D748E">- 分解实施任务</text>
  <text x="292" y="620"
        font="500 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif"
        fill="#5D748E">- 评估技术风险</text>
  <text x="292" y="640"
        font="500 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif"
        fill="#5D748E">- 制定测试策略</text>
  <text x="292" y="660"
        font="500 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif"
