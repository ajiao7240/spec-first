  <line x1="292" y1="670" x2="468" y2="670" stroke="#B5DBC9" stroke-width="1"/>

  <!-- Work Details -->
  <rect x="504" y="530" width="215" height="195" rx="14" fill="#FFFFFF" stroke="#E5D1B1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="611" y="555" text-anchor="middle"
        font="700 14px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif"
