<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Spec-First Engineering Layers Deep</title>
  <desc id="desc">An expanded knowledge map of Prompt, Context, and Harness Engineering.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#EEF4F8"/>
    </linearGradient>
    <linearGradient id="hero" x1="36" y1="32" x2="1244" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F2942"/>
      <stop offset="1" stop-color="#1E5B74"/>
    </linearGradient>
    <linearGradient id="outer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="middle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5F3FF"/>
      <stop offset="1" stop-color="#EDE9FE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#10243B" flood-opacity="0.12"/>
    </filter>
    <style>
      .h1 { font: 700 34px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #fff; }
      .h2 { font: 700 24px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #17324d; }
      .eyebrowLight { font: 700 12px "Avenir Next", "PingFang SC", Arial, sans-serif; letter-spacing: 0.12em; fill: rgba(255,255,255,0.72); text-transform: uppercase; }
      .eyebrowDark { font: 700 12px "Avenir Next", "PingFang SC", Arial, sans-serif; letter-spacing: 0.12em; fill: #5D748E; text-transform: uppercase; }
      .sub { font: 500 16px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: rgba(255,255,255,0.86); }
      .body { font: 500 15px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #4E6881; }
      .mono { font: 700 12px "SFMono-Regular", Menlo, monospace; fill: #17324d; }
      .pill { font: 700 12px "Avenir Next", "PingFang SC", Arial, sans-serif; fill: #17324d; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="36" y="32" width="1208" height="156" rx="28" fill="url(#hero)"/>
  </g>
  <text x="68" y="66" class="eyebrowLight">Expanded Knowledge Map</text>
  <text x="68" y="110" class="h1">Three Engineering Layers</text>
  <text x="68" y="142" class="sub">
    <tspan x="68" dy="0">同样的三层结构，用更完整的视角解释它们分别控制什么，</tspan>
    <tspan x="68" dy="22">以及为什么 Harness 才是系统可靠性的来源。</tspan>
  </text>

  <g filter="url(#shadow)">
    <rect x="36" y="214" width="520" height="470" rx="28" fill="#fff" stroke="#E2E8F0"/>
  </g>
  <text x="68" y="246" class="eyebrowDark">Nested View</text>
  <text x="68" y="282" class="h2">作用域逐层扩大</text>
  <g transform="translate(296 452)">
    <circle cx="0" cy="0" r="180" fill="none" stroke="#D6E6F2" stroke-width="36"/>
    <circle cx="0" cy="0" r="118" fill="none" stroke="#C7D9FB" stroke-width="32"/>
    <circle cx="0" cy="0" r="62" fill="none" stroke="#DDD6FE" stroke-width="28"/>
    <circle cx="0" cy="0" r="26" fill="#0F2942"/>
    <text x="0" y="-188" text-anchor="middle" class="mono">HARNESS ENGINEERING</text>
    <text x="0" y="-126" text-anchor="middle" class="mono">CONTEXT ENGINEERING</text>
    <text x="0" y="-70" text-anchor="middle" class="mono">PROMPT ENGINEERING</text>
    <text x="0" y="-8" text-anchor="middle" style="font:700 14px 'Avenir Next','PingFang SC','Helvetica Neue',Arial,sans-serif; fill:#fff;">AI</text>
  </g>
  <g transform="translate(88 590)">
    <rect x="0" y="0" width="110" height="34" rx="17" fill="#fff" stroke="#E2E8F0"/><text x="55" y="22" text-anchor="middle" class="mono">Prompt</text>
    <rect x="124" y="0" width="110" height="34" rx="17" fill="#fff" stroke="#E2E8F0"/><text x="179" y="22" text-anchor="middle" class="mono">Context</text>
    <rect x="248" y="0" width="110" height="34" rx="17" fill="#fff" stroke="#E2E8F0"/><text x="303" y="22" text-anchor="middle" class="mono">Harness</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="580" y="214" width="664" height="470" rx="28" fill="#fff" stroke="#E2E8F0"/>
  </g>
  <text x="612" y="246" class="eyebrowDark">Layer Breakdown</text>
  <text x="612" y="282" class="h2">每层分别控制什么</text>

  <g transform="translate(612 320)">
    <rect x="0" y="0" width="600" height="88" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="24" y="30" class="pill">Prompt Engineering</text>
    <text x="24" y="58" class="body">
      <tspan x="24" dy="0">控制问法、角色、格式和局部约束。</tspan>
      <tspan x="24" dy="22">它能改善单次回答质量，但影响范围仍然局限在这一次调用。</tspan>
    </text>

    <rect x="0" y="112" width="600" height="108" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="24" y="142" class="pill">Context Engineering</text>
    <text x="24" y="170" class="body">
      <tspan x="24" dy="0">控制信息边界：文档、历史、记忆、检索结果和工具输出。</tspan>
      <tspan x="24" dy="22">它决定模型能基于哪些信息进行推理。</tspan>
    </text>
    <text x="24" y="216" class="body">这一层让模型“不只是会答”，而是“有足够上下文可答”。</text>

    <rect x="0" y="244" width="600" height="140" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="24" y="274" class="pill">Harness Engineering</text>
    <text x="24" y="302" class="body">
      <tspan x="24" dy="0">控制执行系统：命令入口、工作流、质量门、恢复、状态、评审和知识沉淀。</tspan>
    </text>
    <text x="24" y="334" class="body">
      <tspan x="24" dy="0">这层不只是“给模型更多信息”，而是在模型之外建立稳定的系统边界，</tspan>
      <tspan x="24" dy="22">决定它能否工程化落地。</tspan>
    </text>

    <rect x="0" y="406" width="600" height="42" rx="21" fill="#fff" stroke="#E2E8F0"/>
    <text x="300" y="426" text-anchor="middle" class="body" style="font-size:14px; fill:#334155;">
      <tspan x="300" dy="0">更好的 Prompt 改善局部响应，更好的 Context 扩大推理范围，</tspan>
      <tspan x="300" dy="20">更好的 Harness 改变系统可靠性。</tspan>
    </text>
  </g>
</svg>
