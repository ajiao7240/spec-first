<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#EEF4F8"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#10243B" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowSm" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#10243B" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font="700 18px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#17324D">风险评估矩阵</text>
  <text x="400" y="58" text-anchor="middle" font="500 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#94A3B8">基于影响程度和发生概率，对变更项进行风险分级</text>

  <!-- Matrix area: starts at x=90 y=80, each cell 140x100 -->
  <!-- Column headers (影响程度) -->
  <text x="160" y="90" text-anchor="middle" font="600 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#5D748E">低影响</text>
  <text x="310" y="90" text-anchor="middle" font="600 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#5D748E">中影响</text>
  <text x="460" y="90" text-anchor="middle" font="600 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#5D748E">高影响</text>

  <!-- Row headers (发生概率) -->
  <text x="80" y="158" text-anchor="end" font="600 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#5D748E">高概率</text>
  <text x="80" y="268" text-anchor="end" font="600 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#5D748E">中概率</text>
  <text x="80" y="378" text-anchor="end" font="600 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#5D748E">低概率</text>

  <!-- Axis labels -->
  <text x="310" y="475" text-anchor="middle" font="700 12px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#1E5B74">影响程度 (Impact)</text>
  <text x="30" y="280" text-anchor="middle" font="700 12px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#1E5B74" transform="rotate(-90 30 280)">发生概率 (Probability)</text>

  <!-- Row 1: 高概率 -->
  <!-- 高概率 × 低影响 = 中风险 -->
  <g filter="url(#shadowSm)">
    <rect x="92" y="100" width="136" height="100" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  </g>
  <text x="160" y="135" text-anchor="middle" font="600 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#92400E">中风险</text>
  <text x="160" y="155" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#92400E">依赖更新</text>
  <text x="160" y="172" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#92400E">配置修改</text>
  <text x="160" y="189" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#92400E">文档格式</text>

  <!-- 高概率 × 中影响 = 高风险 -->
  <g filter="url(#shadowSm)">
    <rect x="242" y="100" width="136" height="100" rx="10" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  </g>
  <text x="310" y="135" text-anchor="middle" font="600 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#991B1B">高风险</text>
  <text x="310" y="155" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#991B1B">API 变更</text>
  <text x="310" y="172" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#991B1B">安全相关</text>
  <text x="310" y="189" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#991B1B">数据库迁移</text>

  <!-- 高概率 × 高影响 = 高风险 -->
  <g filter="url(#shadowSm)">
    <rect x="392" y="100" width="136" height="100" rx="10" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  </g>
  <text x="460" y="135" text-anchor="middle" font="600 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#991B1B">高风险</text>
  <text x="460" y="155" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#991B1B">架构重构</text>
  <text x="460" y="172" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#991B1B">核心模块</text>
  <text x="460" y="189" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#991B1B">重大变更</text>

  <!-- Row 2: 中概率 -->
  <!-- 中概率 × 低影响 = 低风险 -->
  <g filter="url(#shadowSm)">
    <rect x="92" y="210" width="136" height="100" rx="10" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  </g>
  <text x="160" y="245" text-anchor="middle" font="600 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#166534">低风险</text>
  <text x="160" y="265" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#166534">字体/样式</text>
  <text x="160" y="282" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#166534">目录结构</text>
  <text x="160" y="299" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#166534">文档格式</text>

  <!-- 中概率 × 中影响 = 中风险 -->
  <g filter="url(#shadowSm)">
    <rect x="242" y="210" width="136" height="100" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  </g>
  <text x="310" y="245" text-anchor="middle" font="600 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#92400E">中风险</text>
  <text x="310" y="265" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#92400E">API 变更</text>
  <text x="310" y="282" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#92400E">依赖更新</text>
  <text x="310" y="299" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#92400E">配置修改</text>

  <!-- 中概率 × 高影响 = 高风险 -->
  <g filter="url(#shadowSm)">
    <rect x="392" y="210" width="136" height="100" rx="10" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  </g>
  <text x="460" y="245" text-anchor="middle" font="600 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#991B1B">高风险</text>
  <text x="460" y="265" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#991B1B">架构重构</text>
  <text x="460" y="282" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#991B1B">数据库迁移</text>
  <text x="460" y="299" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#991B1B">安全相关</text>

  <!-- Row 3: 低概率 -->
  <!-- 低概率 × 低影响 = 低风险 -->
  <g filter="url(#shadowSm)">
    <rect x="92" y="320" width="136" height="100" rx="10" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  </g>
  <text x="160" y="355" text-anchor="middle" font="600 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#166534">低风险</text>
  <text x="160" y="375" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#166534">字体/样式</text>
  <text x="160" y="392" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#166534">文档格式</text>
  <text x="160" y="409" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#166534">代码注释</text>

  <!-- 低概率 × 中影响 = 低风险 -->
  <g filter="url(#shadowSm)">
    <rect x="242" y="320" width="136" height="100" rx="10" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  </g>
  <text x="310" y="355" text-anchor="middle" font="600 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#166534">低风险</text>
  <text x="310" y="375" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#166534">依赖更新</text>
  <text x="310" y="392" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#166534">目录结构</text>
  <text x="310" y="409" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#166534">文档格式</text>

  <!-- 低概率 × 高影响 = 中风险 -->
  <g filter="url(#shadowSm)">
    <rect x="392" y="320" width="136" height="100" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  </g>
  <text x="460" y="355" text-anchor="middle" font="600 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#92400E">中风险</text>
  <text x="460" y="375" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#92400E">配置修改</text>
  <text x="460" y="392" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#92400E">API 变更</text>
  <text x="460" y="409" text-anchor="middle" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#92400E">依赖更新</text>

  <!-- Right side: 应对策略 panel -->
  <g filter="url(#shadow)">
    <rect x="555" y="100" width="230" height="320" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  </g>
  <text x="670" y="128" text-anchor="middle" font="700 14px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#17324D">应对策略</text>

  <!-- 高风险策略 -->
  <rect x="575" y="148" width="190" height="76" rx="10" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <rect x="575" y="148" width="6" height="76" rx="3" fill="#EF4444"/>
  <text x="590" y="168" font="700 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#991B1B">高风险</text>
  <text x="590" y="185" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#991B1B">必须有应对方案才能继续</text>
  <text x="590" y="200" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#991B1B">需要审批确认和回滚计划</text>
  <text x="590" y="215" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#991B1B">设置检查点和熔断机制</text>

  <!-- 中风险策略 -->
  <rect x="575" y="236" width="190" height="76" rx="10" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <rect x="575" y="236" width="6" height="76" rx="3" fill="#F59E0B"/>
  <text x="590" y="256" font="700 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#92400E">中风险</text>
  <text x="590" y="273" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#92400E">需要评估影响范围</text>
  <text x="590" y="288" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#92400E">准备备选方案 (Plan B)</text>
  <text x="590" y="303" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#92400E">关注变更的连锁反应</text>

  <!-- 低风险策略 -->
  <rect x="575" y="324" width="190" height="76" rx="10" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <rect x="575" y="324" width="6" height="76" rx="3" fill="#22C55E"/>
  <text x="590" y="344" font="700 11px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#166534">低风险</text>
  <text x="590" y="361" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#166534">记录即可，按需处理</text>
  <text x="590" y="376" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#166534">可批量合并处理</text>
  <text x="590" y="391" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#166534">不阻塞主流程推进</text>

  <!-- Legend at bottom right -->
  <text x="590" y="440" font="600 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#94A3B8">使用方法:</text>
  <text x="590" y="456" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#94A3B8">将变更项按影响与概率</text>
  <text x="590" y="470" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#94A3B8">填入对应单元格，据此</text>
  <text x="590" y="484" font="500 10px 'Avenir Next', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" fill="#94A3B8">安排执行优先级</text>
</svg>
