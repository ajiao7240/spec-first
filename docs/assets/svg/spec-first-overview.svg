<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Spec-First Overview</title>
  <desc id="desc">A one-page infographic showing how Spec-First turns AI coding from ad-hoc chat into a managed engineering workflow.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#EEF4F8"/>
    </linearGradient>

    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F2942"/>
      <stop offset="1" stop-color="#1E5B74"/>
    </linearGradient>

    <linearGradient id="heroBeam" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.34" stop-color="#CDEBFF" stop-opacity="0.06"/>
      <stop offset="0.5" stop-color="#EAF8FF" stop-opacity="0.14"/>
      <stop offset="0.66" stop-color="#9FD5FF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="heroGlow" cx="76%" cy="22%" r="48%">
      <stop offset="0" stop-color="#7CCBFF" stop-opacity="0.14"/>
      <stop offset="0.48" stop-color="#7CCBFF" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#7CCBFF" stop-opacity="0"/>
    </radialGradient>

    <pattern id="heroTexture" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M0 28H56" stroke="#FFFFFF" stroke-opacity="0.025" stroke-width="1"/>
      <path d="M28 0V56" stroke="#FFFFFF" stroke-opacity="0.018" stroke-width="1"/>
      <circle cx="6" cy="6" r="1.05" fill="#FFFFFF" opacity="0.045"/>
      <circle cx="38" cy="18" r="0.95" fill="#FFFFFF" opacity="0.035"/>
      <circle cx="20" cy="42" r="0.95" fill="#FFFFFF" opacity="0.03"/>
    </pattern>

    <clipPath id="heroClip">
      <rect x="36" y="32" width="1208" height="156" rx="28"/>
    </clipPath>

    <linearGradient id="cardBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF4FF"/>
      <stop offset="1" stop-color="#DCEAF8"/>
    </linearGradient>

    <linearGradient id="cardMint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF9F3"/>
      <stop offset="1" stop-color="#DCF1E7"/>
    </linearGradient>

    <linearGradient id="cardAmber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF6E8"/>
      <stop offset="1" stop-color="#FFE8C9"/>
    </linearGradient>

    <linearGradient id="cardViolet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4EEFF"/>
      <stop offset="1" stop-color="#E7DCFF"/>
    </linearGradient>

    <linearGradient id="loopStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1D4ED8"/>
      <stop offset="0.55" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>

    <radialGradient id="coreFill" cx="50%" cy="42%" r="70%">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.5" stop-color="#F1F7FF"/>
      <stop offset="1" stop-color="#DCEBFA"/>
    </radialGradient>

    <radialGradient id="coreHalo" cx="50%" cy="50%" r="75%">
      <stop offset="0" stop-color="#C7DFFF" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#C7DFFF" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#10243B" flood-opacity="0.12"/>
    </filter>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#3B82F6" flood-opacity="0.32"/>
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#38BDF8" flood-opacity="0.18"/>
    </filter>

    <style>
      .h1 { font: 800 38px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #fff; letter-spacing: -0.02em; }
      .h2 { font: 700 24px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #17324d; }
      .eyebrowLight { font: 700 12px "Avenir Next", "PingFang SC", Arial, sans-serif; letter-spacing: 0.12em; fill: rgba(255,255,255,0.72); text-transform: uppercase; }
      .eyebrowDark { font: 700 12px "Avenir Next", "PingFang SC", Arial, sans-serif; letter-spacing: 0.12em; fill: #5D748E; text-transform: uppercase; }
      .sub { font: 500 14px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: rgba(255,255,255,0.86); }
      .body { font: 500 15px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #4E6881; }
      .small { font: 600 13px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #4E6881; }
      .mono { font: 700 13px "SFMono-Regular", Menlo, monospace; fill: #17324d; }
      .pill { font: 700 12px "Avenir Next", "PingFang SC", Arial, sans-serif; fill: #17324d; }
      .whiteSmall { font: 600 13px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: rgba(255,255,255,0.88); }
      .center { text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="36" y="32" width="1208" height="156" rx="28" fill="url(#hero)"/>
  </g>
  <rect x="36" y="32" width="1208" height="156" rx="28" fill="url(#heroGlow)"/>
  <rect x="36" y="32" width="1208" height="156" rx="28" fill="url(#heroTexture)" opacity="0.7"/>
  <g clip-path="url(#heroClip)">
    <rect x="-220" y="70" width="1560" height="26" rx="13" fill="url(#heroBeam)" transform="rotate(-11 640 83)" opacity="0.72"/>
    <circle cx="1014" cy="266" r="228" fill="none" stroke="#FFFFFF" stroke-opacity="0.09" stroke-width="2.4"/>
  </g>
  <text x="68" y="66" class="eyebrowLight">Harness Engineering for Claude Code and Codex</text>
  <text x="68" y="104" class="h1">Spec-First</text>
  <text x="68" y="146" class="sub">把 AI 编码从一次性对话，升级为可沉淀、可复用、可进化的工程最佳实践</text>

  <g transform="translate(924 54)">
    <rect x="0" y="0" width="280" height="108" rx="20" fill="rgba(255,255,255,0.11)" stroke="rgba(255,255,255,0.18)"/>
    <text x="140" y="31" class="eyebrowLight center">How It Runs</text>
    <text x="140" y="56" class="whiteSmall center" style="font-size:14px;font-weight:700;">稳定入口驱动</text>

    <rect x="18" y="68" width="74" height="24" rx="12" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.22)"/>
    <text x="55" y="80" class="whiteSmall center">入口</text>

    <rect x="103" y="68" width="74" height="24" rx="12" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.20)"/>
    <text x="140" y="80" class="whiteSmall center">流程</text>

    <rect x="188" y="68" width="74" height="24" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.18)"/>
    <text x="225" y="80" class="whiteSmall center">状态</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="36" y="214" width="360" height="228" rx="24" fill="url(#cardBlue)"/>
  </g>
  <text x="64" y="246" class="eyebrowDark">Why Now</text>
  <text x="64" y="282" class="h2">AI Coding 的真实问题</text>

  <g transform="translate(64 306)">
    <circle cx="8" cy="8" r="8" fill="#3E84C5"/>
    <text x="28" y="13" class="body">需求只存在于聊天里，容易漂移</text>

    <circle cx="8" cy="46" r="8" fill="#3E84C5"/>
    <text x="28" y="51" class="body">计划和实现没有稳定连接</text>

    <circle cx="8" cy="84" r="8" fill="#3E84C5"/>
    <text x="28" y="89" class="body">Review 没有结构化结论</text>

    <circle cx="8" cy="122" r="8" fill="#3E84C5"/>
    <text x="28" y="127" class="body">经验无法回流到下一轮开发</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="416" y="214" width="448" height="470" rx="24" fill="#ffffff"/>
  </g>
  <text x="448" y="246" class="eyebrowDark">Closed Loop</text>
  <text x="448" y="282" class="h2">五阶段工作流</text>

  <g transform="translate(640 472)">
    <circle cx="0" cy="0" r="148" fill="none" stroke="#D7E3EC" stroke-width="2.5" opacity="0.55"/>
    <circle cx="0" cy="0" r="142" fill="none" stroke="#B8CDE0" stroke-width="10" opacity="0.18"/>
    <circle cx="0" cy="0" r="142" fill="none" stroke="url(#loopStroke)" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="12 16" filter="url(#glow)">
      <animate attributeName="stroke-dashoffset" from="0" to="-56" dur="4.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.82;1;0.82" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="126" fill="none" stroke="#BFDBFE" stroke-width="1.5" opacity="0.42" stroke-dasharray="2 10"/>

    <g filter="url(#glow)">
      <g>
        <circle cx="0" cy="-142" r="6" fill="#60A5FA"/>
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="8s" repeatCount="indefinite"/>
      </g>
    </g>

    <g>
      <circle cx="0" cy="0" r="88" fill="url(#coreHalo)" opacity="0.58">
        <animate attributeName="r" values="84;90;84" dur="3.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.42;0.68;0.42" dur="3.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="74" fill="url(#coreFill)" stroke="#B8D7F5" stroke-opacity="0.88" stroke-width="1.5">
        <animate attributeName="opacity" values="0.94;1;0.94" dur="3.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="61" fill="none" stroke="#B8D7F5" stroke-opacity="0.24" stroke-width="1.2">
        <animate attributeName="stroke-opacity" values="0.14;0.32;0.14" dur="3.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="48" fill="none" stroke="#D3E5F8" stroke-opacity="0.22" stroke-width="1" stroke-dasharray="3 7">
        <animate attributeName="stroke-opacity" values="0.08;0.24;0.08" dur="3.2s" repeatCount="indefinite"/>
      </circle>
    </g>
    <text x="0" y="-8" class="center" style="font:700 18px 'Avenir Next','PingFang SC','Helvetica Neue',Arial,sans-serif; fill:#21486C;">Spec-First</text>
    <text x="0" y="18" class="center" style="font:700 14px 'Avenir Next','PingFang SC','Helvetica Neue',Arial,sans-serif; fill:#4C6E8E;">复利型</text>
    <text x="0" y="40" class="center" style="font:700 14px 'Avenir Next','PingFang SC','Helvetica Neue',Arial,sans-serif; fill:#4C6E8E;">工程闭环</text>

    <g transform="translate(0 -142)">
      <rect x="-76" y="-28" width="152" height="56" rx="16" fill="#EAF4FF" stroke="#C8DCEE"/>
      <text x="0" y="-4" class="small center" style="font-weight:700;fill:#17324d;">Brainstorm</text>
      <text x="0" y="16" class="small center">澄清需求 / 验收标准</text>
    </g>

    <g transform="translate(154 0)">
      <rect x="-76" y="-28" width="152" height="56" rx="16" fill="#EAF9F3" stroke="#C9E2D7"/>
      <text x="0" y="-4" class="small center" style="font-weight:700;fill:#17324d;">Plan</text>
      <text x="0" y="16" class="small center">上下文 / 拆解 / 风险</text>
    </g>

    <g transform="translate(0 142)">
      <rect x="-76" y="-28" width="152" height="56" rx="16" fill="#FFF6E8" stroke="#E5D1B1"/>
      <text x="0" y="-4" class="small center" style="font-weight:700;fill:#17324d;">Work</text>
      <text x="0" y="16" class="small center">实现 / 测试 / 文档</text>
    </g>

    <g transform="translate(-154 64)">
      <rect x="-76" y="-28" width="152" height="56" rx="16" fill="#F4EEFF" stroke="#D9CCF1"/>
      <text x="0" y="-4" class="small center" style="font-weight:700;fill:#17324d;">Review</text>
      <text x="0" y="16" class="small center">findings / verdict</text>
    </g>

    <g transform="translate(-154 -64)">
      <rect x="-76" y="-28" width="152" height="56" rx="16" fill="#FFF1EB" stroke="#E5CBBF"/>
      <text x="0" y="-4" class="small center" style="font-weight:700;fill:#17324d;">Compound</text>
      <text x="0" y="16" class="small center">知识沉淀 / 反哺下一轮</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="884" y="214" width="360" height="228" rx="24" fill="url(#cardMint)"/>
  </g>
  <text x="912" y="246" class="eyebrowDark">What You Get</text>
  <text x="912" y="282" class="h2">工程可落地关键机制</text>
  <rect x="912" y="296" width="304" height="1.5" rx="0.75" fill="#BFDCCA" opacity="0.85"/>

  <g transform="translate(912 308)">
    <rect x="0" y="0" width="100" height="34" rx="17" fill="#ffffff"/>
    <text x="50" y="21" class="pill center">稳定入口</text>

    <rect x="102" y="0" width="100" height="34" rx="17" fill="#ffffff"/>
    <text x="152" y="21" class="pill center">闭环流程</text>

    <rect x="204" y="0" width="100" height="34" rx="17" fill="#ffffff"/>
    <text x="254" y="21" class="pill center">结构化评审</text>

    <rect x="0" y="44" width="100" height="34" rx="17" fill="#ffffff"/>
    <text x="50" y="65" class="pill center">知识复用</text>

    <rect x="102" y="44" width="100" height="34" rx="17" fill="#ffffff"/>
    <text x="152" y="65" class="pill center">状态可恢复</text>

    <rect x="204" y="44" width="100" height="34" rx="17" fill="#ffffff"/>
    <text x="254" y="65" class="pill center">系统可进化</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="36" y="462" width="360" height="222" rx="24" fill="url(#cardAmber)"/>
  </g>
  <text x="64" y="494" class="eyebrowDark">Runtime</text>
  <text x="64" y="530" class="h2">项目级安装模型</text>
  <text x="64" y="560" class="mono">npm install -g spec-first</text>
  <text x="64" y="584" class="mono">spec-first doctor</text>
  <text x="64" y="608" class="mono">spec-first init</text>
  <text x="64" y="638" class="body">
    <tspan x="64" dy="0">在目标项目中安装平台运行时，</tspan>
    <tspan x="64" dy="22">让 `/spec:*` 与 `$spec-*` 成为稳定的工程入口。</tspan>
  </text>

  <g filter="url(#shadow)">
    <rect x="884" y="462" width="360" height="222" rx="24" fill="url(#cardViolet)"/>
  </g>
  <text x="912" y="494" class="eyebrowDark">Outcome</text>
  <text x="912" y="530" class="h2">越用越强的工程系统</text>
  <text x="912" y="559" class="body">
    <tspan x="912" dy="0">每一轮需求、计划、评审与沉淀，</tspan>
    <tspan x="912" dy="22">都会让下一轮交付更快、更稳，</tspan>
    <tspan x="912" dy="22">也让整个系统越来越聪明。</tspan>
  </text>

  <rect x="912" y="632" width="210" height="30" rx="15" fill="#fff"/>
  <text x="1017" y="651" class="mono center">Commands + Skills + Agents</text>

  <rect x="1130" y="632" width="86" height="30" rx="15" fill="#17324d"/>
  <text x="1173" y="651" class="whiteSmall center" style="font-weight:700;">Spec-First</text>
</svg>
