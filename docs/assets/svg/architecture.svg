<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <style>
      .layer { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; }
      .component { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
      .text { fill: #1e293b; font-family: Arial, sans-serif; font-size: 11px; text-anchor: middle; }
      .title { fill: #1e293b; font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
      .layer-title { fill: #1e293b; font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
      .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <text class="title" x="400" y="30">Spec-First 架构</text>

  <!-- Layer 1: User Interface -->
  <rect class="layer" x="50" y="60" width="700" height="80" rx="8"/>
  <text class="layer-title" x="70" y="85">用户界面层</text>

  <rect class="component" x="80" y="100" width="140" height="30" rx="4"/>
  <text class="text" x="150" y="120">CLI 命令</text>

  <rect class="component" x="240" y="100" width="140" height="30" rx="4"/>
  <text class="text" x="310" y="120">Slash 命令</text>

  <rect class="component" x="400" y="100" width="140" height="30" rx="4"/>
  <text class="text" x="470" y="120">IDE 集成</text>

  <rect class="component" x="560" y="100" width="140" height="30" rx="4"/>
  <text class="text" x="630" y="120">API 接口</text>

  <!-- Layer 2: Workflow Engine -->
  <rect class="layer" x="50" y="170" width="700" height="100" rx="8"/>
  <text class="layer-title" x="70" y="195">工作流引擎层</text>

  <rect class="component" x="80" y="210" width="120" height="40" rx="4"/>
  <text class="text" x="140" y="227">Brainstorm</text>
  <text class="text" x="140" y="242" font-size="9" fill="#64748b">需求澄清</text>

  <rect class="component" x="220" y="210" width="120" height="40" rx="4"/>
  <text class="text" x="280" y="227">Plan</text>
  <text class="text" x="280" y="242" font-size="9" fill="#64748b">方案设计</text>

  <rect class="component" x="360" y="210" width="120" height="40" rx="4"/>
  <text class="text" x="420" y="227">Work</text>
  <text class="text" x="420" y="242" font-size="9" fill="#64748b">编码实现</text>

  <rect class="component" x="500" y="210" width="120" height="40" rx="4"/>
  <text class="text" x="560" y="227">Review</text>
  <text class="text" x="560" y="242" font-size="9" fill="#64748b">质量检查</text>

  <rect class="component" x="640" y="210" width="100" height="40" rx="4"/>
  <text class="text" x="690" y="227">Compound</text>
  <text class="text" x="690" y="242" font-size="9" fill="#64748b">知识沉淀</text>

  <!-- Layer 3: Core Services -->
  <rect class="layer" x="50" y="300" width="700" height="100" rx="8"/>
  <text class="layer-title" x="70" y="325">核心服务层</text>

  <rect class="component" x="80" y="340" width="130" height="40" rx="4"/>
  <text class="text" x="145" y="357">任务管理</text>
  <text class="text" x="145" y="372" font-size="9" fill="#64748b">task.json</text>

  <rect class="component" x="230" y="340" width="130" height="40" rx="4"/>
  <text class="text" x="295" y="357">文档生成</text>
  <text class="text" x="295" y="372" font-size="9" fill="#64748b">PRD/Plan</text>

  <rect class="component" x="380" y="340" width="130" height="40" rx="4"/>
  <text class="text" x="445" y="357">知识管理</text>
  <text class="text" x="445" y="372" font-size="9" fill="#64748b">spec/</text>

  <rect class="component" x="530" y="340" width="130" height="40" rx="4"/>
  <text class="text" x="595" y="357">会话记录</text>
  <text class="text" x="595" y="372" font-size="9" fill="#64748b">workspace/</text>

  <!-- Layer 4: Storage -->
  <rect class="layer" x="50" y="430" width="700" height="80" rx="8"/>
  <text class="layer-title" x="70" y="455">存储层</text>

  <rect class="component" x="80" y="470" width="150" height="30" rx="4"/>
  <text class="text" x="155" y="490">.spec-first/spec/</text>

  <rect class="component" x="250" y="470" width="180" height="30" rx="4"/>
  <text class="text" x="340" y="490">.spec-first/workspace/</text>

  <rect class="component" x="450" y="470" width="140" height="30" rx="4"/>
  <text class="text" x="520" y="490">task.json</text>

  <rect class="component" x="610" y="470" width="130" height="30" rx="4"/>
  <text class="text" x="675" y="490">journal-N.md</text>

  <!-- Arrows -->
  <path class="arrow" d="M 150 140 L 150 170"/>
  <path class="arrow" d="M 310 140 L 310 170"/>
  <path class="arrow" d="M 470 140 L 470 170"/>
  <path class="arrow" d="M 630 140 L 630 170"/>

  <path class="arrow" d="M 140 250 L 140 300"/>
  <path class="arrow" d="M 280 250 L 280 300"/>
  <path class="arrow" d="M 420 250 L 420 300"/>
  <path class="arrow" d="M 560 250 L 560 300"/>
  <path class="arrow" d="M 690 250 L 690 300"/>

  <path class="arrow" d="M 145 380 L 145 430"/>
  <path class="arrow" d="M 295 380 L 295 430"/>
  <path class="arrow" d="M 445 380 L 445 430"/>
  <path class="arrow" d="M 595 380 L 595 430"/>

  <!-- Info Box -->
  <rect x="50" y="530" width="700" height="50" fill="#f0f9ff" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text class="text" x="400" y="555" text-anchor="middle" font-weight="bold">设计原则：</text>
  <text class="text" x="400" y="570" text-anchor="middle" font-size="10">
    分层解耦 | 单一职责 | 可扩展性 | 数据持久化
  </text>
</svg>