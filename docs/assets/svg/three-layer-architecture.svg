<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">Spec-First 三层架构</title>
  <desc id="desc">展示 Spec-First 的入口层、工作流层和能力层，以及它们之间的关系。</desc>

  <defs>
    <style>
      .bg { fill: #f8fbfd; }
      .title { fill: #10243b; font-family: Arial, sans-serif; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #5b7086; font-family: Arial, sans-serif; font-size: 14px; }
      .layer-title { fill: #ffffff; font-family: Arial, sans-serif; font-size: 24px; font-weight: 700; }
      .layer-subtitle { fill: #dbe9f4; font-family: Arial, sans-serif; font-size: 14px; }
      .text { fill: #17324d; font-family: Arial, sans-serif; font-size: 15px; }
      .small { fill: #4f667d; font-family: Arial, sans-serif; font-size: 13px; }
      .chip-text { fill: #17324d; font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; }
      .count { fill: #ffffff; font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .card-stroke { stroke: #d8e4ee; stroke-width: 1.5; }
      .arrow { stroke: #3b82f6; stroke-width: 3; fill: none; stroke-linecap: round; }
    </style>
  </defs>

  <rect class="bg" width="960" height="620" rx="24"/>

  <text class="title" x="60" y="62">Spec-First Three-Layer Architecture</text>
  <text class="subtitle" x="60" y="88">用稳定入口驱动工作流，再由 agents 提供专业能力。</text>

  <g>
    <rect x="60" y="120" width="840" height="132" rx="24" fill="#10314d"/>
    <circle cx="104" cy="162" r="22" fill="#1e5b74"/>
    <text class="count" x="98" y="168">1</text>
    <text class="layer-title" x="144" y="166">Entry Layer</text>
    <text class="layer-subtitle" x="144" y="192">入口层: CLI 与平台入口</text>

    <rect x="84" y="208" width="160" height="28" rx="14" fill="#e9f2f8"/>
    <text class="chip-text" x="116" y="227">spec-first doctor</text>
    <rect x="258" y="208" width="150" height="28" rx="14" fill="#e9f2f8"/>
    <text class="chip-text" x="289" y="227">spec-first init</text>
    <rect x="422" y="208" width="160" height="28" rx="14" fill="#e9f2f8"/>
    <text class="chip-text" x="454" y="227">spec-first clean</text>
    <rect x="596" y="208" width="126" height="28" rx="14" fill="#e9f2f8"/>
    <text class="chip-text" x="629" y="227">/spec:*</text>
    <rect x="736" y="208" width="140" height="28" rx="14" fill="#e9f2f8"/>
    <text class="chip-text" x="766" y="227">$spec-*</text>
  </g>

  <path class="arrow" d="M480 264 L480 300"/>
  <polygon points="472,298 480,312 488,298" fill="#3b82f6"/>

  <g>
    <rect x="60" y="324" width="840" height="132" rx="24" fill="#2563eb"/>
    <circle cx="104" cy="366" r="22" fill="#1d4ed8"/>
    <text class="count" x="98" y="372">2</text>
    <text class="layer-title" x="144" y="370">Workflow Layer</text>
    <text class="layer-subtitle" x="144" y="396">工作流层: 阶段边界、输入输出契约、执行顺序</text>

    <rect x="84" y="412" width="112" height="28" rx="14" fill="#eaf2ff"/>
    <text class="chip-text" x="113" y="431">Bootstrap</text>
    <rect x="206" y="412" width="92" height="28" rx="14" fill="#eaf2ff"/>
    <text class="chip-text" x="236" y="431">Ideate</text>
    <rect x="308" y="412" width="124" height="28" rx="14" fill="#eaf2ff"/>
    <text class="chip-text" x="337" y="431">Brainstorm</text>
    <rect x="442" y="412" width="84" height="28" rx="14" fill="#eaf2ff"/>
    <text class="chip-text" x="471" y="431">Plan</text>
    <rect x="536" y="412" width="84" height="28" rx="14" fill="#eaf2ff"/>
    <text class="chip-text" x="565" y="431">Work</text>
    <rect x="630" y="412" width="94" height="28" rx="14" fill="#eaf2ff"/>
    <text class="chip-text" x="659" y="431">Review</text>
    <rect x="734" y="412" width="122" height="28" rx="14" fill="#eaf2ff"/>
    <text class="chip-text" x="763" y="431">Compound</text>
  </g>

  <path class="arrow" d="M480 468 L480 504"/>
  <polygon points="472,502 480,516 488,502" fill="#3b82f6"/>

  <g>
    <rect x="60" y="528" width="840" height="72" rx="24" fill="#0891b2"/>
    <circle cx="104" cy="564" r="22" fill="#0e7490"/>
    <text class="count" x="98" y="570">3</text>
    <text class="layer-title" x="144" y="568">Capability Layer</text>
    <text class="layer-subtitle" x="360" y="568">能力层: review / research / design / docs / testing agents</text>
  </g>

  <g>
    <rect x="630" y="134" width="246" height="46" rx="14" fill="#ffffff" class="card-stroke"/>
    <text class="text" x="648" y="153">目标</text>
    <text class="small" x="648" y="171">为项目提供稳定入口和运行时治理</text>

    <rect x="630" y="338" width="246" height="46" rx="14" fill="#ffffff" class="card-stroke"/>
    <text class="text" x="648" y="357">目标</text>
    <text class="small" x="648" y="375">把 AI 工作收敛成可执行的阶段闭环</text>
  </g>
</svg>
