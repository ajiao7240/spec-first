<svg viewBox="0 0 1050 390" width="1050" height="390" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">工作流端到端流程</title>
  <desc id="desc">从用户需求出发，经过五阶段闭环工作流（brainstorm→plan→work→review→compound），最终达到高质量交付，并通过 compound 反哺下一轮迭代</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1050" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#EEF4F8"/>
    </linearGradient>

    <linearGradient id="startGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#64748B"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>

    <linearGradient id="endGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#059669"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>

    <linearGradient id="loopGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>

    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#3B82F6"/>
    </marker>

    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#059669"/>
    </marker>

    <marker id="arrowLoop" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 1 L 10 6 L 0 11 z" fill="#D97706"/>
    </marker>

    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 2 L 7 5 L 0 8 z" fill="#EF4444"/>
    </marker>

    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 2 L 7 5 L 0 8 z" fill="#D97706"/>
    </marker>

    <marker id="arrowViolet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 2 L 7 5 L 0 8 z" fill="#7C3AED"/>
    </marker>

    <filter id="shadow" x="-8%" y="-15%" width="116%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#10243B" flood-opacity="0.08"/>
    </filter>

    <filter id="glowEnd" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#059669" flood-opacity="0.25"/>
    </filter>

    <style>
      .stageTitle { font: 700 14px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #17324d; }
      .stageCmd { font: 600 11px "SFMono-Regular", Menlo, "Courier New", monospace; fill: #4E6881; }
      .stageOutput { font: 500 11px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #5D748E; }
      .nodeTitle { font: 700 14px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #fff; }
      .center { text-anchor: middle; dominant-baseline: middle; }
      .loopLabel { font: 600 12px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #B45309; }
      .feedbackLabel { font: 500 9px "PingFang SC", "Helvetica Neue", Arial, sans-serif; }
      .summary { font: 500 12px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #5D748E; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1050" height="390" fill="url(#bg)"/>

  <!-- ======== START NODE ======== -->
  <g filter="url(#shadow)">
    <rect x="20" y="80" width="100" height="50" rx="25" fill="url(#startGrad)"/>
  </g>
  <text x="70" y="108" class="nodeTitle center">用户需求</text>

  <!-- Arrow: Start → Brainstorm -->
  <line x1="125" y1="105" x2="145" y2="105" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowBlue)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </line>

  <!-- ======== STAGE 1: BRAINSTORM ======== -->
  <g filter="url(#shadow)">
    <rect x="150" y="68" width="120" height="74" rx="14" fill="#EAF4FF" stroke="#B8D7F5"/>
  </g>
  <text x="210" y="88" class="stageTitle center">🧠 Brainstorm</text>
  <text x="210" y="106" class="stageCmd center">/spec:brainstorm</text>
  <text x="210" y="124" class="stageOutput center">需求文档</text>

  <!-- Arrow: Brainstorm → Plan -->
  <line x1="275" y1="105" x2="295" y2="105" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowBlue)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </line>

  <!-- ======== STAGE 2: PLAN ======== -->
  <g filter="url(#shadow)">
    <rect x="300" y="68" width="120" height="74" rx="14" fill="#EAF9F3" stroke="#B5DBC9"/>
  </g>
  <text x="360" y="88" class="stageTitle center">📋 Plan</text>
  <text x="360" y="106" class="stageCmd center">/spec:plan</text>
  <text x="360" y="124" class="stageOutput center">实施计划</text>

  <!-- Arrow: Plan → Work -->
  <line x1="425" y1="105" x2="445" y2="105" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowBlue)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </line>

  <!-- ======== STAGE 3: WORK ======== -->
  <g filter="url(#shadow)">
    <rect x="450" y="68" width="120" height="74" rx="14" fill="#FFF6E8" stroke="#E5D1B1"/>
  </g>
  <text x="510" y="88" class="stageTitle center">⚡ Work</text>
  <text x="510" y="106" class="stageCmd center">/spec:work</text>
  <text x="510" y="124" class="stageOutput center">代码 + 测试</text>

  <!-- Arrow: Work → Review -->
  <line x1="575" y1="105" x2="595" y2="105" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowBlue)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.9s" repeatCount="indefinite"/>
  </line>

  <!-- ======== STAGE 4: REVIEW ======== -->
  <g filter="url(#shadow)">
    <rect x="600" y="68" width="120" height="74" rx="14" fill="#F4EEFF" stroke="#D9CCF1"/>
  </g>
  <text x="660" y="88" class="stageTitle center">🔎 Review</text>
  <text x="660" y="106" class="stageCmd center">/spec:code-review</text>
  <text x="660" y="124" class="stageOutput center">审查报告</text>

  <!-- Arrow: Review → Compound -->
  <line x1="725" y1="105" x2="745" y2="105" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowBlue)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1.2s" repeatCount="indefinite"/>
  </line>

  <!-- ======== STAGE 5: COMPOUND ======== -->
  <g filter="url(#shadow)">
    <rect x="750" y="68" width="120" height="74" rx="14" fill="#FFF1EB" stroke="#E5CBBF"/>
  </g>
  <text x="810" y="88" class="stageTitle center">📚 Compound</text>
  <text x="810" y="106" class="stageCmd center">/spec:compound</text>
  <text x="810" y="124" class="stageOutput center">知识文档</text>

  <!-- Arrow: Compound → End -->
  <line x1="875" y1="105" x2="895" y2="105" stroke="#059669" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowGreen)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1.5s" repeatCount="indefinite"/>
  </line>

  <!-- ======== END NODE ======== -->
  <g filter="url(#glowEnd)">
    <rect x="900" y="80" width="110" height="50" rx="25" fill="url(#endGrad)"/>
  </g>
  <text x="955" y="108" class="nodeTitle center">高质量交付</text>

  <!-- ======== INTERNAL FEEDBACK ARROWS ======== -->

  <!-- Review → Work (问题修复) -->
  <path d="M 650 142 C 650 172, 520 172, 520 142"
        fill="none" stroke="#EF4444" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="4 4" opacity="0.7"
        marker-end="url(#arrowRed)"/>
  <text x="585" y="182" class="center feedbackLabel" fill="#EF4444">问题修复</text>

  <!-- Work → Plan (方案调整) -->
  <path d="M 500 142 C 500 192, 370 192, 370 142"
        fill="none" stroke="#D97706" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="4 4" opacity="0.7"
        marker-end="url(#arrowAmber)"/>
  <text x="435" y="202" class="center feedbackLabel" fill="#D97706">方案调整</text>

  <!-- Plan → Brainstorm (需求变更) -->
  <path d="M 350 142 C 350 212, 220 212, 220 142"
        fill="none" stroke="#7C3AED" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="4 4" opacity="0.7"
        marker-end="url(#arrowViolet)"/>
  <text x="285" y="222" class="center feedbackLabel" fill="#7C3AED">需求变更</text>

  <!-- ======== MAIN CYCLE LOOP ======== -->

  <!-- Large U-shape: from End node down, across bottom, back up to Start -->
  <path d="M 955 130 L 955 290 Q 955 320 925 320 L 100 320 Q 70 320 70 290 L 70 135"
        fill="none" stroke="url(#loopGrad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 6"
        marker-end="url(#arrowLoop)">
    <animate attributeName="stroke-dashoffset" from="0" to="-32" dur="3s" repeatCount="indefinite"/>
  </path>

  <!-- Cycle label badge -->
  <rect x="415" y="300" width="220" height="28" rx="14" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.2"/>
  <text x="525" y="319" class="loopLabel center">🔄 知识反哺下一轮迭代</text>

  <!-- ======== BOTTOM SUMMARY ======== -->
  <text x="525" y="370" class="summary center">五阶段闭环 · 知识沉淀反哺迭代 · 从需求到交付的完整工程流程</text>
</svg>
