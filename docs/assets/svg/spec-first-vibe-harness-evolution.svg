<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">从 Vibe Coding 到 Harness Engineering 再到 Spec-First</title>
  <desc id="desc">展示从生成导向到环境导向再到工作流系统导向的三阶段递进关系。</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#EEF4F8"/>
    </linearGradient>
    <linearGradient id="hero" x1="40" y1="32" x2="1240" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10243B"/>
      <stop offset="1" stop-color="#1E5B74"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF5E8"/>
      <stop offset="1" stop-color="#FFE4C0"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF4FF"/>
      <stop offset="1" stop-color="#DCEAF8"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF9F3"/>
      <stop offset="1" stop-color="#DCF1E7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#10243B" flood-opacity="0.14"/>
    </filter>
    <style>
      .h1 { font: 700 34px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #fff; }
      .eyebrow { font: 700 12px "Avenir Next", "PingFang SC", Arial, sans-serif; letter-spacing: 0.12em; text-transform: uppercase; }
      .eyebrow-light { fill: rgba(255,255,255,0.72); }
      .eyebrow-dark { fill: #5D748E; }
      .title { font: 700 24px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #17324d; }
      .body { font: 500 15px "Avenir Next", "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #4E6881; }
      .pill { font: 700 12px "Avenir Next", "PingFang SC", Arial, sans-serif; fill: #17324d; }
      .center { text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="40" y="32" width="1200" height="148" rx="28" fill="url(#hero)"/>
  </g>
  <text x="72" y="66" class="eyebrow eyebrow-light">From Generation To System</text>
  <text x="72" y="110" class="h1">从 Vibe Coding 到 Harness Engineering 再到 Spec-First</text>
  <text x="72" y="146" class="body" style="fill: rgba(255,255,255,0.86); font-size: 16px;">
    <tspan x="72" dy="0">这不是术语堆叠，而是 AI 编程问题定义的不断升级：</tspan>
    <tspan x="72" dy="24">从“先生成”，到“先把环境搭好”，再到“把流程、治理和知识复利一起做成系统”。</tspan>
  </text>

  <g filter="url(#shadow)">
    <rect x="56" y="238" width="336" height="356" rx="28" fill="url(#cardA)"/>
    <rect x="472" y="238" width="336" height="356" rx="28" fill="url(#cardB)"/>
    <rect x="888" y="238" width="336" height="356" rx="28" fill="url(#cardC)"/>
  </g>

  <text x="88" y="274" class="eyebrow eyebrow-dark">Stage 1</text>
  <text x="88" y="316" class="title">Vibe Coding</text>
  <text x="88" y="352" class="body">
    <tspan x="88" dy="0">先把需求说出来，</tspan>
    <tspan x="88" dy="22">让 AI 快速生成结果。</tspan>
  </text>
  <g transform="translate(88 408)">
    <rect x="0" y="0" width="164" height="34" rx="17" fill="#fff"/><text x="82" y="22" class="pill center">关注点：生成速度</text>
    <rect x="0" y="48" width="164" height="34" rx="17" fill="#fff"/><text x="82" y="70" class="pill center">优势：原型与局部任务</text>
    <rect x="0" y="96" width="164" height="34" rx="17" fill="#fff"/><text x="82" y="118" class="pill center">缺口：工程连续性</text>
  </g>

  <text x="504" y="274" class="eyebrow eyebrow-dark">Stage 2</text>
  <text x="504" y="316" class="title">Harness Engineering</text>
  <text x="504" y="352" class="body">
    <tspan x="504" dy="0">先把 Agent 的工作环境、</tspan>
    <tspan x="504" dy="22">约束和验证回路搭起来。</tspan>
  </text>
  <g transform="translate(504 408)">
    <rect x="0" y="0" width="164" height="34" rx="17" fill="#fff"/><text x="82" y="22" class="pill center">关注点：执行环境</text>
    <rect x="0" y="48" width="164" height="34" rx="17" fill="#fff"/><text x="82" y="70" class="pill center">优势：可靠执行</text>
    <rect x="0" y="96" width="164" height="34" rx="17" fill="#fff"/><text x="82" y="118" class="pill center">缺口：流程化交付</text>
  </g>

  <text x="920" y="274" class="eyebrow eyebrow-dark">Stage 3</text>
  <text x="920" y="316" class="title">Spec-First</text>
  <text x="920" y="352" class="body">
    <tspan x="920" dy="0">在 harness 思想上继续推进，</tspan>
    <tspan x="920" dy="22">把工作流、治理与知识复利系统化。</tspan>
  </text>
  <g transform="translate(920 408)">
    <rect x="0" y="0" width="164" height="34" rx="17" fill="#fff"/><text x="82" y="22" class="pill center">关注点：交付系统</text>
    <rect x="0" y="48" width="164" height="34" rx="17" fill="#fff"/><text x="82" y="70" class="pill center">优势：可治理可复用</text>
    <rect x="0" y="96" width="164" height="34" rx="17" fill="#fff"/><text x="82" y="118" class="pill center">关键：Stage-0 底座</text>
  </g>

  <g stroke="#8AA9C2" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M392 416H452"/>
    <path d="M808 416H868"/>
  </g>
  <polygon points="444,406 460,416 444,426" fill="#8AA9C2"/>
  <polygon points="860,406 876,416 860,426" fill="#8AA9C2"/>

  <text x="640" y="648" class="body center" style="font-size: 14px;">
    递进关系：从“先生成”到“先搭环境”，再到“把环境、流程、治理和知识资产一起做成系统”
  </text>
</svg>
