<svg
  width="232"
  height="60"
  viewBox="0 0 232 60"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="spec-first"
>
  <!-- ─── Mark: 48×48 deep indigo square ─── -->
  <rect x="0" y="6" width="48" height="48" rx="10" fill="#312e81"/>

  <!-- Vertical accent bar — the "priority" rail -->
  <rect x="10" y="16" width="3" height="21" rx="1.5" fill="#a5b4fc"/>

  <!-- Spec line 1: first item — brightest, widest -->
  <rect x="17" y="16" width="23" height="3.5" rx="1.75" fill="#e0e7ff"/>

  <!-- Spec line 2: second item — medium -->
  <rect x="17" y="25" width="17" height="3" rx="1.5" fill="#a5b4fc" opacity="0.65"/>

  <!-- Spec line 3: third item — dimmest, narrowest -->
  <rect x="17" y="33" width="11" height="2.5" rx="1.25" fill="#818cf8" opacity="0.38"/>

  <!-- ─── Wordmark ─── -->
  <text
    x="62"
    y="39"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="26"
    letter-spacing="-0.5"
  >
    <tspan fill="#1e1b4b" font-weight="700">spec</tspan><tspan fill="#6366f1" font-weight="400">-first</tspan>
  </text>
</svg>
