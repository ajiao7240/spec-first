<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">spec-first artifact trail</title>
  <desc id="desc">A blueprint-style diagram showing what spec-first leaves with the repository context: requirements, plans, task packs, local work verification evidence, review and debug notes, and reusable learnings. The artifact trail makes the next session, reviewer, and teammate start with context instead of a blank chat.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="0.56" stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#ECFEFF"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.55" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1E3A5F" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 H 0 V 32" fill="none" stroke="#D8E8FA" stroke-width="1"/>
    </pattern>
    <style>
      .h1 { fill:#0F172A; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size:32px; font-weight:800; text-anchor:middle; }
      .h2 { fill:#475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size:16px; font-weight:650; text-anchor:middle; }
      .label { fill:#0F172A; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size:20px; font-weight:800; text-anchor:middle; }
      .small { fill:#475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size:14px; font-weight:650; text-anchor:middle; }
      .tiny { fill:#64748B; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size:12px; font-weight:700; text-anchor:middle; }
      .mono { fill:#164E63; font-family:"SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size:13px; font-weight:760; text-anchor:middle; }
      .card { fill:#FFFFFF; stroke:#BFDBFE; stroke-width:1.7; filter:url(#shadow); }
      .warm { fill:#FFFBEB; stroke:#D97706; stroke-width:2; filter:url(#shadow); }
      .cool { fill:#F0FDFA; stroke:#0D9488; stroke-width:2; filter:url(#shadow); }
      .chip { fill:#FFFFFF; stroke:#7DD3FC; stroke-width:1.45; }
      .chip-strong { fill:#EFF6FF; stroke:#2563EB; stroke-width:1.6; }
      .chip-green { fill:#ECFDF5; stroke:#10B981; stroke-width:1.6; }
      .wire { fill:none; stroke:url(#line); stroke-width:4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)" opacity="0.7"/>

  <text x="600" y="62" class="h1">What survives the chat window</text>
  <text x="600" y="92" class="h2">shareable docs and local evidence survive the chat</text>

  <g transform="translate(64 254)">
    <rect class="warm" x="0" y="0" width="190" height="150" rx="12"/>
    <text x="95" y="44" class="label">User intent</text>
    <text x="95" y="78" class="small">feature idea</text>
    <text x="95" y="104" class="small">bug report</text>
    <text x="95" y="130" class="small">review need</text>
  </g>

  <path class="wire" d="M 254 329 C 292 318 320 318 350 329"/>

  <g transform="translate(346 124)">
    <rect class="card" x="0" y="0" width="508" height="430" rx="18"/>
    <text x="254" y="38" class="label">Repository artifact trail</text>
    <text x="254" y="64" class="tiny">visible docs and local evidence, not hidden session state</text>

    <g transform="translate(34 90)">
      <rect class="chip-strong" x="0" y="0" width="210" height="70" rx="10"/>
      <text x="105" y="27" class="mono">docs/brainstorms/</text>
      <text x="105" y="50" class="small">requirements · PRD</text>
    </g>
    <g transform="translate(264 90)">
      <rect class="chip" x="0" y="0" width="210" height="70" rx="10"/>
      <text x="105" y="27" class="mono">docs/plans/</text>
      <text x="105" y="50" class="small">scope · risk · approach</text>
    </g>
    <g transform="translate(34 180)">
      <rect class="chip" x="0" y="0" width="210" height="70" rx="10"/>
      <text x="105" y="27" class="mono">docs/tasks/</text>
      <text x="105" y="50" class="small">derived task packs</text>
    </g>
    <g transform="translate(264 180)">
      <rect class="chip-strong" x="0" y="0" width="210" height="70" rx="10"/>
      <text x="105" y="27" class="mono">.spec-first/workflows/</text>
      <text x="105" y="50" class="small">local closeout evidence</text>
    </g>
    <g transform="translate(34 270)">
      <rect class="chip" x="0" y="0" width="210" height="70" rx="10"/>
      <text x="105" y="27" class="mono">review · debug</text>
      <text x="105" y="50" class="small">findings · root cause</text>
    </g>
    <g transform="translate(264 270)">
      <rect class="chip-green" x="0" y="0" width="210" height="70" rx="10"/>
      <text x="105" y="27" class="mono">docs/solutions/</text>
      <text x="105" y="50" class="small">reusable learning</text>
    </g>

    <g transform="translate(78 370)">
      <rect x="0" y="0" width="352" height="38" rx="19" fill="#E0F2FE" stroke="#38BDF8" stroke-width="1.4"/>
      <text x="176" y="24" class="mono">plans -&gt; tasks -&gt; work evidence</text>
    </g>
  </g>

  <path class="wire" d="M 854 329 C 886 318 914 318 946 329"/>

  <g transform="translate(946 254)">
    <rect class="cool" x="0" y="0" width="190" height="150" rx="12"/>
    <text x="95" y="44" class="label">Next reader</text>
    <text x="95" y="78" class="small">new session</text>
    <text x="95" y="104" class="small">reviewer</text>
    <text x="95" y="130" class="small">teammate</text>
  </g>

  <g transform="translate(174 584)">
    <rect x="0" y="0" width="852" height="46" rx="23" fill="#FFFFFF" stroke="#7DD3FC" stroke-width="1.5"/>
    <text x="426" y="29" class="mono">script-owned facts stay separate from LLM-owned judgment</text>
  </g>
</svg>
