<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">spec-first engineering loop</title>
  <desc id="desc">A blueprint-style diagram: spec-first is an AI Coding Harness that turns a one-off AI chat into a repository-backed engineering loop. Requirements, Plan, Tasks, Code, Review, and Knowledge stay connected while scripts prepare facts and LLMs decide.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="0.55" stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#ECFEFF"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.5" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1E3A5F" flood-opacity="0.14"/>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrowLoop" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0EA5E9"/>
    </marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 H 0 V 32" fill="none" stroke="#D8E8FA" stroke-width="1"/>
    </pattern>
    <style>
      .h1 { fill:#0F172A; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size:32px; font-weight:800; text-anchor:middle; }
      .h2 { fill:#475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size:17px; font-weight:650; text-anchor:middle; }
      .label { fill:#0F172A; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size:21px; font-weight:800; text-anchor:middle; }
      .stage { fill:#1E3A5F; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size:16px; font-weight:750; text-anchor:middle; }
      .small { fill:#475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size:15px; font-weight:650; text-anchor:middle; }
      .mono { fill:#164E63; font-family:"SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size:14px; font-weight:700; text-anchor:middle; }
      .node { fill:#FFFFFF; stroke:#2563EB; stroke-width:2; filter:url(#shadow); }
      .node-amber { fill:#FFFBEB; stroke:#D97706; stroke-width:2; filter:url(#shadow); }
      .node-teal { fill:#F0FDFA; stroke:#0D9488; stroke-width:2; filter:url(#shadow); }
      .wire { fill:none; stroke:url(#line); stroke-width:4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrow); }
      .loop { fill:none; stroke:#0EA5E9; stroke-width:3.6; stroke-linecap:round; marker-end:url(#arrowLoop); }
    </style>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)" opacity="0.7"/>

  <text x="600" y="62" class="h1">AI Coding Harness for repo-backed work</text>
  <text x="600" y="92" class="h2">scripts prepare facts · LLMs decide · artifacts stay in your repository</text>

  <!-- input: the problem (warm = before) -->
  <g transform="translate(56 251)">
    <rect class="node-amber" x="0" y="0" width="196" height="150" rx="11"/>
    <text x="98" y="44" class="label">AI chat</text>
    <text x="98" y="78" class="small">fast code</text>
    <text x="98" y="104" class="small">lost context</text>
    <text x="98" y="130" class="small">thin review trail</text>
  </g>

  <!-- output: the outcome (cool = after) -->
  <g transform="translate(948 251)">
    <rect class="node-teal" x="0" y="0" width="196" height="150" rx="11"/>
    <text x="98" y="44" class="label">Repo memory</text>
    <text x="98" y="78" class="small">durable decisions</text>
    <text x="98" y="104" class="small">verified evidence</text>
    <text x="98" y="130" class="small">team handoff</text>
  </g>

  <path class="wire" d="M 252 326 C 312 318 350 318 396 328"/>
  <path class="wire" d="M 804 328 C 850 318 888 318 948 326"/>

  <!-- loop card -->
  <g transform="translate(400 116)">
    <rect x="0" y="0" width="400" height="424" rx="18" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.6" filter="url(#shadow)"/>

    <!-- one continuous clockwise ring (two arcs => two arrowheads) signals "loop" at thumbnail size -->
    <path class="loop" d="M 200 120 A 92 92 0 0 1 200 304"/>
    <path class="loop" d="M 200 304 A 92 92 0 0 1 200 120"/>

    <!-- core -->
    <circle cx="200" cy="212" r="64" fill="#0F172A" stroke="#22D3EE" stroke-width="3" filter="url(#softGlow)"/>
    <text x="200" y="207" class="label" style="fill:#F8FAFC; font-size:20px">spec-first</text>
    <text x="200" y="231" class="small" style="fill:#A5F3FC; font-size:13px">harness</text>

    <!-- 6 stages, clockwise = canonical order: Requirements -> Plan -> Tasks -> Code -> Review -> Knowledge -->
    <g transform="translate(142 36)">
      <rect class="node" x="0" y="0" width="116" height="46" rx="9"/>
      <text x="58" y="29" class="stage">Requirements</text>
    </g>
    <g transform="translate(286 110)">
      <rect class="node" x="0" y="0" width="104" height="46" rx="9"/>
      <text x="52" y="29" class="stage">Plan</text>
    </g>
    <g transform="translate(286 268)">
      <rect class="node" x="0" y="0" width="104" height="46" rx="9"/>
      <text x="52" y="29" class="stage">Tasks</text>
    </g>
    <g transform="translate(142 342)">
      <rect class="node" x="0" y="0" width="116" height="46" rx="9"/>
      <text x="58" y="29" class="stage">Code</text>
    </g>
    <g transform="translate(10 268)">
      <rect class="node" x="0" y="0" width="104" height="46" rx="9"/>
      <text x="52" y="29" class="stage">Review</text>
    </g>
    <g transform="translate(10 110)">
      <rect class="node" x="0" y="0" width="104" height="46" rx="9"/>
      <text x="52" y="29" class="stage">Knowledge</text>
    </g>
  </g>

  <!-- single differentiator caption (no duplicate sequence ribbon) -->
  <g transform="translate(360 586)">
    <rect x="0" y="0" width="480" height="44" rx="22" fill="#E0F2FE" stroke="#38BDF8" stroke-width="1.4"/>
    <text x="240" y="28" class="mono" style="font-size:14px">scripts prepare facts · the LLM decides</text>
  </g>
</svg>
