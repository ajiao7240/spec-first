<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080" role="img" aria-labelledby="title desc">
  <title id="title">spec-first workflow flow</title>
  <desc id="desc">A circular flywheel diagram showing the core spec-first skill loop around graph-backed project memory. spec-graph-bootstrap compiles graph readiness, impact capabilities, and provider status that downstream planning, work, and review skills can consume.</desc>

  <style>
    :root {
      color-scheme: light dark;
    }

    .bg {
      fill: #f4f7fb;
    }

    .panel {
      fill: #ffffff;
      stroke: #d9e4ef;
      stroke-width: 1.5;
      filter: url(#panelShadow);
    }

    .title {
      fill: #0f172a;
      font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif;
      font-size: 44px;
      font-weight: 900;
      letter-spacing: -.03em;
      text-anchor: middle;
    }

    .subtitle {
      fill: #475569;
      font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif;
      font-size: 22px;
      font-weight: 650;
      text-anchor: middle;
    }

    .halo {
      fill: url(#haloGradient);
      opacity: .88;
    }

    .ringTrack {
      fill: none;
      stroke: url(#ringGradient);
      stroke-width: 28;
      stroke-linecap: round;
      opacity: .18;
    }

    .orbitDash {
      fill: none;
      stroke: #0ea5e9;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 12 24;
      opacity: .42;
      animation: orbitDash 14s linear infinite;
      transform-origin: 800px 520px;
    }

    .hub {
      fill: #0f172a;
      stroke: #38bdf8;
      stroke-width: 2;
      filter: url(#deepShadow);
    }

    .hubGlow {
      fill: none;
      stroke: #22d3ee;
      stroke-width: 2;
      opacity: .42;
    }

    .hubTitle {
      fill: #f8fafc;
      font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: -.02em;
      text-anchor: middle;
    }

    .hubText {
      fill: #cbd5e1;
      font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif;
      font-size: 18px;
      font-weight: 650;
      text-anchor: middle;
    }

    .hubChip {
      fill: #e0f2fe;
      stroke: #7dd3fc;
      stroke-width: 1.3;
    }

    .hubChipText {
      fill: #0f172a;
      font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif;
      font-size: 15px;
      font-weight: 800;
      text-anchor: middle;
    }

    .node {
      fill: #ffffff;
      stroke: #2563eb;
      stroke-width: 2.5;
      filter: url(#softShadow);
    }

    .node.teal {
      stroke: #0f766e;
    }

    .node.orange {
      stroke: #ea580c;
    }

    .node.violet {
      stroke: #7c3aed;
    }

    .stepBadge {
      fill: #0f172a;
    }

    .stepText {
      fill: #ffffff;
      font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif;
      font-size: 16px;
      font-weight: 900;
      text-anchor: middle;
      dominant-baseline: central;
    }

    .label {
      fill: #0f172a;
      font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif;
      font-size: 25px;
      font-weight: 900;
      text-anchor: middle;
    }

    .small {
      fill: #475569;
      font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif;
      font-size: 16px;
      font-weight: 750;
      text-anchor: middle;
    }

    .supportPanel {
      fill: #f8fafc;
      stroke: #cbd5e1;
      stroke-width: 1.4;
    }

    .supportTitle {
      fill: #0f172a;
      font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif;
      font-size: 21px;
      font-weight: 900;
      text-anchor: middle;
    }

    .supportText {
      fill: #475569;
      font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif;
      font-size: 16px;
      font-weight: 700;
      text-anchor: middle;
    }

    .supportChip {
      fill: #ecfeff;
      stroke: #67e8f9;
      stroke-width: 1.2;
    }

    .supportChipText {
      fill: #164e63;
      font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif;
      font-size: 15px;
      font-weight: 850;
      text-anchor: middle;
    }

    .pulse {
      animation: pulse 6.4s ease-in-out infinite;
      transform-origin: center;
    }

    .pulse2 {
      animation-delay: .4s;
    }

    .pulse3 {
      animation-delay: .8s;
    }

    .pulse4 {
      animation-delay: 1.2s;
    }

    .pulse5 {
      animation-delay: 1.6s;
    }

    .pulse6 {
      animation-delay: 2s;
    }

    .pulse7 {
      animation-delay: 2.4s;
    }

    .pulse8 {
      animation-delay: 2.8s;
    }

    .dot {
      fill: #0ea5e9;
      filter: url(#glow);
      transform-origin: 800px 520px;
    }

    .dot.one {
      animation: travelOne 8.4s linear infinite;
    }

    .dot.two {
      fill: #14b8a6;
      animation: travelTwo 8.4s linear infinite;
    }

    .dot.three {
      fill: #f97316;
      animation: travelThree 8.4s linear infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: .94;
        transform: scale(1);
      }

      45% {
        opacity: 1;
        transform: scale(1.025);
      }
    }

    @keyframes orbitDash {
      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes travelOne {
      0% { transform: rotate(0deg); opacity: .08; }
      8% { opacity: 1; }
      92% { opacity: 1; }
      100% { transform: rotate(360deg); opacity: .08; }
    }

    @keyframes travelTwo {
      0% { transform: rotate(120deg); opacity: .08; }
      8% { opacity: .92; }
      92% { opacity: .92; }
      100% { transform: rotate(480deg); opacity: .08; }
    }

    @keyframes travelThree {
      0% { transform: rotate(240deg); opacity: .08; }
      8% { opacity: .88; }
      92% { opacity: .88; }
      100% { transform: rotate(600deg); opacity: .08; }
    }

    @media (prefers-color-scheme: dark) {
      .bg {
        fill: #08111f;
      }

      .panel {
        fill: #0d1728;
        stroke: #27364c;
      }

      .halo {
        opacity: .46;
      }

      .ringTrack {
        opacity: .28;
      }

      .orbitDash {
        stroke: #67e8f9;
        opacity: .36;
      }

      .node {
        fill: #0f172a;
        stroke: #60a5fa;
      }

      .node.teal {
        stroke: #2dd4bf;
      }

      .node.orange {
        stroke: #fb923c;
      }

      .node.violet {
        stroke: #a78bfa;
      }

      .label,
      .title,
      .supportTitle {
        fill: #f8fafc;
      }

      .small,
      .subtitle,
      .supportText {
        fill: #cbd5e1;
      }

      .supportPanel {
        fill: #111827;
        stroke: #334155;
      }

      .supportChip {
        fill: #083344;
        stroke: #155e75;
      }

      .supportChipText {
        fill: #cffafe;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .pulse,
      .dot,
      .orbitDash {
        animation: none;
      }

      .dot {
        opacity: .86;
      }
    }
  </style>

  <defs>
    <radialGradient id="haloGradient" cx="50%" cy="50%" r="58%">
      <stop offset="0%" stop-color="#dbeafe" />
      <stop offset="50%" stop-color="#ccfbf1" />
      <stop offset="100%" stop-color="#f8fafc" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="ringGradient" x1="450" y1="170" x2="1150" y2="870" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="40%" stop-color="#14b8a6" />
      <stop offset="72%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>

    <filter id="panelShadow" x="-5%" y="-6%" width="110%" height="112%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity=".08" />
    </filter>

    <filter id="softShadow" x="-22%" y="-28%" width="144%" height="156%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity=".14" />
    </filter>

    <filter id="deepShadow" x="-22%" y="-28%" width="144%" height="156%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#0f172a" flood-opacity=".24" />
    </filter>

    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

  </defs>

  <rect class="bg" width="1600" height="1080" rx="42" />
  <rect class="panel" x="70" y="52" width="1460" height="976" rx="42" />

  <text class="title" x="800" y="112">Core spec-first workflow loop</text>
  <text class="subtitle" x="800" y="150">Graph readiness sits at the center; public workflow skills reuse docs, graph facts, and impact evidence</text>

  <circle class="halo" cx="800" cy="520" r="430" />
  <circle class="ringTrack" cx="800" cy="520" r="350" />
  <circle class="orbitDash" cx="800" cy="520" r="350" />

  <circle class="dot one" cx="800" cy="170" r="9" />
  <circle class="dot two" cx="800" cy="170" r="7.5" />
  <circle class="dot three" cx="800" cy="170" r="6.5" />

  <g>
    <rect class="hub" x="570" y="396" width="460" height="256" rx="40" />
    <path class="hubGlow" d="M 620 472 C 700 414, 900 414, 980 472" />
    <text class="hubTitle" x="800" y="446">Graph-backed memory</text>
    <text class="hubText" x="800" y="480">$spec-graph-bootstrap compiles readiness</text>
    <text class="hubText" x="800" y="506">graph facts feed plan / work / review</text>

    <rect class="hubChip" x="578" y="532" width="142" height="34" rx="17" />
    <text class="hubChipText" x="649" y="554">.spec-first/graph</text>
    <rect class="hubChip" x="732" y="532" width="142" height="34" rx="17" />
    <text class="hubChipText" x="803" y="554">.spec-first/impact</text>
    <rect class="hubChip" x="886" y="532" width="136" height="34" rx="17" />
    <text class="hubChipText" x="954" y="554">providers/*</text>

    <rect class="hubChip" x="590" y="580" width="155" height="34" rx="17" />
    <text class="hubChipText" x="668" y="602">docs/brainstorms</text>
    <rect class="hubChip" x="760" y="580" width="115" height="34" rx="17" />
    <text class="hubChipText" x="818" y="602">docs/plans</text>
    <rect class="hubChip" x="890" y="580" width="115" height="34" rx="17" />
    <text class="hubChipText" x="948" y="602">docs/tasks</text>
  </g>

  <g class="pulse">
    <rect class="node" x="670" y="168" width="260" height="86" rx="24" />
    <circle class="stepBadge" cx="700" cy="198" r="18" />
    <text class="stepText" x="700" y="198">1</text>
    <text class="label" x="800" y="204">Brainstorm</text>
    <text class="small" x="800" y="230">$spec-brainstorm</text>
  </g>

  <g class="pulse pulse2">
    <rect class="node teal" x="1080" y="230" width="270" height="88" rx="24" />
    <circle class="stepBadge" cx="1110" cy="260" r="18" />
    <text class="stepText" x="1110" y="260">2</text>
    <text class="label" x="1215" y="266">Plan</text>
    <text class="small" x="1215" y="293">$spec-plan</text>
  </g>

  <g class="pulse pulse3">
    <rect class="node teal" x="1080" y="477" width="270" height="88" rx="24" />
    <circle class="stepBadge" cx="1110" cy="507" r="18" />
    <text class="stepText" x="1110" y="507">3</text>
    <text class="label" x="1215" y="513">Doc review</text>
    <text class="small" x="1215" y="540">$spec-doc-review</text>
  </g>

  <g class="pulse pulse4">
    <rect class="node teal" x="1080" y="724" width="270" height="88" rx="24" />
    <circle class="stepBadge" cx="1110" cy="754" r="18" />
    <text class="stepText" x="1110" y="754">4</text>
    <text class="label" x="1215" y="760">write-tasks</text>
    <text class="small" x="1215" y="787">standalone skill</text>
  </g>

  <g class="pulse pulse5">
    <rect class="node orange" x="670" y="822" width="260" height="88" rx="24" />
    <circle class="stepBadge" cx="700" cy="852" r="18" />
    <text class="stepText" x="700" y="852">5</text>
    <text class="label" x="800" y="858">Work</text>
    <text class="small" x="800" y="885">$spec-work</text>
  </g>

  <g class="pulse pulse6">
    <rect class="node orange" x="250" y="724" width="270" height="88" rx="24" />
    <circle class="stepBadge" cx="280" cy="754" r="18" />
    <text class="stepText" x="280" y="754">6</text>
    <text class="label" x="385" y="760">Code review</text>
    <text class="small" x="385" y="787">$spec-code-review</text>
  </g>

  <g class="pulse pulse7">
    <rect class="node orange" x="250" y="477" width="270" height="88" rx="24" />
    <circle class="stepBadge" cx="280" cy="507" r="18" />
    <text class="stepText" x="280" y="507">7</text>
    <text class="label" x="385" y="513">Debug</text>
    <text class="small" x="385" y="540">$spec-debug</text>
  </g>

  <g class="pulse pulse8">
    <rect class="node violet" x="250" y="230" width="270" height="88" rx="24" />
    <circle class="stepBadge" cx="280" cy="260" r="18" />
    <text class="stepText" x="280" y="260">8</text>
    <text class="label" x="385" y="266">Compound</text>
    <text class="small" x="385" y="293">$spec-compound</text>
  </g>

  <g>
    <rect class="supportChip" x="510" y="948" width="210" height="38" rx="19" />
    <text class="supportChipText" x="615" y="972">$spec-mcp-setup</text>
    <rect class="supportChip" x="880" y="948" width="210" height="38" rx="19" />
    <text class="supportChipText" x="985" y="972">$spec-update</text>
    <text class="supportTitle" x="800" y="924">Setup writes graph provider config; update repairs stale runtime assets</text>
  </g>

  <g>
    <rect class="supportPanel" x="220" y="1002" width="1160" height="42" rx="21" />
    <text class="supportText" x="800" y="1029">Scripts prepare facts and runtime assets -> LLM decides scope, tradeoffs, implementation, and review evidence</text>
  </g>
</svg>
