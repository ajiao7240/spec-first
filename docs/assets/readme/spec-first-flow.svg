<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">spec-first workflow flow</title>
  <desc id="desc">A flow diagram showing how a loose idea moves through brainstorm, requirements, plan, task pack, work, review, and learning artifacts while scripts prepare facts and the LLM makes semantic decisions.</desc>
  <style>
    :root {
      color-scheme: light dark;
    }

    .bg {
      fill: #f8fafc;
    }

    .panel {
      fill: #ffffff;
      stroke: #d8e2ee;
      stroke-width: 1.4;
    }

    .lane {
      fill: #eef6ff;
      stroke: #c6dbf3;
      stroke-width: 1.2;
    }

    .node {
      fill: #ffffff;
      stroke: #2563eb;
      stroke-width: 2;
      filter: url(#softShadow);
    }

    .node.alt {
      stroke: #0f766e;
    }

    .node.final {
      stroke: #7c3aed;
    }

    .label {
      fill: #0f172a;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 24px;
      font-weight: 700;
      text-anchor: middle;
    }

    .small {
      fill: #475569;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      font-weight: 500;
      text-anchor: middle;
    }

    .caption {
      fill: #334155;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 18px;
      font-weight: 600;
      text-anchor: middle;
    }

    .title {
      fill: #0f172a;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 34px;
      font-weight: 800;
      text-anchor: middle;
    }

    .subtitle {
      fill: #475569;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 18px;
      font-weight: 500;
      text-anchor: middle;
    }

    .arrow {
      fill: none;
      stroke: #94a3b8;
      stroke-width: 4;
      stroke-linecap: round;
      marker-end: url(#arrowHead);
    }

    .artifact {
      fill: #f1f5f9;
      stroke: #cbd5e1;
      stroke-width: 1.4;
    }

    .pulse {
      animation: pulse 6s ease-in-out infinite;
      transform-origin: center;
    }

    .pulse2 {
      animation-delay: .75s;
    }

    .pulse3 {
      animation-delay: 1.5s;
    }

    .pulse4 {
      animation-delay: 2.25s;
    }

    .pulse5 {
      animation-delay: 3s;
    }

    .pulse6 {
      animation-delay: 3.75s;
    }

    .pulse7 {
      animation-delay: 4.5s;
    }

    .dot {
      fill: #2563eb;
      filter: url(#glow);
    }

    .dot.one {
      animation: travelOne 6s linear infinite;
    }

    .dot.two {
      animation: travelTwo 6s linear infinite;
    }

    .dot.three {
      animation: travelThree 6s linear infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: .92;
        transform: scale(1);
      }

      45% {
        opacity: 1;
        transform: scale(1.025);
      }
    }

    @keyframes travelOne {
      0% { transform: translate(210px, 223px); opacity: 0; }
      8% { opacity: 1; }
      23% { transform: translate(410px, 223px); opacity: 1; }
      31% { transform: translate(610px, 223px); opacity: 1; }
      39% { opacity: 0; }
      100% { transform: translate(610px, 223px); opacity: 0; }
    }

    @keyframes travelTwo {
      0%, 32% { transform: translate(610px, 223px); opacity: 0; }
      40% { opacity: 1; }
      52% { transform: translate(810px, 223px); opacity: 1; }
      64% { transform: translate(1010px, 223px); opacity: 1; }
      72% { opacity: 0; }
      100% { transform: translate(1010px, 223px); opacity: 0; }
    }

    @keyframes travelThree {
      0%, 58% { transform: translate(1010px, 223px); opacity: 0; }
      66% { opacity: 1; }
      80% { transform: translate(1010px, 346px); opacity: 1; }
      92% { transform: translate(610px, 346px); opacity: 1; }
      100% { transform: translate(210px, 346px); opacity: 0; }
    }

    @media (prefers-color-scheme: dark) {
      .bg {
        fill: #0b1220;
      }

      .panel {
        fill: #111827;
        stroke: #334155;
      }

      .lane {
        fill: #0f2437;
        stroke: #27445f;
      }

      .node {
        fill: #0f172a;
        stroke: #60a5fa;
      }

      .node.alt {
        stroke: #2dd4bf;
      }

      .node.final {
        stroke: #a78bfa;
      }

      .label,
      .title {
        fill: #f8fafc;
      }

      .small,
      .subtitle,
      .caption {
        fill: #cbd5e1;
      }

      .artifact {
        fill: #162033;
        stroke: #334155;
      }

      .arrow {
        stroke: #64748b;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .pulse,
      .dot {
        animation: none;
      }

      .dot {
        opacity: .85;
      }
    }
  </style>

  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity=".12" />
    </filter>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
  </defs>

  <rect class="bg" width="1280" height="560" rx="34" />
  <rect class="panel" x="38" y="34" width="1204" height="492" rx="28" />

  <text class="title" x="640" y="86">From prompt to durable engineering context</text>
  <text class="subtitle" x="640" y="118">spec-first keeps deterministic setup in scripts and semantic decisions with the LLM</text>

  <rect class="lane" x="82" y="156" width="1116" height="152" rx="24" />
  <text class="caption" x="640" y="184">First run: make the idea concrete</text>

  <g class="pulse">
    <rect class="node" x="110" y="205" width="190" height="70" rx="18" />
    <text class="label" x="205" y="234">Loose idea</text>
    <text class="small" x="205" y="258">user intent</text>
  </g>

  <g class="pulse pulse2">
    <rect class="node" x="330" y="205" width="190" height="70" rx="18" />
    <text class="label" x="425" y="234">Brainstorm</text>
    <text class="small" x="425" y="258">$spec-brainstorm</text>
  </g>

  <g class="pulse pulse3">
    <rect class="node alt" x="550" y="205" width="190" height="70" rx="18" />
    <text class="label" x="645" y="234">Requirements</text>
    <text class="small" x="645" y="258">docs/brainstorms</text>
  </g>

  <g class="pulse pulse4">
    <rect class="node" x="770" y="205" width="190" height="70" rx="18" />
    <text class="label" x="865" y="234">Plan</text>
    <text class="small" x="865" y="258">docs/plans</text>
  </g>

  <g class="pulse pulse5">
    <rect class="node alt" x="990" y="205" width="190" height="70" rx="18" />
    <text class="label" x="1085" y="234">Task pack</text>
    <text class="small" x="1085" y="258">docs/tasks</text>
  </g>

  <path class="arrow" d="M 300 240 H 326" />
  <path class="arrow" d="M 520 240 H 546" />
  <path class="arrow" d="M 740 240 H 766" />
  <path class="arrow" d="M 960 240 H 986" />

  <rect class="lane" x="82" y="332" width="1116" height="126" rx="24" />
  <text class="caption" x="640" y="360">Execution loop: ship, review, and compound learning</text>

  <g class="pulse pulse6">
    <rect class="node" x="150" y="382" width="220" height="58" rx="16" />
    <text class="label" x="260" y="407">Work</text>
    <text class="small" x="260" y="430">code + tests</text>
  </g>

  <g class="pulse pulse7">
    <rect class="node" x="530" y="382" width="220" height="58" rx="16" />
    <text class="label" x="640" y="407">Review / Debug</text>
    <text class="small" x="640" y="430">evidence + fixes</text>
  </g>

  <g class="pulse pulse5">
    <rect class="node final" x="910" y="382" width="220" height="58" rx="16" />
    <text class="label" x="1020" y="407">Compound</text>
    <text class="small" x="1020" y="430">reusable learning</text>
  </g>

  <path class="arrow" d="M 1085 276 C 1085 320, 1020 326, 1020 378" />
  <path class="arrow" d="M 910 411 H 754" />
  <path class="arrow" d="M 530 411 H 374" />

  <circle class="dot one" cx="0" cy="0" r="8" />
  <circle class="dot two" cx="0" cy="0" r="8" />
  <circle class="dot three" cx="0" cy="0" r="8" />

  <g>
    <rect class="artifact" x="212" y="486" width="856" height="28" rx="14" />
    <text class="small" x="640" y="506">Scripts prepare facts and runtime assets -> LLM decides scope, tradeoffs, implementation, and review evidence</text>
  </g>
</svg>
