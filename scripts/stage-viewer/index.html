<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spec-First Stage Viewer</title>
  <!-- Critical CSS inlined for FCP optimization -->
  <style>
    :root{--bg:#0b1220;--panel:#121b2e;--text:#e6edf7;--muted:#9babc9;--accent:#4ea1ff;--ok:#2ec27e;--border:#2a3857}
    *:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
    body{margin:0;color-scheme:dark;background:radial-gradient(circle at 20% 10%,#1b2a47,#0b1220 50%);color:var(--text);font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
    .layout{display:grid;grid-template-columns:330px 1fr;min-height:100vh}
    .sidebar{border-right:1px solid var(--border);padding:20px;background:rgba(18,27,46,.85);backdrop-filter:blur(8px);overflow:auto}
    .main{padding:24px 32px;overflow:auto}
    h1{margin:0 0 8px;font-size:20px}
    .muted{color:var(--muted);font-size:12px}
    .input{width:100%;border:1px solid var(--border);border-radius:8px;background:#17233c;color:var(--text);padding:8px 12px;box-sizing:border-box;margin:12px 0}
  </style>
  <link rel="stylesheet" href="styles.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="styles.css"></noscript>
</head>
<body>
<div class="layout">
  <aside class="sidebar">

    <h1>Spec-First Viewer</h1>
    <div id="projectRoot" class="muted"></div>
    <div class="sidebar-header-row">
      <input id="search" class="input" placeholder="搜索 featureId / 标题" style="flex:1;" />
      <button id="refreshBtn" class="btn-refresh" title="强制刷新（清除缓存)" aria-label="强制刷新">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12 4 12 8 4 12V4a2h6v6a2 6 0 4 6 0 1.41-.14L1.41-1.41-1.414 1.41 1.41 1.414-1.41 1.414 1.41" d="M3 3V3a2h6V6a2 6 0 4 6 0 1.41-.14l1.41-1.41-1.414 1.41 1.414 1.41 1.414 1.41 1.414 1.41 1.414 1.41 1.414-1.41-2.83 3.51-2.83a9 3.51-2.83 3.51 2.83 3.51 2.83 3.51 2.83 3.51 2.83 3.51-2.83 3.51 2.83 3.51 2.83-3.51-2.83z"/>
        </svg>
      </button>
    </div>
    <div id="featureList">
      <!-- Skeleton loading state -->
      <div class="skeleton-item" id="skeletonLoader">
        <div class="skeleton-line" style="width:60%"></div>
        <div class="skeleton-line" style="width:80%"></div>
        <div class="skeleton-chips">
          <div class="skeleton-chip"></div>
          <div class="skeleton-chip"></div>
          <div class="skeleton-chip"></div>
        </div>
      </div>
    </div>
  </aside>
  <main class="main">
    <div id="empty" class="muted">请选择左侧 Feature 查看详情。</div>
    <div id="detail" style="display:none;">
      <h2 id="detailTitle"></h2>
      <div class="summary" id="summary"></div>

      <!-- Health Dashboard -->
      <section id="healthDashboard" class="health-dashboard" style="display:none;">
        <div class="health-score-card">
          <div class="health-score-ring">
            <svg width="90" height="90" viewBox="0 0 90 90">
              <circle class="bg" cx="45" cy="45" r="38" fill="none" stroke-width="8"/>
              <circle id="healthRingProgress" class="progress" cx="45" cy="45" r="38" fill="none" stroke-width="8" stroke-dasharray="238.76" stroke-dashoffset="238.76"/>
            </svg>
            <div class="health-score-value">
              <div id="healthScoreValue" class="score">--</div>
              <div id="healthGrade" class="grade">-</div>
            </div>
          </div>
          <div class="health-score-label">健康分</div>
          <div id="healthProfile" class="health-profile" style="display:none;font-size:11px;color:var(--muted);margin-top:4px;"></div>
        </div>
        <div class="coverage-bars" id="coverageBars"></div>
        <div class="defect-stats">
          <div class="defect-stats-title">缺陷统计</div>
          <div class="defect-severity-grid" id="defectSeverityGrid"></div>
          <div class="defect-summary" id="defectSummary">
            <span class="count">0</span> 个缺陷待处理
          </div>
          <div class="defect-list" id="defectList">
            <div class="defect-list-header">
              <span>缺陷列表</span>
              <span class="defect-list-close" id="defectListClose">×</span>
            </div>
            <div id="defectListContent"></div>
          </div>
        </div>
      </section>

      <!-- Stage Flow（主导航：点击阶段联动下方 Gate/产物） -->
      <section>
        <h2>阶段流转图（00→08）</h2>
        <div class="muted flow-help">说明：绿色为已完成，蓝色为当前阶段，灰色为待开始；点击某个阶段可联动查看该阶段的 Gate 与产物。</div>
        <div id="stageFlow" class="flow-wrap"></div>
        <div id="stageDesc" class="flow-stage-desc"></div>
      </section>

      <!-- Gate + Deliverables（阶段联动详情） -->
      <div class="row">
        <section>
          <h2 id="gateTitle">阶段 Gate</h2>
          <table id="gateTable"></table>
        </section>
        <section>
          <h2 id="deliverableTitle">阶段产物</h2>
          <table id="deliverableTable"></table>
        </section>
      </div>

      <!-- Task Progress -->
      <section id="taskProgressSection" class="task-progress-section" style="display:none;">
        <div class="task-progress-header">
          <h3>任务进度</h3>
        </div>
        <div class="task-stats-grid" id="taskStatsGrid">
          <div class="task-stat-card">
            <div class="task-stat-value ok" id="completedCount">0</div>
            <div class="task-stat-label">已完成</div>
          </div>
          <div class="task-stat-card">
            <div class="task-stat-value accent" id="inProgressCount">0</div>
            <div class="task-stat-label">进行中</div>
          </div>
          <div class="task-stat-card">
            <div class="task-stat-value" id="pendingCount">0</div>
            <div class="task-stat-label">待处理</div>
          </div>
        </div>
        <div class="task-progress-bar-container">
          <div class="task-progress-bar-fill" id="taskProgressFill"></div>
        </div>
        <div class="current-tasks-panel" id="currentTasksPanel" style="display:none;">
          <div class="current-tasks-title">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="6" cy="6" r="5"/>
              <polyline points="12,12 16,14"/>
            </svg>
            当前进行中
          </div>
          <div id="currentTasksList"></div>
        </div>
        <div class="phase-grid" id="phaseGrid"></div>
      </section>

      <!-- Timeline -->
      <section id="timelineSection" class="timeline-section" style="display:none;">
        <div class="timeline-header">
          <h3>时间线视图</h3>
          <div class="timeline-summary" id="timelineSummary"></div>
        </div>
        <div class="timeline-container">
          <div class="timeline-axis"></div>
          <div class="timeline-stages" id="timelineStages"></div>
        </div>
        <div class="timeline-legend">
          <span class="timeline-legend-item"><span class="timeline-dot complete"></span> 已完成</span>
          <span class="timeline-legend-item"><span class="timeline-dot in-progress"></span> 进行中</span>
          <span class="timeline-legend-item"><span class="timeline-dot pending"></span> 待开始</span>
        </div>
      </section>

      <!-- History + Thresholds（参考数据） -->
      <div class="row">
        <section>
          <h2>阶段历史</h2>
          <table id="historyTable"></table>
        </section>
        <section>
          <h2>质量阈值</h2>
          <table id="thresholdTable"></table>
        </section>
      </div>
    </div>
  </main>
</div>


  <script type="module" src="app.js"></script>
</body>
</html>
