<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spec-First Stage Viewer</title>
  <link rel="stylesheet" href="styles.css">
  
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <h1>Spec-First Viewer</h1>
    <div id="projectRoot" class="muted"></div>
    <input id="search" class="input" placeholder="搜索 featureId / 标题" />
    <div id="featureList"></div>
  </aside>
  <main class="main">
    <div id="empty" class="muted">请选择左侧 Feature 查看详情。</div>
    <div id="detail" style="display:none;">
      <h2 id="detailTitle"></h2>
      <div class="summary" id="summary"></div>

      <!-- Health Dashboard -->
      <section id="healthDashboard" class="health-dashboard" style="display:none;">
        <div class="health-score-card">
          <div class="health-score-ring">
            <svg width="90" height="90" viewBox="0 0 90 90">
              <circle class="bg" cx="45" cy="45" r="38" fill="none" stroke-width="8"/>
              <circle id="healthRingProgress" class="progress" cx="45" cy="45" r="38" fill="none" stroke-width="8" stroke-dasharray="238.76" stroke-dashoffset="238.76"/>
            </svg>
            <div class="health-score-value">
              <div id="healthScoreValue" class="score">--</div>
              <div id="healthGrade" class="grade">-</div>
            </div>
          </div>
          <div class="health-score-label">健康分</div>
        </div>
        <div class="coverage-bars" id="coverageBars"></div>
        <div class="defect-stats">
          <div class="defect-stats-title">缺陷统计</div>
          <div class="defect-severity-grid" id="defectSeverityGrid"></div>
          <div class="defect-summary" id="defectSummary">
            <span class="count">0</span> 个缺陷待处理
          </div>
          <div class="defect-list" id="defectList">
            <div class="defect-list-header">
              <span>缺陷列表</span>
              <span class="defect-list-close" id="defectListClose">×</span>
            </div>
            <div id="defectListContent"></div>
          </div>
        </div>
      </section>

      <!-- Task Progress Section -->
      <section id="taskProgressSection" class="task-progress-section" style="display:none;">
        <div class="task-progress-header">
          <h3>任务进度</h3>
        </div>
        <div class="task-stats-grid" id="taskStatsGrid">
          <div class="task-stat-card">
            <div class="task-stat-value ok" id="completedCount">0</div>
            <div class="task-stat-label">已完成</div>
          </div>
          <div class="task-stat-card">
            <div class="task-stat-value accent" id="inProgressCount">0</div>
            <div class="task-stat-label">进行中</div>
          </div>
          <div class="task-stat-card">
            <div class="task-stat-value" id="pendingCount">0</div>
            <div class="task-stat-label">待处理</div>
          </div>
        </div>
        <div class="task-progress-bar-container">
          <div class="task-progress-bar-fill" id="taskProgressFill"></div>
        </div>
        <div class="current-tasks-panel" id="currentTasksPanel" style="display:none;">
          <div class="current-tasks-title">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="6" cy="6" r="5"/>
              <polyline points="12,12 16,14"/>
            </svg>
            当前进行中
          </div>
          <div id="currentTasksList"></div>
        </div>
        <div class="phase-grid" id="phaseGrid"></div>
      </section>

      <!-- Timeline Section -->
      <section id="timelineSection" class="timeline-section" style="display:none;">
        <div class="timeline-header">
          <h3>时间线视图</h3>
          <div class="timeline-summary" id="timelineSummary"></div>
        </div>
        <div class="timeline-container">
          <div class="timeline-axis"></div>
          <div class="timeline-stages" id="timelineStages"></div>
        </div>
        <div class="timeline-legend">
          <span class="timeline-legend-item"><span class="timeline-dot complete"></span> 已完成</span>
          <span class="timeline-legend-item"><span class="timeline-dot in-progress"></span> 进行中</span>
          <span class="timeline-legend-item"><span class="timeline-dot pending"></span> 待开始</span>
        </div>
      </section>

      <section>
        <h2>阶段流转图（00→06）</h2>
        <div class="muted flow-help">说明：绿色为已完成，蓝色为当前阶段，灰色为待开始；点击某个阶段可联动查看该阶段的 Gate 与产物。</div>
        <div id="stageFlow" class="flow-wrap"></div>
        <div id="stageDesc" class="flow-stage-desc"></div>
      </section>

      <div class="row">
        <section>
          <h2>阶段历史</h2>
          <table id="historyTable"></table>
        </section>
        <section>
          <h2 id="gateTitle">阶段 Gate</h2>
          <table id="gateTable"></table>
        </section>
      </div>

      <div class="row">
        <section>
          <h2 id="deliverableTitle">阶段产物</h2>
          <table id="deliverableTable"></table>
        </section>
        <section>
          <h2>质量阈值</h2>
          <table id="thresholdTable"></table>
        </section>
      </div>
    </div>
  </main>
</div>


  <script src="app.js"></script>
</body>
</html>
