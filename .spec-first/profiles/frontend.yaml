# Frontend Project Profile
# 适用于：React/Vue/Angular 等纯前端项目

profile: default-simplified

gateConditions:
  04_implement:
    - id: G-FE-LINT
      description: "ESLint check"
      command: "npm run lint"
      blocking: true

    - id: G-FE-TYPE
      description: "TypeScript type check"
      command: "npm run typecheck"
      blocking: true

    - id: G-FE-TEST
      description: "Unit test pass"
      command: "npm test -- --run"
      blocking: false  # 前端测试可选

  05_verify:
    - id: G-FE-E2E
      description: "E2E test pass"
      command: "npm run test:e2e"
      blocking: false  # E2E 测试可选

# 说明：
# - 前端项目通常不需要 ktlint/swiftlint
# - 单元测试设为 non-blocking（很多前端项目无测试）
# - E2E 测试设为 non-blocking（环境依赖多）
