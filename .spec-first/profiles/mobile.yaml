# Mobile Project Profile
# 适用于：Android/iOS 移动应用

profile: default-simplified

gateConditions:
  04_implement:
    # Android
    - id: G-ANDROID-LINT
      description: "Kotlin lint check"
      command: "ktlint --check"
      blocking: false  # 工具可能未安装

    # iOS
    - id: G-IOS-LINT
      description: "Swift lint check"
      command: "swiftlint"
      blocking: false  # 工具可能未安装

    # 通用
    - id: G-MOBILE-TEST
      description: "Unit test pass"
      command: "npm test"
      blocking: true
