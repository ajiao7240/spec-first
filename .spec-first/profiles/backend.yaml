# Backend Project Profile
# 适用于：Node.js/Python/Go 等后端服务

profile: default-simplified

gateConditions:
  04_implement:
    - id: G-BE-LINT
      description: "Lint check"
      command: "npm run lint"
      blocking: true

    - id: G-BE-UNIT
      description: "Unit test pass"
      command: "npm test"
      blocking: true

    - id: G-BE-COVERAGE
      description: "Code coverage ≥ 80%"
      command: "npm run test:coverage"
      blocking: true

  05_verify:
    - id: G-BE-INTEGRATION
      description: "Integration test pass"
      command: "npm run test:integration"
      blocking: true
