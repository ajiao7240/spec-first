platform: pc
name: PC / Electron
description: Desktop application standard
gate_conditions:
  04_implement:
    - id: G-PC-LINT
      description: ESLint pass
      command: npm run lint
  05_verify:
    - id: G-PC-E2E
      description: Playwright E2E pass
      command: npm run test:e2e
extra_deliverables:
  02_design:
    - system-architecture.md
  07_release:
    - reports/memory-profile.md
quality_thresholds:
  installer_size:
    value: 100mb
    direction: lower_is_better
  memory_usage_idle:
    value: 200mb
    direction: lower_is_better