platform: app-android
name: Android Native
description: Native Android application standard
gate_conditions:
  04_implement:
    - id: G-AND-LINT
      description: Ktlint pass
      command: ./gradlew ktlintCheck
  05_verify:
    - id: G-AND-TEST
      description: Android JUnit pass
      command: ./gradlew test
extra_deliverables:
  02_design:
    - ui-design.figma
  07_release:
    - reports/apk-size.md
quality_thresholds:
  apk_size:
    value: 40mb
    direction: lower_is_better
  anr_rate:
    value: 0.1
    direction: lower_is_better