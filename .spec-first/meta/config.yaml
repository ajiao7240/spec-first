# ─── 上下文恢复 ───────────────────────────────────────────
catchup:
  trigger: prompt              # 上下文恢复触发方式: auto(自动) | prompt(提示用户) | off(关闭)

# ─── 上下文配置 ───────────────────────────────────────────
context:
  token_budget: 16000          # 上下文 token 预算上限（字节）

# ─── 运行时配置 ───────────────────────────────────────────
runtime:
  max_iterations: 5            # 主循环最大迭代轮次（每轮可执行一批任务）
  max_self_corrections: 3      # AI 自我修正上限（注入 Skill prompt，实际受 max_retry_per_task 约束取两者最小值）
  kv_cache_hard_gate: false    # KV-Cache 稳定性校验：true=不稳定时阻断 Skill 执行，false=仅告警

  # ─── Auto-Loop 自动编排 ─────────────────────────────────
  auto_orchestrate:
    enabled: true             # 自动编排总开关：true 时 orchestrate 命令默认进入 auto 模式（无需 --auto 标志）
    stop_on_blocked: true      # 任务阻塞时是否立即终止循环：true=立即停止等待人工介入，false=跳过继续执行后续任务
    max_task_duration_ms: 600000      # 单任务最大执行时长（毫秒），超时触发 TASK_TIMEOUT 错误。默认 10 分钟
    heartbeat_timeout_ms: 300000      # 心跳超时阈值（毫秒），executor 返回后检测是否 stalled。默认 5 分钟
    watchdog_interval_ms: 10000       # [预留] 未来 interval-based watchdog 轮询间隔，当前未生效
    max_retry_per_task: 3             # 每个任务最大重试次数（任务级隔离），超出后标记为 blocked
    retry_backoff_ms: 2000            # 重试退避基础值（毫秒），实际按指数递增（base × 2^attempt），上限 30 秒
    max_total_retry_duration_ms: 900000  # 全局重试时间预算（毫秒），所有任务的累计退避时长超出后停止重试。默认 15 分钟
    max_parallel: 1            # 每轮最大批量任务数：控制 pickReadyTodos 一次取出多少个 [P] 任务串行执行，范围 1-4

  # ─── 审计日志 ───────────────────────────────────────────
  audit_log:
    enabled: true              # 审计日志开关
    tamper_proof: hash_chain   # 防篡改方式: none(无) | hash_chain(哈希链)
    rotation_size_mb: 10       # 日志轮转大小（MB）

# ─── 质量门禁 ───────────────────────────────────────────
gate:
  pilot_mode: false            # 试点模式：true=门禁仅告警不阻断，false=门禁强制执行
  thresholds:
    G-IMPL-01:
      value: 0.8               # implement 阶段 C4 最低通过阈值
      direction: higher_is_better
    G-VERIFY-01:
      value: 1.0               # verify 阶段 C4 完整覆盖阈值
      direction: higher_is_better

# ─── 健康度评分权重 ───────────────────────────────────────
# w1-w9 对应九个健康维度，总和应为 1.0
health:
  weights:
    w1: 0.1                    # 需求覆盖率
    w2: 0.1                    # 设计覆盖率
    w3: 0.1                    # 任务完成率
    w4: 0.15                   # 测试覆盖率
    w5: 0.1                    # 代码质量
    w6: 0.15                   # 追溯完整性
    w7: 0.1                    # 文档完整性
    w8: 0.1                    # 门禁通过率
    w9: 0.1                    # 变更管理
