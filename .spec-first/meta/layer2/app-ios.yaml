platform: app-ios
name: iOS Native
description: Native iOS application standard
gate_conditions:
  04_implement:
    - id: G-IOS-LINT
      description: SwiftLint pass
      command: swiftlint
  05_verify:
    - id: G-IOS-TEST
      description: XCTest pass
      command: xcodebuild test
extra_deliverables:
  02_design:
    - name: ui-design.sketch
      required: false
  07_release:
    - name: reports/ipa-size.md
      required: false
quality_thresholds:
  app_size_download:
    value: 50
    direction: lower_is_better
  startup_time:
    value: 800
    direction: lower_is_better
