platform: go-backend
name: Go Backend
description: Go microservice backend standard
gate_conditions:
  04_implement:
    - id: G-GO-FMT
      description: gofmt check pass
      command: test -z "$(gofmt -l .)"
    - id: G-GO-VET
      description: go vet pass
      command: go vet ./...
    - id: G-GO-UNIT
      description: go test pass
      command: go test ./...
  05_verify:
    - id: G-GO-COVERAGE
      description: Go coverage report generated
      command: go test -coverprofile=coverage.out ./...
extra_deliverables:
  02_design:
    - name: contracts/openapi.yaml
      required: false
    - name: data-model.md
      required: false
  05_verify:
    - name: reports/go-test-report.md
      required: false
quality_thresholds:
  api_p99_latency:
    value: 500
    direction: lower_is_better
  code_coverage:
    value: 75
    direction: higher_is_better
