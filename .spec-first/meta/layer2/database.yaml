platform: database
name: Database Layer
description: Database schema and migration standard
gate_conditions:
  04_implement:
    - id: G-DB-SCHEMA-LINT
      description: DDL lint pass
      command: sqlfluff lint db/
    - id: G-DB-MIGRATE-DRYRUN
      description: Migration dry run pass
      command: alembic upgrade head --sql
  05_verify:
    - id: G-DB-BACKUP-RESTORE
      description: Backup restore verification pass
      command: ./scripts/db/backup_restore_check.sh
extra_deliverables:
  02_design:
    - name: data-model.md
      required: true
    - name: contracts/schema-ddl.sql
      required: true
  07_release:
    - name: reports/migration-execution-log.md
      required: true
quality_thresholds:
  migration_duration_minutes:
    value: 15
    direction: lower_is_better
  slow_query_p95_ms:
    value: 200
    direction: lower_is_better
