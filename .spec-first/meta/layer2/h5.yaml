platform: h5
name: H5 / Web Mobile
description: Mobile web application standard
gate_conditions:
  04_implement:
    - id: G-H5-LINT
      description: ESLint & Stylelint pass
      command: npm run lint
    - id: G-H5-COMPAT
      description: Browser compatibility check
      command: npm run compat-check
  05_verify:
    - id: G-H5-LIGHTHOUSE
      description: Lighthouse score > 80
      command: npm run lighthouse
extra_deliverables:
  02_design:
    - name: contracts/api-schema.yaml
      required: false
  07_release:
    - name: reports/bundle-analysis.md
      required: false
quality_thresholds:
  bundle_size_main:
    value: 200
    direction: lower_is_better
  fcp_time:
    value: 1500
    direction: lower_is_better
