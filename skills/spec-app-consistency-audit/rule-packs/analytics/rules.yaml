id: analytics
scope: mobile_analytics
advisory_only: false
evidence_policy:
  project_specific_evidence_required: true
  rule_pack_cannot_be_only_evidence: true
rules:
  - id: key-path-event-coverage
    rationale: 关键路径应覆盖 page_view、click、submit、success、failed。
  - id: failure-reason-param
    rationale: failed 事件应有结构化 failure_reason 或等价参数。
  - id: route-level-exposure
    rationale: 页面曝光应绑定正确 route 层级并避免重复曝光。
