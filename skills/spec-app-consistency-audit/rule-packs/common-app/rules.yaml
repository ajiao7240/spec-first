id: common-app
scope: mobile_app
advisory_only: false
evidence_policy:
  project_specific_evidence_required: true
  rule_pack_cannot_be_only_evidence: true
rules:
  - id: common-app-state-completeness
    rationale: loading、empty、error、retry、disabled 和 permission_denied 是移动端关键状态。
  - id: common-app-duplicate-submit
    rationale: 提交、支付、下单、交易等操作需要 loading/disabled/idempotency 证据。
  - id: common-app-safe-area-keyboard
    rationale: 输入页面需要键盘与 safe area 风险审查。
