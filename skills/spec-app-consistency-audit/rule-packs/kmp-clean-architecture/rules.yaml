id: kmp-clean-architecture
scope: kmp_mobile_app
advisory_only: false
evidence_policy:
  project_specific_evidence_required: true
  rule_pack_cannot_be_only_evidence: true
rules:
  - id: kmp-common-domain-boundary
    rationale: commonMain/domain 应承载共享业务规则，不能直接依赖平台 API。
  - id: kmp-platform-adapter
    rationale: 平台能力应通过 adapter 或 expect/actual 隔离。
  - id: clean-ui-data-boundary
    rationale: UI/presentation 不应直接依赖 data implementation。
  - id: structured-result-model
    rationale: UseCase 应结构化表达成功、失败和恢复路径。
