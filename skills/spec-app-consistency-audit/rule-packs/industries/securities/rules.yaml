id: securities
scope: industry_securities
advisory_only: true
evidence_policy:
  project_specific_evidence_required: true
  rule_pack_cannot_be_only_evidence: true
activation:
  requires_explicit_industry_or_confirmed_profile: true
rules:
  - id: securities-order-confirmation
    rationale: 买入、卖出、撤单等交易操作需要确认态和失败原因。
  - id: securities-risk-guard-route
    rationale: 风控、登录态、交易权限应有明确 route 出口和降级页。
  - id: securities-quote-refresh
    rationale: 行情、持仓、订单状态应考虑弱网、刷新和后台恢复。
  - id: securities-audit-analytics
    rationale: trade_submit、trade_success、trade_failed 应能结构化分析。
