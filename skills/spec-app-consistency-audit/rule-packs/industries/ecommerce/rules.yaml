id: ecommerce
scope: industry_ecommerce
advisory_only: true
evidence_policy:
  project_specific_evidence_required: true
  rule_pack_cannot_be_only_evidence: true
activation:
  requires_explicit_industry_or_confirmed_profile: true
rules:
  - id: ecommerce-checkout-confirmation
    rationale: 下单和支付需要确认态、防重复提交和失败恢复。
  - id: ecommerce-inventory-price-consistency
    rationale: 库存、价格、优惠应在提交前后保持一致性提示。
  - id: ecommerce-refund-logistics-status
    rationale: 退款、物流、订单状态应有 empty/error/retry 和通知埋点。
