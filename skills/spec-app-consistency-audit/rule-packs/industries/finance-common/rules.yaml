id: finance-common
scope: industry_finance_common
advisory_only: true
evidence_policy:
  project_specific_evidence_required: true
  rule_pack_cannot_be_only_evidence: true
activation:
  requires_explicit_industry_or_confirmed_profile: true
rules:
  - id: finance-account-state-consistency
    rationale: 账户、资产、余额、充值、提现和转账状态需要明确 loading、success、failed、retry 与回滚提示。
  - id: finance-sensitive-data-boundary
    rationale: 身份、银行卡、账户、资产和交易失败原因属于敏感信息，日志、埋点和本地存储需要边界证据。
  - id: finance-risk-confirmation
    rationale: 高风险资金动作需要确认态、权限降级、失败恢复和重复提交防护。
  - id: finance-cross-platform-analytics
    rationale: 资金类 submit、success、failed、cancel 事件应跨端参数一致，并保留 failure_reason。
