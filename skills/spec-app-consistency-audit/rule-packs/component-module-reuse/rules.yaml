id: component-module-reuse
scope: mobile_architecture
advisory_only: false
evidence_policy:
  project_specific_evidence_required: true
  rule_pack_cannot_be_only_evidence: true
rules:
  - id: figma-component-code-component
    rationale: Figma 组件应有可追踪的代码组件或明确不复用理由。
  - id: component-variant-coverage
    rationale: 组件应覆盖 loading、disabled、error、accessibility 等关键 variants。
  - id: module-boundary-direction
    rationale: core 不应反向依赖 feature，feature 之间直接依赖需要语义审查。
  - id: reuse-with-business-semantics
    rationale: 强业务页面和带隐式埋点/导航的组件不应被盲目复用。
