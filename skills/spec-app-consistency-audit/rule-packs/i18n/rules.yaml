id: i18n
scope: mobile_i18n
advisory_only: false
evidence_policy:
  project_specific_evidence_required: true
  rule_pack_cannot_be_only_evidence: true
rules:
  - id: no-user-visible-hardcoded-text
    rationale: 用户可见文案应进入多语言资源。
  - id: placeholder-consistency
    rationale: Android/iOS placeholder 数量与类型应一致。
  - id: locale-formatting
    rationale: 日期、金额、数字和复数应使用 locale-aware formatting。
  - id: accessibility-label-i18n
    rationale: accessibility label 应与 i18n 资源一同治理。
