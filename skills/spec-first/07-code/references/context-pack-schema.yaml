# 上下文包格式定义
# 每个 subagent 接收的上下文包（< 2KB）

task:
  id: TASK-INT-001
  title: 交互体验提升
  description: |
    详细描述当前 TASK 的目标和范围
  acceptance_criteria:
    - 验收标准 1
    - 验收标准 2

related_specs:
  fr: FR-INT-001 内容摘要（仅关联部分）
  ds: DS-INT-001 内容摘要（仅关联部分）

constitution:
  - 约束 1
  - 约束 2

tdd_requirement:
  - 必须有 RED 证据或 WAIVER
  - 测试先行原则

dependencies:
  - 依赖 TASK-XXX 已完成
