# ============================================================
# Skill 输入上下文配置
#
# 设计原则：
#   只喂能提升决策质量的最小充分上下文
#
# 分类策略：
#   - 工具型：required: []，尽量去项目化
#   - 流程型：required: [summary]，完整上下文
#   - 治理型：required: []，轻量上下文
#
# 修改此文件后:
#   - 运行 `spec-first skill inject-context` 更新 SKILL.md
#   - 无需修改代码
#
# 文件位置:
#   skills/spec-first/skill-input-contracts.yaml
# ============================================================

# 全局开关：是否自动把契约注入到各个 SKILL.md 中
auto_inject: true

# 跳过自动注入的 skill。
# 典型场景:
#   - 该 skill 本身就是上下文生成源（如 first）
#   - 该 skill 在没有上下文前就要启动（如 init）
skip_injection:
  - first   # 00-first/SKILL.md - first 本身负责生成上下文
  - init    # 01-init/SKILL.md - init 在 first 之前执行，无上下文可用

# 默认配置。
# 当某个 skill 没有在 skills: 下单独配置时，会使用这组默认值。
defaults:
  required: [summary]
  recommended: []
  optional: []

# 产物名称到中文描述的映射。
# 这里定义的是”产物名的用户可读说明”，供 SKILL.md 表格和运行时提示复用。
descriptions:
  summary: 项目概览，理解技术栈和模块划分
  steering: 产品方向和核心约束
  conventions: 编码规范，确保代码风格一致
  entry-guide: 入口指南，快速定位实现位置
  structure-overview: 代码结构，理解模块边界
  api-contracts: API 契约，理解接口规范
  critical-flows: 关键流程，理解业务链路
  domain-model: 领域模型，理解业务概念
  database-schema: 数据库结构，理解数据模型

# ============================================================
# 各 skill 的输入上下文配置
# ============================================================
skills:

  # ═══════════════════════════════════════════════════════════
  # 工具型 (3 个) — 聚焦动作本身，尽量去项目化
  # ═══════════════════════════════════════════════════════════

  # 15-doctor/SKILL.md
  # 用途：环境诊断，检查 spec-first 安装状态和宿主配置。
  # 为什么是工具型：检查的是安装状态，与项目内容无关。
  doctor:
    required: []
    recommended: []
    optional: [summary]  # 仅用于提供更精准的诊断建议

  # 00-onboarding/SKILL.md
  # 用途：新手引导，教用户”spec-first 怎么用”。
  # 为什么是工具型：关注的是工具使用方法，不是用户项目内容。
  onboarding:
    required: []
    recommended: []
    optional: [summary]  # 仅用于了解项目类型，提供针对性引导

  # 17-feature/SKILL.md
  # 用途：Feature 查询/切换命令族。
  # 为什么是工具型：操作的是索引，不需要理解项目内容。
  feature:
    required: []
    recommended: []
    optional: [summary]

  # ═══════════════════════════════════════════════════════════
  # 流程型 (13 个) — 服务研发阶段推进，必须吃项目上下文
  # ═══════════════════════════════════════════════════════════

  # 02-catchup/SKILL.md
  # 用途：恢复上下文，快速了解项目当前状态。
  # 为什么是流程型：需要理解项目历史才能正确恢复上下文。
  catchup:
    required: [summary]
    recommended: [entry-guide, structure-overview, steering, conventions]
    optional: []

  # 03-spec/SKILL.md
  # 用途：定位 Feature 并校验阶段为需求规格（01_specify）。
  # 为什么是流程型：需要理解业务背景才能写出正确规格。
  spec:
    required: [summary]
    recommended: [domain-model, conventions, critical-flows]
    optional: []

  # 20-spec-review/SKILL.md
  # 用途：定位 Feature 并执行需求规格质量审查（C10）。
  # 为什么是流程型：需要理解领域才能评审质量。
  spec-review:
    required: [summary]
    recommended: [domain-model, conventions, critical-flows]
    optional: []

  # 01-focus-requirements/SKILL.md
  # 用途：收敛已审需求到 owner 边界，生成 PRD 与交接摘要。
  # 为什么是流程型：需要理解项目与需求边界才能安全收敛。
  focus-requirements:
    required: [summary]
    recommended: [domain-model, critical-flows, conventions]
    optional: [entry-guide]

  # 04-design/SKILL.md
  # 用途：定位 Feature 并校验阶段为技术设计（02_design）。
  # 为什么是流程型：需要理解架构约束才能做正确设计。
  design:
    required: [summary]
    recommended: [structure-overview, api-contracts, critical-flows, conventions]
    optional: [steering]

  # 05-research/SKILL.md
  # 用途：定位 Feature 上下文并生成调研结论。
  # 为什么是流程型：需要理解项目上下文才能定向调研。
  research:
    required: [summary]
    recommended: [critical-flows, api-contracts, domain-model]
    optional: []

  # 06-task/SKILL.md
  # 用途：定位 Feature 并校验阶段为任务拆解（03_plan）。
  # 为什么是流程型：需要理解代码结构才能正确拆解任务。
  task:
    required: [summary]
    recommended: [entry-guide, critical-flows, structure-overview, conventions]
    optional: [api-contracts]

  # 11-plan/SKILL.md
  # 用途：定位 Feature 并加载当前阶段计划。
  # 为什么是流程型：需要理解项目状态才能正确编排计划。
  plan:
    required: [summary]
    recommended: [entry-guide, critical-flows, structure-overview, conventions]
    optional: [api-contracts]

  # 13-orchestrate/SKILL.md
  # 用途：定位 Feature 并加载当前状态执行编排。
  # 为什么是流程型：需要理解项目状态才能正确编排执行。
  orchestrate:
    required: [summary]
    recommended: [entry-guide, critical-flows, structure-overview, conventions]
    optional: [api-contracts]

  # 07-code/SKILL.md
  # 用途：定位进行中的 TASK 并执行代码实现。
  # 为什么是流程型：需要理解规范、约束、模式才能正确实现。
  code:
    required: [summary]
    recommended: [conventions, entry-guide, structure-overview, critical-flows]
    optional: [api-contracts]

  # 08-review/SKILL.md
  # 用途：定位变更范围并执行实现质量审查。
  # 为什么是流程型：需要理解规范才能判断实现是否正确。
  review:
    required: [summary]
    recommended: [conventions, entry-guide, structure-overview, critical-flows]
    optional: [api-contracts]

  # 12-verify/SKILL.md
  # 用途：定位 Feature 并执行阶段验收校验。
  # 为什么是流程型：需要理解需求才能判断是否满足验收条件。
  verify:
    required: [summary]
    recommended: [critical-flows, conventions, entry-guide]
    optional: [database-schema]

  # 10-archive/SKILL.md
  # 用途：定位 Feature 并校验阶段为归档复盘（06_wrap_up）。
  # 为什么是流程型：归档的核心是交付证据、复盘结论与 handoff。
  archive:
    required: [summary]
    recommended: [structure-overview, domain-model]
    optional: []

  # ═══════════════════════════════════════════════════════════
  # 治理型 (3 个) — 关注系统状态，轻量上下文
  # ═══════════════════════════════════════════════════════════

  # 16-sync/SKILL.md
  # 用途：定位 Feature 并同步文档关联索引与状态。
  # 为什么是元治理型：操作的是状态文件索引，不需要理解内容。
  sync:
    required: []
    recommended: [summary]
    optional: [entry-guide, structure-overview, api-contracts]

  # 14-status/SKILL.md
  # 用途：定位当前 Feature 并输出状态概览。
  # 为什么是元治理型：读取并展示状态，不需要理解内容。
  status:
    required: []
    recommended: [summary]
    optional: [critical-flows, structure-overview, domain-model]

  # 21-analyze/SKILL.md
  # 用途：执行跨产物一致性分析并生成分析报告。
  # 为什么是治理型：能分析任何产物，但不应被项目上下文硬绑定。
  analyze:
    required: []
    recommended: [summary, critical-flows, structure-overview]
    optional: [domain-model]
