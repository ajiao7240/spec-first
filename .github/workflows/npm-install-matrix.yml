name: npm Install Matrix

on:
  push:
    paths:
      - 'bin/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/npm-install-matrix-smoke.js'
      - 'tests/smoke/install-tarball.sh'
      - '.github/workflows/npm-install-matrix.yml'
  pull_request:
    paths:
      - 'bin/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/npm-install-matrix-smoke.js'
      - 'tests/smoke/install-tarball.sh'
      - '.github/workflows/npm-install-matrix.yml'
  workflow_dispatch:

jobs:
  install-tarball:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Pack and install tarball
        if: runner.os != 'Windows'
        env:
          SPEC_FIRST_SMOKE_ARTIFACT_DIR: .spec-first/ci/npm-install-matrix/${{ runner.os }}-node-${{ matrix.node }}-default
        run: node scripts/npm-install-matrix-smoke.js

      - name: Pack and install tarball (Windows pwsh)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          SPEC_FIRST_SMOKE_ARTIFACT_DIR: .spec-first/ci/npm-install-matrix/${{ runner.os }}-node-${{ matrix.node }}-pwsh
        run: node scripts/npm-install-matrix-smoke.js

      - name: Pack and install tarball (Windows cmd)
        if: runner.os == 'Windows'
        shell: cmd
        env:
          SPEC_FIRST_SMOKE_ARTIFACT_DIR: .spec-first/ci/npm-install-matrix/${{ runner.os }}-node-${{ matrix.node }}-cmd
        run: node scripts\npm-install-matrix-smoke.js

      - name: Upload install smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-install-matrix-${{ runner.os }}-node-${{ matrix.node }}
          path: .spec-first/ci/npm-install-matrix/
          if-no-files-found: ignore
          retention-days: 7
