name: AI Dev Quality Gate

on:
  pull_request:
    paths:
      - 'src/bootstrap-compiler/**'
      - 'src/context-routing/**'
      - 'src/cli/commands/stage0-context.js'
      - 'src/cli/contracts/quality-gates/**'
      - 'docs/contracts/spec-graph-bootstrap/**'
      - 'docs/contracts/verifiers/**'
      - 'docs/contracts/quality-gates/**'
      - 'skills/spec-plan/**'
      - 'skills/spec-work/**'
      - 'skills/spec-work-beta/**'
      - 'skills/spec-review/**'
      - 'docs/10-prompt/skills/spec-plan/**'
      - 'docs/10-prompt/skills/spec-work/**'
      - 'docs/10-prompt/skills/spec-work-beta/**'
      - 'docs/10-prompt/skills/spec-review/**'
      - '.github/workflows/ai-dev-quality-gate.yml'
      - 'tests/unit/branch-protection-policy.test.js'
      - 'tests/unit/spec-graph-bootstrap-contracts.test.js'
      - 'tests/unit/spec-graph-bootstrap-compiler.test.js'
      - 'tests/unit/quality-feedback.test.js'
      - 'tests/unit/verifier-registry.test.js'
      - 'tests/unit/stage0-context-command.test.js'
      - 'tests/unit/verification-evidence.test.js'
      - 'tests/unit/verification-gate-state.test.js'
      - 'tests/unit/workflow-stage0-consumption.test.js'
      - 'tests/unit/spec-plan-contracts.test.js'
      - 'tests/unit/spec-work-contracts.test.js'
      - 'tests/unit/spec-work-beta-contracts.test.js'
      - 'tests/unit/spec-review-contracts.test.js'
      - 'tests/unit/workflow-telemetry.test.js'
      - 'tests/unit/workspace-context.test.js'
      - 'tests/integration/verification-gate.integration.test.js'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  ai-dev-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run AI dev quality gate
        run: npm run test:ai-dev:gate

      - name: Upload AI dev gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-dev-quality-gate
          path: .spec-first/workflows/quality-gates/ai-dev-quality-gate/
