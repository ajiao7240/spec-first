name: Skill Entrypoint Gate

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'docs/contracts/workflows/eval-fixture-contract.md'
      - 'docs/contracts/workflows/fresh-source-eval-checklist.md'
      - 'docs/contracts/source-runtime-customization-boundary.md'
      - 'docs/contracts/dual-host-governance/**'
      - '.github/pull_request_template.md'
      - '.github/workflows/skill-entrypoint-gate.yml'
      - 'scripts/lint-skill-entrypoints.js'
      - 'scripts/lint-skill-entrypoints.config.json'
      - 'tests/unit/eval-fixture-contracts.test.js'
      - 'tests/unit/workflow-eval-readiness-contracts.test.js'
      - 'tests/unit/skill-audit-scripts.test.js'
      - 'tests/unit/prompt-examples-contracts.test.js'
      - 'tests/unit/spec-prd-contracts.test.js'
      - 'tests/unit/spec-write-tasks-contracts.test.js'
      - 'tests/unit/agent-native-architecture-eval-readiness.test.js'
      - 'tests/unit/fresh-source-eval-contracts.test.js'
      - '.claude-plugin/plugin.json'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  lint-skill-entrypoints:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run skill entrypoint lint
        run: npm run lint:skill-entrypoints

      - name: Run eval fixture contracts
        run: npm run test:eval-fixtures
