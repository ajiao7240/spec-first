name: Sync master to main

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-master-to-main
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch master and main
        run: git fetch origin master main

      - name: Verify main is still a pure mirror
        run: |
          git checkout main
          if ! git merge-base --is-ancestor HEAD origin/master; then
            echo "main has diverged from master. Align main back to origin/master before this mirror sync can continue."
            exit 1
          fi

      - name: Fast-forward main to master
        run: |
          git checkout main
          git merge --ff-only origin/master

      - name: Push main
        run: git push origin main
